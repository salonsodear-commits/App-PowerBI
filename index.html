<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas DAX · Artefacto Interactivo de Aprendizaje — Power BI, DAX y Analítica Corporativa</title>
<style>
  :root{
    --bg:#0d1117; --bg2:#111722; --panel:#161b22; --panel2:#1c2430;
    --border:#283041; --border2:#39435a;
    --text:#e6edf3; --muted:#9aa7b8; --faint:#6b788a;
    --accent:#4f9cf9; --accent2:#7ee787; --warn:#f2cc60; --crit:#ff7b72; --star:#d2a8ff;
    --green:#3fb950; --yellow:#d29922; --red:#f85149; --purple:#bc8cff;
    --code-bg:#0b1220; --kw:#ff7b72; --fn:#d2a8ff; --num:#79c0ff; --str:#a5d6ff; --com:#8b949e; --tbl:#7ee787;
    --shadow:0 8px 30px rgba(0,0,0,.45);
    --radius:12px;
    --sidebar-w:340px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#0b0f16,#0d1117 40%);
    color:var(--text); font-size:15.5px; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ---------- Layout ---------- */
  .app{display:flex;height:100vh;overflow:hidden}
  .sidebar{
    width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;
    background:var(--bg2);border-right:1px solid var(--border);
    display:flex;flex-direction:column;
  }
  .sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(135deg,#4f9cf9,#bc8cff);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#0b0f16;font-size:18px;
    box-shadow:0 2px 10px rgba(79,156,249,.4);
  }
  .brand h1{font-size:16px;margin:0;line-height:1.15;letter-spacing:.2px}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .search{margin-top:12px;position:relative}
  .search input{
    width:100%;padding:9px 32px 9px 32px;border-radius:9px;border:1px solid var(--border2);
    background:var(--panel);color:var(--text);font-size:13.5px;outline:none;
  }
  .search input:focus{border-color:var(--accent)}
  .search .ico{position:absolute;left:10px;top:9px;color:var(--faint);font-size:13px}
  .search .clr{position:absolute;right:8px;top:7px;color:var(--faint);cursor:pointer;font-size:14px;display:none;padding:2px 5px;border-radius:6px}
  .search .clr:hover{background:var(--panel2);color:var(--text)}
  .legend{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:11px;font-size:10.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:3px;white-space:nowrap}

  .tree{flex:1;overflow-y:auto;padding:8px 8px 40px}
  .tree::-webkit-scrollbar{width:9px}
  .tree::-webkit-scrollbar-thumb{background:#222c3a;border-radius:8px}
  .tree::-webkit-scrollbar-thumb:hover{background:#2c3a4d}

  .node{user-select:none}
  .node-row{
    display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;cursor:pointer;
    font-size:13.5px;color:var(--text);position:relative;
  }
  .node-row:hover{background:var(--panel)}
  .node-row.active{background:#16314f;color:#fff;box-shadow:inset 0 0 0 1px #27496f}
  .node-row .tw{width:14px;flex:0 0 auto;color:var(--faint);font-size:10px;transition:transform .15s;text-align:center}
  .node-row.collapsed .tw{transform:rotate(-90deg)}
  .node-row .ic{flex:0 0 auto;font-size:13px;width:16px;text-align:center}
  .node-row .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .node-row .badge{flex:0 0 auto;font-size:9px;padding:1px 5px;border-radius:20px;background:var(--panel2);color:var(--muted);border:1px solid var(--border)}
  .children{margin-left:13px;border-left:1px solid var(--border);padding-left:4px;overflow:hidden}
  .children.hidden{display:none}
  .node-row.hit{outline:1px solid var(--accent)}
  .dim{opacity:.32}

  /* ---------- Main ---------- */
  .main{flex:1;height:100%;overflow-y:auto;scroll-behavior:smooth}
  .main::-webkit-scrollbar{width:12px}
  .main::-webkit-scrollbar-thumb{background:#222c3a;border-radius:8px}
  .topbar{
    position:sticky;top:0;z-index:20;backdrop-filter:blur(8px);
    background:rgba(13,17,23,.82);border-bottom:1px solid var(--border);
    padding:10px 26px;display:flex;align-items:center;gap:14px;
  }
  .crumbs{font-size:12.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crumbs b{color:var(--text)}
  .nav-btns{display:flex;gap:6px}
  .nav-btns button{
    background:var(--panel);border:1px solid var(--border2);color:var(--muted);
    border-radius:8px;padding:5px 11px;font-size:12.5px;cursor:pointer;
  }
  .nav-btns button:hover{background:var(--panel2);color:var(--text)}

  .content{max-width:980px;margin:0 auto;padding:30px 32px 120px}
  .content.wide{max-width:1180px}

  h2.title{font-size:27px;margin:0 0 6px;line-height:1.2;letter-spacing:-.3px}
  .meta-bar{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 22px}
  .chip{font-size:11.5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--panel);color:var(--muted);display:inline-flex;gap:5px;align-items:center}
  .chip b{color:var(--text);font-weight:600}
  .chip.g{border-color:#1f6f33;background:#0f2417;color:#7ee787}
  .chip.y{border-color:#6f5717;background:#241f0f;color:#f2cc60}
  .chip.r{border-color:#6f2420;background:#240f0f;color:#ff9d96}
  .chip.s{border-color:#4b2f6f;background:#1a0f24;color:#d2a8ff}

  .content h3{font-size:20px;margin:34px 0 10px;padding-top:8px;border-top:1px solid var(--border);color:#fff;letter-spacing:-.2px}
  .content h3:first-of-type{border-top:none;padding-top:0}
  .content h4{font-size:16px;margin:22px 0 8px;color:var(--accent2)}
  .content h5{font-size:14px;margin:16px 0 6px;color:var(--star);text-transform:uppercase;letter-spacing:.6px}
  .content p{margin:10px 0}
  .content ul,.content ol{margin:10px 0;padding-left:24px}
  .content li{margin:5px 0}
  .content li::marker{color:var(--faint)}
  .lead{font-size:16.5px;color:var(--muted);border-left:3px solid var(--accent);padding:2px 0 2px 16px;margin:0 0 4px}

  code.inl{background:var(--code-bg);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-family:'Cascadia Code',Consolas,Monaco,monospace;font-size:13px;color:#ffa657}

  /* callouts */
  .box{border-radius:var(--radius);padding:14px 16px 14px 18px;margin:16px 0;border:1px solid var(--border2);background:var(--panel);position:relative}
  .box .bt{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .box p:last-child,.box ul:last-child{margin-bottom:0}
  .box.why{border-left:4px solid var(--accent);background:#0e1a2b}
  .box.why .bt{color:var(--accent)}
  .box.warn{border-left:4px solid var(--warn);background:#231d0c}
  .box.warn .bt{color:var(--warn)}
  .box.err{border-left:4px solid var(--crit);background:#240f0f}
  .box.err .bt{color:var(--crit)}
  .box.best{border-left:4px solid var(--green);background:#0f2417}
  .box.best .bt{color:var(--green)}
  .box.analogy{border-left:4px solid var(--star);background:#190f24}
  .box.analogy .bt{color:var(--star)}
  .box.engine{border-left:4px solid #58c4dd;background:#0a1f26}
  .box.engine .bt{color:#58c4dd}
  .box.exer{border-left:4px solid #ff9d5c;background:#241608}
  .box.exer .bt{color:#ff9d5c}

  /* code blocks */
  pre{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;overflow-x:auto;margin:14px 0;position:relative}
  pre code{font-family:'Cascadia Code',Consolas,Monaco,monospace;font-size:13px;line-height:1.6;color:#c9d1d9;white-space:pre}
  pre .cap{position:absolute;top:8px;right:12px;font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}
  .tok-kw{color:var(--kw);font-weight:600}
  .tok-fn{color:var(--fn)}
  .tok-num{color:var(--num)}
  .tok-str{color:var(--str)}
  .tok-com{color:var(--com);font-style:italic}
  .tok-tbl{color:var(--tbl)}
  .tok-op{color:#ff7b72}

  /* tables */
  .tw-wrap{overflow-x:auto;margin:16px 0;border-radius:10px;border:1px solid var(--border)}
  table.dx{border-collapse:collapse;width:100%;font-size:13px;min-width:520px}
  table.dx th{background:var(--panel2);color:#fff;text-align:left;padding:9px 12px;border-bottom:2px solid var(--border2);font-weight:600;position:sticky;top:0}
  table.dx td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text)}
  table.dx tr:last-child td{border-bottom:none}
  table.dx tr:nth-child(even) td{background:rgba(255,255,255,.018)}
  table.dx tr:hover td{background:rgba(79,156,249,.06)}
  table.dx td b{color:#fff}

  /* ascii diagrams */
  .diagram{background:#0a0f18;border:1px dashed var(--border2);border-radius:10px;padding:16px;margin:16px 0;overflow-x:auto}
  .diagram pre{background:none;border:none;padding:0;margin:0;color:#9fd0ff;font-size:12.5px;line-height:1.45}

  /* relation / dep cards */
  .rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
  @media(max-width:760px){.rel-grid{grid-template-columns:1fr}}
  .rel-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .rel-card .h{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .pill{display:inline-block;margin:3px 5px 3px 0;padding:3px 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--border2);font-size:12px;cursor:pointer;color:var(--text)}
  .pill:hover{border-color:var(--accent);color:var(--accent)}
  .pill.fn{color:#d2a8ff;border-color:#3a2a52}
  .pill.fn:hover{background:#1a0f24}

  .next-prev{display:flex;justify-content:space-between;gap:14px;margin-top:46px;border-top:1px solid var(--border);padding-top:20px}
  .np{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;max-width:48%}
  .np:hover{border-color:var(--accent)}
  .np .d{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}
  .np .t{font-size:14px;color:var(--text);margin-top:3px}
  .np.n{text-align:right}

  .kbd{background:var(--panel2);border:1px solid var(--border2);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;font-family:monospace;color:var(--muted)}

  /* progressive level steps for CALCULATE */
  .levels{counter-reset:lvl;margin:18px 0}
  .lvl{border:1px solid var(--border);border-radius:10px;margin:10px 0;overflow:hidden;background:var(--panel)}
  .lvl-h{padding:11px 14px;background:var(--panel2);cursor:pointer;display:flex;align-items:center;gap:10px;font-weight:600}
  .lvl-h:hover{background:#222c3a}
  .lvl-h .n{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#4f9cf9,#bc8cff);color:#0b0f16;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex:0 0 auto}
  .lvl-h .arr{margin-left:auto;color:var(--faint);transition:transform .15s}
  .lvl.open .lvl-h .arr{transform:rotate(90deg)}
  .lvl-b{padding:4px 16px 14px;display:none}
  .lvl.open .lvl-b{display:block}

  .tag-mini{font-size:10px;padding:1px 6px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}

  .hidden{display:none !important}
  .empty-search{padding:20px;color:var(--muted);font-size:13px;text-align:center}
  .home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:22px 0}
  .home-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:.15s}
  .home-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
  .home-card .ic{font-size:22px}
  .home-card .t{font-size:15px;font-weight:600;margin:8px 0 4px;color:#fff}
  .home-card .d{font-size:12.5px;color:var(--muted)}

  .footnote{font-size:12px;color:var(--faint);margin-top:8px}
  .mob-toggle{display:none}
  @media(max-width:880px){
    .sidebar{position:fixed;z-index:50;transform:translateX(-100%);transition:transform .2s;box-shadow:var(--shadow)}
    .sidebar.open{transform:translateX(0)}
    .mob-toggle{display:inline-flex}
    .content{padding:22px 18px 100px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="brand">
        <div class="logo">Σ</div>
        <div>
          <h1>Atlas DAX</h1>
          <div class="sub">Artefacto interactivo · Power BI · DAX · Analítica Corporativa</div>
        </div>
      </div>
      <div class="search">
        <span class="ico">🔍</span>
        <input id="searchInput" type="text" placeholder="Buscar conceptos, funciones, escenarios…" autocomplete="off">
        <span class="clr" id="searchClear">✕</span>
      </div>
      <div class="legend">
        <span>🟢 Fundamental</span>
        <span>🟡 Importante</span>
        <span>🔴 Avanzado</span>
        <span>⭐ Crítico senior</span>
        <span>⚠️ Suele confundir</span>
      </div>
    </div>
    <nav class="tree" id="tree"></nav>
  </aside>

  <main class="main" id="main">
    <div class="topbar">
      <button class="nav-btns mob-toggle" id="mobToggle" style="border:1px solid var(--border2);background:var(--panel);color:var(--muted);border-radius:8px;padding:5px 11px;cursor:pointer">☰</button>
      <div class="crumbs" id="crumbs"></div>
      <div class="nav-btns">
        <button id="btnPrev">← Anterior</button>
        <button id="btnNext">Siguiente →</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
/* ============================================================
   ATLAS DAX — Motor de navegación
   El contenido vive en el array NODES (data-driven).
   Cada nodo: {id, parent, title, icon, importancia, dificultad,
               uso, deps[], related[], fns[], html}
   ============================================================ */
const NODES = [];
/* ---------- Helpers para escribir nodos de forma compacta ---------- */
const N = o => NODES.push(o);
function _esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const dax = (s,cap) => '<pre><span class="cap">'+(cap||'DAX')+'</span><code class="dax">'+_esc(s.replace(/^\n/,'').replace(/\n\s*$/,''))+'</code></pre>';
const mq = (s,cap) => '<pre><span class="cap">'+(cap||'M · Power Query')+'</span><code class="mcode">'+_esc(s.replace(/^\n/,'').replace(/\n\s*$/,''))+'</code></pre>';
const box = (cls,title,body) => '<div class="box '+cls+'"><div class="bt">'+title+'</div>'+body+'</div>';
const why    = (t,b)=>box('why','💡 Por qué importa'+(t?': '+t:''),b);
const analogy= (t,b)=>box('analogy','🎭 Analogía'+(t?': '+t:''),b);
const engine = (t,b)=>box('engine','⚙️ Qué ocurre internamente'+(t?': '+t:''),b);
const warn   = (t,b)=>box('warn','⚠️ '+(t||'Cuidado'),b);
const err    = (t,b)=>box('err','❌ '+(t||'Error frecuente'),b);
const best   = (t,b)=>box('best','✅ '+(t||'Mejores prácticas'),b);
const exer   = (t,b)=>box('exer','✏️ '+(t||'Ejercicio'),b);
const diagram= s=>'<div class="diagram"><pre>'+_esc(s.replace(/^\n/,'').replace(/\n\s*$/,''))+'</pre></div>';
function tbl(headers, rows){
  let h='<div class="tw-wrap"><table class="dx"><thead><tr>'+headers.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{ h+='<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>'; });
  return h+'</tbody></table></div>';
}

/* ===================== INICIO ===================== */
N({ id:'home', parent:null, title:'Inicio · Cómo usar este Atlas', icon:'🏠',
  importancia:'★★★★★', dificultad:'Lectura', uso:'Empieza aquí',
  subtitle:'Un único artefacto navegable que funciona a la vez como mapa de conocimiento, roadmap, manual de consulta, wiki técnica y centro de referencia profesional. Organizado en dos grandes categorías: Power BI / DAX y Power Query / M, para Finanzas, Planeamiento, Control de Gestión e Inteligencia Comercial.',
  html: ()=> `
  ${why('No es un curso lineal', `<p>Este artefacto está pensado para <b>navegación no lineal</b>. No tienes que leerlo en orden. La barra lateral es un <b>árbol de conocimiento</b>: expándelo, busca, salta entre conceptos relacionados y sigue las dependencias. Cada nodo es autocontenido y enseña algo real.</p>`)}

  <h3>Las dos categorías del Atlas</h3>
  <p>El conocimiento está dividido en dos grandes bloques que cubren el flujo completo de un proyecto de BI: <b>primero preparas los datos</b> (Power Query) y <b>luego los modelas y mides</b> (Power BI / DAX).</p>
  <div class="home-grid">
    <div class="home-card" data-go="powerquery"><div class="ic">🔌</div><div class="t">Power Query / M</div><div class="d">Limpieza y transformación de datos paso a paso: encabezados, tipos, unpivot/pivot, combinar consultas, lenguaje M. El "antes" de todo modelo.</div></div>
    <div class="home-card" data-go="powerbi"><div class="ic">📊</div><div class="t">Power BI / DAX</div><div class="d">Modelado, motor DAX, CALCULATE, catálogo de funciones, simuladores corporativos, performance y casos de negocio. El "después": medir y analizar.</div></div>
  </div>
  ${analogy('El orden natural: cocinar antes de servir', `<p><b>Power Query es la cocina de preparación</b> (lavas, cortas y ordenas los ingredientes = limpias y transformas los datos). <b>Power BI / DAX es el servicio</b> (con los ingredientes listos, cocinas los platos = construyes medidas y análisis). Un buen plato empieza por buenos ingredientes: por eso conviene dominar Power Query antes (o a la par) de DAX.</p>`)}
  <p>Cada nodo declara su <b>importancia</b>, <b>dificultad</b>, <b>requisitos previos</b>, <b>conceptos relacionados</b> y <b>funciones asociadas</b> (todos clicables, para saltar entre ideas conectadas).</p>

  <h3>Indicadores visuales que verás en todo el árbol</h3>
  ${tbl(['Indicador','Significado','Cómo interpretarlo'],[
    ['🟢','Fundamental','Base imprescindible. Si esto no está sólido, lo demás se derrumba.'],
    ['🟡','Importante','Lo usarás de forma habitual en proyectos reales.'],
    ['🔴','Avanzado','Requiere dominio previo. Aquí se separa el intermedio del senior.'],
    ['⭐','Crítico para desarrolladores senior','Diferencia a quien "escribe medidas" de quien "diseña soluciones".'],
    ['⚠️','Suele generar confusión','Punto donde casi todos tropiezan. Léelo dos veces.'],
  ])}

  <h3>Ruta de aprendizaje recomendada</h3>
  ${diagram(`
  ┌─────────────────────────────────────────────────────────────────────┐
  │  1. MODELO MENTAL        2. EL CORAZÓN         3. HERRAMIENTAS        │
  │  ─────────────────       ─────────────         ───────────────       │
  │  Motor DAX               CALCULATE  ⭐          Catálogo de           │
  │   • Contexto de fila  →   • 9 niveles      →    funciones            │
  │   • Contexto de filtro    • leer/depurar        (filtros, tiempo,    │
  │   • Transición            • anticipar           iteradores…)         │
  │   • Relaciones            mentalmente                                 │
  │   • Star schema                                  │                    │
  │        │                       │                 ▼                    │
  │        └───────────────────────┴──────►  4. APLICACIÓN REAL          │
  │                                          ────────────────            │
  │                                          • Simuladores (9 escenarios)│
  │                                          • Performance               │
  │                                          • Casos de negocio          │
  └─────────────────────────────────────────────────────────────────────┘`)}

  ${best('Cómo sacarle el máximo', `<ul>
    <li><b>Lee el "por qué" antes del "cómo".</b> Cada nodo explica primero la intuición y el problema de negocio, luego la técnica.</li>
    <li><b>Haz los ejercicios mentalmente.</b> No memorices: predice el resultado de cada medida antes de leer la solución.</li>
    <li><b>Sigue las dependencias.</b> Si un nodo asume algo que no dominas, salta a su requisito previo (los chips son clicables) y vuelve.</li>
    <li><b>Usa la búsqueda</b> (tecla <span class="kbd">/</span>) para ir directo a una función o concepto. Navega con <span class="kbd">←</span> <span class="kbd">→</span>.</li>

N({ id:'ctx-fila', parent:'motor', title:'Contexto de Fila', icon:'🟢',
  importancia:'★★★★☆', dificultad:'🟢 Fundamental', uso:'Iteradores y columnas',
  subtitle:'"¿En qué fila estoy parado ahora mismo?" El contexto que te da acceso a los valores de una fila concreta.',
  deps:['motor'], related:['ctx-filtro','transicion'], fns:['fn-iteradores','fn-tablas'],
  html: ()=> `
  <h3>1 · Explicación simple</h3>
  <p>El <b>contexto de fila</b> es la idea de "estar parado en una fila concreta de una tabla". Cuando estás en esa fila, puedes leer el valor de cualquier columna <i>de esa fila</i>. Es exactamente lo que ocurre en Excel cuando escribes una fórmula en la celda <code class="inl">D2</code> que usa <code class="inl">B2*C2</code>: estás "en la fila 2".</p>

  <h3>2 · Explicación conceptual</h3>
  <p>El contexto de fila aparece en dos situaciones, y solo en dos:</p>
  <ul>
    <li><b>Columnas calculadas:</b> se evalúan fila por fila para toda la tabla. Cada fila trae su propio contexto de fila automáticamente.</li>
    <li><b>Funciones iteradoras</b> (las que terminan en <b>X</b>: <code class="inl">SUMX</code>, <code class="inl">AVERAGEX</code>, <code class="inl">RANKX</code>…, y también <code class="inl">FILTER</code>): recorren una tabla fila a fila y, en cada paso, abren un contexto de fila.</li>
  </ul>
  ${analogy('El dedo sobre el renglón', `<p>Imagina que lees una tabla impresa con el dedo apoyado en un renglón. Mientras tu dedo está en la fila de "Juan", puedes leer su sueldo, su área, su antigüedad. El contexto de fila <b>es ese dedo</b>: te da acceso a los valores de la fila donde estás parado, una a la vez.</p>`)}

  <h3>3 · Explicación técnica</h3>
  <p>El contexto de fila <b>NO filtra el modelo</b>. Esta es la confusión número uno. Estar parado en la fila de "Juan" <b>no</b> filtra automáticamente el resto del modelo a Juan. Solo te da acceso a leer las columnas de esa fila.</p>
  ${dax(`
Margen = Ventas[Precio] - Ventas[Costo]   // columna calculada
// En cada fila, lee Precio y Costo DE ESA FILA. Eso es contexto de fila.`)}
  ${dax(`
Ingreso Total =
SUMX (
    Ventas,                              -- itera fila a fila sobre Ventas
    Ventas[Cantidad] * Ventas[Precio]    -- en cada fila lee Cantidad y Precio
)`)}

  ${engine('', `<p>Internamente, <code class="inl">SUMX(Ventas, ...)</code> hace esto:</p>
  <ol>
    <li>Toma la tabla <code class="inl">Ventas</code> <b>ya filtrada por el contexto de filtro actual</b>.</li>
    <li>Para cada fila, abre un contexto de fila apuntando a esa fila.</li>
    <li>Evalúa la expresión (<code class="inl">Cantidad * Precio</code>) leyendo los valores de esa fila.</li>
    <li>Acumula el resultado y pasa a la siguiente fila.</li>
  </ol>`)}

  <h3>4 · El detalle que separa intermedios de seniors ⚠️</h3>
  ${warn('Contexto de fila NO recorre relaciones por sí solo', `<p>Si estás en una fila de <code class="inl">Ventas</code> y quieres el nombre de la categoría que vive en la tabla <code class="inl">Productos</code>, <b>el contexto de fila no cruza la relación automáticamente</b>. Necesitas <code class="inl">RELATED</code> para "saltar" del lado muchos al lado uno:</p>
  ${dax(`
Venta con Categoría =
SUMX (
    Ventas,
    Ventas[Cantidad] * RELATED ( Productos[Precio] )   -- RELATED cruza la relación
)`)}
  <p>Sin <code class="inl">RELATED</code>, el contexto de fila de <code class="inl">Ventas</code> no "ve" las columnas de <code class="inl">Productos</code>.</p>`)}

  <h3>5 · Caso empresarial</h3>
  <p><b>Cálculo de OPEX ponderado por tipo de cambio.</b> Tienes gastos en distintas monedas y un tipo de cambio por fila. No puedes sumar primero y convertir después; debes convertir <i>fila a fila</i>:</p>
  ${dax(`
OPEX en USD =
SUMX (
    Gastos,
    Gastos[Importe Local] * RELATED ( TipoCambio[Tasa USD] )
)`)}

  <h3>6 · Errores frecuentes</h3>
  ${err('Usar SUM cuando necesitas SUMX', `<p><code class="inl">SUM(Ventas[Cantidad] * Ventas[Precio])</code> <b>no compila</b>. <code class="inl">SUM</code> solo acepta una columna, no una expresión por fila. Necesitas <code class="inl">SUMX</code> porque hay una operación que debe ocurrir <i>en cada fila</i> antes de sumar.</p>`)}
  ${err('Creer que el contexto de fila filtra', `<p>Una columna calculada <code class="inl">Total Cliente = SUM(Ventas[Importe])</code> en la tabla de clientes da el <b>gran total para todos</b>, no el total de ese cliente. ¿Por qué? Porque el contexto de fila no se convierte en filtro automáticamente. Para eso necesitas <span class="pill" data-go="transicion">transición de contexto</span> (CALCULATE).</p>`)}

  <h3>7 · Mejores prácticas</h3>
  ${best('', `<ul>
    <li>Usa iteradores (X) <b>solo</b> cuando necesitas operar fila a fila. Si la columna ya tiene el valor listo, <code class="inl">SUM</code> es más barato.</li>
    <li>Prefiere <code class="inl">RELATED</code> dentro de iteradores a crear columnas calculadas que dupliquen datos.</li>
    <li>Recuerda: <b>contexto de fila = acceso a valores</b>, <b>contexto de filtro = qué filas existen</b>. Son cosas distintas.</li>
  </ul>`)}

  ${exer('Predice el resultado', `<p>Tabla <code class="inl">Ventas</code>: 3 filas → (Cant 2, Precio 10), (Cant 1, Precio 50), (Cant 4, Precio 5).</p>
  <p>¿Cuánto da <code class="inl">SUMX(Ventas, Ventas[Cantidad] * Ventas[Precio])</code>?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución paso a paso</summary>
  <p>Fila 1: 2×10 = 20 · Fila 2: 1×50 = 50 · Fila 3: 4×5 = 20. SUMX acumula: 20+50+20 = <b>90</b>. Nota que <code class="inl">SUM(Cant)×SUM(Precio)</code> daría 7×65 = 455, ¡completamente distinto! Ese es el sentido del iterador: multiplica <i>dentro</i> de cada fila.</p></details>`)}
  `
});

N({ id:'transicion', parent:'motor', title:'Transición de Contexto', icon:'🔴⚠️⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado (clave senior)', uso:'Medidas dentro de iteradores',
  subtitle:'El mecanismo por el que CALCULATE convierte el contexto de fila en contexto de filtro. El concepto que "desbloquea" el DAX avanzado y el que más errores silenciosos causa.',
  deps:['ctx-fila','ctx-filtro'], related:['calculate','sim-2','sim-6'], fns:['calculate','fn-iteradores'],
  html: ()=> `
  ${why('Es el puente entre los dos contextos', `<p>Hasta ahora tienes dos mundos separados: el contexto de fila (leer valores) y el de filtro (qué filas existen). La <b>transición de contexto</b> es el único puente entre ellos. Entenderla explica por qué una medida dentro de <code class="inl">SUMX</code> "de repente" funciona, por qué una columna calculada con una medida da el valor correcto por fila, y por qué a veces tu cálculo "se filtra solo" sin que lo pidieras.</p>`)}

  <h3>1 · Explicación simple</h3>
  <p><b>Transición de contexto = "convertir dónde estoy parado en un filtro".</b> Cuando hay un contexto de fila y aparece <code class="inl">CALCULATE</code> (o llamas a una medida, que lleva un CALCULATE implícito), el motor toma los valores de la fila actual y los <b>transforma en filtros</b> sobre el modelo.</p>

  ${analogy('De señalar a aislar', `<p>En el contexto de fila tu dedo señala la fila de "Cliente A" (puedes leer sus datos, pero el resto del modelo sigue completo). La transición de contexto es como decir: <b>"ahora el restaurante entero solo cocina para Cliente A"</b>. Pasaste de <i>señalar una fila</i> a <i>aislar todo el modelo a esa fila</i>. Ese salto lo hace CALCULATE.</p>`)}

  <h3>2 · El disparador: CALCULATE (explícito o implícito)</h3>
  ${warn('Toda medida lleva un CALCULATE invisible', `<p>Cuando escribes <code class="inl">[Ventas]</code> (una medida) dentro de un iterador, DAX la envuelve automáticamente: se comporta como <code class="inl">CALCULATE([Ventas])</code>. Por eso <b>llamar a una medida dentro de un contexto de fila SIEMPRE dispara transición de contexto</b>, aunque no escribas CALCULATE. Esta es la fuente nº1 de resultados "mágicos" que no entiendes.</p>`)}

  <h3>3 · El ejemplo canónico</h3>
  <p>Columna calculada en la tabla <code class="inl">Clientes</code>:</p>
  ${dax(`
-- ❌ SIN transición: el contexto de fila NO filtra
Total A = SUM ( Ventas[Importe] )
-- Resultado: el GRAN TOTAL en cada fila (no filtra por cliente)`)}
  ${dax(`
-- ✅ CON transición: CALCULATE convierte la fila en filtro
Total B = CALCULATE ( SUM ( Ventas[Importe] ) )
-- Resultado: el total DE ESE cliente en cada fila`)}
  ${engine('Qué hace CALCULATE en Total B, paso a paso', `<ol>
    <li>Estamos en la fila de, digamos, "Cliente A" (contexto de fila).</li>
    <li><code class="inl">CALCULATE</code> detecta que hay contexto de fila activo.</li>
    <li>Lee <b>todas las columnas de la fila actual</b>: Clientes[ClienteID]=A, Clientes[Nombre]="A", etc.</li>
    <li>Las convierte en <b>filtros</b>: contexto de filtro += {Clientes[ClienteID]=A …}.</li>
    <li>Ese filtro se propaga por la relación Clientes→Ventas, recortando Ventas a las de A.</li>
    <li><code class="inl">SUM(Ventas[Importe])</code> se evalúa ya filtrado → total de A. ✔</li>
  </ol>`)}

  <h3>4 · Dónde aparece en la práctica</h3>
  ${tbl(['Situación','¿Hay transición?','Por qué'],[
    ['Columna calculada que llama a una medida','Sí','La medida = CALCULATE implícito + hay contexto de fila'],
    ['SUMX(Clientes, [Ventas])','Sí, en cada iteración','La medida [Ventas] dispara transición por cada fila de Clientes'],
    ['SUMX(Ventas, Ventas[Cant]*Ventas[Precio])','No','No hay medida ni CALCULATE; solo se leen columnas'],
    ['Medida directa en una tarjeta','No (no hay contexto de fila que convertir)','Solo hay contexto de filtro'],
  ])}

  <h3>5 · Caso empresarial: clientes por encima de su media</h3>
  <p>"¿Cuántos clientes facturan más que el promedio de facturación por cliente?" Necesitas, por cada cliente, su propio total (transición) y compararlo:</p>
  ${dax(`
Clientes Sobre Media =
VAR MediaPorCliente =
    AVERAGEX ( Clientes, [Ventas] )       -- [Ventas] dispara transición: total de cada cliente
RETURN
    COUNTROWS (
        FILTER ( Clientes, [Ventas] > MediaPorCliente )  -- de nuevo transición por fila
    )`)}
  <p>Sin transición, <code class="inl">[Ventas]</code> daría el gran total en cada fila y todos serían iguales. La transición es lo que hace que <code class="inl">[Ventas]</code> signifique "las ventas de <i>este</i> cliente".</p>

  <h3>6 · Errores frecuentes</h3>
  ${err('Performance: transición masiva', `<p><code class="inl">SUMX(TablaGrande, [Medida])</code> dispara una transición de contexto <b>por cada fila</b>. Sobre millones de filas, esto puede ser lentísimo. A menudo se reescribe iterando sobre una dimensión pequeña o evitando la medida dentro del iterador. Ver <span class="pill" data-go="performance">Performance</span>.</p>`)}
  ${err('Transición no deseada que "ensucia" el filtro', `<p>A veces la transición añade filtros que NO querías (todas las columnas de la fila). Si solo necesitabas filtrar por una clave, usa <code class="inl">VALUES</code>/<code class="inl">SELECTEDVALUE</code> en lugar de confiar en la transición completa.</p>`)}

  <h3>7 · Mejores prácticas</h3>
  ${best('', `<ul>
    <li>Cuando veas una <b>medida llamada dentro de un iterador</b>, di mentalmente: "aquí hay transición de contexto". Eso explica el 90% de los resultados extraños.</li>
    <li>Itera sobre <b>dimensiones pequeñas</b> (Clientes, Productos), no sobre la tabla de hechos, cuando uses transición.</li>
    <li>Si solo necesitas un valor escalar de la fila, considera capturarlo con <code class="inl">VAR</code> antes de entrar en CALCULATE.</li>
  </ul>`)}

  ${exer('El clásico que todos fallan', `<p>Columna calculada en <code class="inl">Productos</code>: <code class="inl">Ventas Prod = SUM(Ventas[Importe])</code>. Hay 3 productos. Las ventas totales del modelo son 1000.</p>
  <p>¿Qué muestra cada fila?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary>
  <p>Las tres filas muestran <b>1000</b> (el gran total), porque <code class="inl">SUM</code> sin CALCULATE no convierte el contexto de fila en filtro. Para obtener las ventas de cada producto necesitas <code class="inl">CALCULATE(SUM(Ventas[Importe]))</code> → eso dispara la transición y cada fila muestra su propio total. <b>Recuerda esta diferencia: es la prueba de fuego de si entendiste el concepto.</b></p></details>`)}
  `
});

  <h3>2 · Dirección del filtro: por dónde viaja</h3>
  ${diagram(`

        Ventas (*)                              Ventas (*)

   El filtro va SIEMPRE del lado "1"        El filtro puede subir de "*" a "1".

  ${engine('Propagación paso a paso', `<p>Al seleccionar "Cliente A" en un slicer:</p>
  <ol>

    <li>Por la relación 1:* el filtro <b>desciende</b> a <code class="inl">Ventas</code>: solo filas con ClienteID = A.</li>

  <h3>3 · Por qué la dirección simple es la mejor práctica</h3>

  <h3>1 · Explicación simple</h3>

  <h3>3 · Las tres operaciones sobre filtros ⭐</h3>

    ['<b>REEMPLAZAR</b>','Sustituye el filtro de una columna por otro','Filtro sobre una columna ya filtrada por el visual','Cambiar "este mes" por "YTD"'],
    ['<b>QUITAR / CONSERVAR</b>','Borra filtros (ALL) o los preserva (KEEPFILTERS)','<code class="inl">CALCULATE([V], ALL(Calendario))</code>','Denominador del % del total'],
  ])}

  <h3>4 · Regla de oro: ¿qué hace con CADA filtro? ⚠️</h3>
  ${warn('La regla que debes interiorizar', `<p>Cuando CALCULATE recibe un filtro sobre la columna <b>X</b>:</p>
  <ul>
    <li><b>Reemplaza</b> cualquier filtro previo que existiera <i>sobre esa misma columna X</i>.</li>

  <p>Ejemplo: la celda tiene {Año=2026, Región=Norte}. Escribes <code class="inl">CALCULATE([V], Calendario[Año]=2025)</code>. Resultado: el filtro de Año pasa a 2025 (<b>reemplazado</b>), pero Región=Norte <b>se conserva</b>. Esta regla explica por qué <code class="inl">SAMEPERIODLASTYEAR</code> solo cambia la fecha y respeta los demás slicers.</p>`)}

    ${engine('', `<p><code class="inl">SUMX</code> itera por cliente. En cada fila, <code class="inl">[Ventas]</code> dispara <b>transición de contexto</b> (CALCULATE implícito): filtra a ese cliente y suma. Se multiplica por su factor y se acumula. Aquí conviven los tres conceptos: contexto de fila (SUMX), transición (la medida dentro) y modificación de contexto.</p>`)}
    ${warn('Itera sobre la dimensión, no sobre los hechos', `<p>Usamos <code class="inl">VALUES(Clientes[ClienteID])</code> (pocas filas), no <code class="inl">Ventas</code> (millones). Iterar la tabla de hechos con transición dentro es un antipatrón de performance.</p>`)}
  </div></div>

  <div class="lvl"><div class="lvl-h"><span class="n">9</span> Casos corporativos avanzados <span class="tag-mini">🔴⭐⚠️</span><span class="arr">▸</span></div><div class="lvl-b">
    <h5>9a · Variación Real vs Presupuesto, solo cuentas de OPEX</h5>
    ${dax(`
Desvío OPEX =
VAR Real =
    CALCULATE ( [Importe], Escenario[Tipo] = "Real",    PlanCuentas[Grupo] = "OPEX" )
VAR Ppto =
    CALCULATE ( [Importe], Escenario[Tipo] = "Ppto", PlanCuentas[Grupo] = "OPEX" )
RETURN
    Real - Ppto`)}
    <p>Cada CALCULATE <b>reemplaza</b> el filtro de Escenario y <b>agrega</b> el de grupo de cuentas, conservando el resto del contexto (mes, CECO).</p>

    <h5>9b · Margen contributivo sobre lo seleccionado (ALLSELECTED)</h5>
    ${dax(`
% sobre Selección =
DIVIDE ( [Margen], CALCULATE ( [Margen], ALLSELECTED ( Productos ) ) )`)}
    <p><code class="inl">ALLSELECTED</code> da el total de <b>lo que el usuario filtró en el slicer</b>, ignorando solo el desglose interno del visual. Distinto de <code class="inl">ALL</code> (que ignoraría también el slicer).</p>

    <h5>9c · Ranking de clientes que respeta filtros, con desempate</h5>
    ${dax(`
Ranking Cliente =
IF (
    HASONEVALUE ( Clientes[ClienteID] ),
    RANKX ( ALLSELECTED ( Clientes[ClienteID] ), [Ventas], , DESC, DENSE )
)`)}
    ${best('Patrón senior', `<p>Fíjate en la receta repetida: <b>VAR para capturar, CALCULATE para reescribir el contexto, una función de filtro (ALL/ALLSELECTED/REMOVEFILTERS) para definir el universo, y un guard (HASONEVALUE/SELECTEDVALUE) para los totales.</b> Casi toda medida corporativa avanzada es una combinación de estas cuatro piezas.</p>`)}
  </div></div>

  </div>

  ${exer('Predice antes de desplegar', `<p>Celda "Cliente B / Marzo". Medida: <code class="inl">CALCULATE([Ventas], ALL(Clientes), Calendario[Mes]="Marzo")</code>. B tiene 50 en marzo; todos los clientes juntos tienen 500 en marzo.</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary>
  <p><b>500.</b> <code class="inl">ALL(Clientes)</code> borra el filtro Cliente=B (ya no importa que estemos en la fila de B). <code class="inl">Calendario[Mes]="Marzo"</code> reemplaza/confirma el mes. Resultado: ventas de <i>todos</i> los clientes en marzo = 500, en <b>todas</b> las filas de la matriz. Un error clásico: esperar 50 porque "estoy en la fila de B" — pero ALL lo eliminó.</p></details>`)}
  `
});

N({ id:'calc-leer', parent:'calculate', title:'Leer, Depurar y Anticipar Medidas Complejas', icon:'🔍⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado', uso:'Cada día como senior',
  subtitle:'La habilidad que define al senior: mirar una medida de 30 líneas y saber qué hará antes de ejecutarla, encontrar el error de contexto y corregirlo con método.',
  deps:['calculate','evaluacion'], related:['calc-niveles','performance'], fns:['fn-variables'],
  html: ()=> `
  ${why('Anticipar mentalmente es lo que separa niveles', `<p>Un intermedio escribe, ejecuta, ve un número raro y prueba otra cosa al azar. Un senior <b>lee la medida como una receta</b>, predice el número, y si no coincide sabe exactamente dónde mirar. Esta página te da el método para leer de dentro hacia afuera y depurar con disciplina.</p>`)}

  <h3>1 · Cómo leer una medida: de dentro hacia afuera</h3>
  <p>DAX se evalúa <b>desde el paréntesis más interno hacia afuera</b>, y las variables de arriba a abajo. Lee igual:</p>
  ${dax(`
Crecimiento Clientes Clave =
VAR Umbral      = 100000                                    -- (1) un número
VAR TopClientes =                                          -- (2) tabla de clientes grandes
    FILTER ( VALUES ( Clientes[ClienteID] ), [Ventas] > Umbral )
VAR VentaTop    = CALCULATE ( [Ventas], TopClientes )       -- (3) ventas de esos clientes
VAR VentaTopAA  =                                          -- (4) lo mismo, año anterior
    CALCULATE ( [Ventas], TopClientes, SAMEPERIODLASTYEAR ( Calendario[Fecha] ) )
RETURN
    DIVIDE ( VentaTop - VentaTopAA, VentaTopAA )            -- (5) variación %`)}
  ${engine('Lectura narrada', `<ol>
    <li><b>Umbral</b> = 100.000. Constante.</li>
    <li><b>TopClientes</b>: recorre clientes; <code class="inl">[Ventas]</code> dispara transición → ventas de cada cliente; conserva los que superan el umbral. Es una <i>tabla</i>.</li>
    <li><b>VentaTop</b>: CALCULATE usa esa tabla como filtro → ventas de los clientes clave en el contexto actual.</li>
    <li><b>VentaTopAA</b>: mismo filtro de clientes <b>+</b> desplazamiento de fechas al año anterior (dos filtros que se combinan).</li>
    <li><b>RETURN</b>: variación interanual de los clientes clave.</li>
  </ol>`)}

  <h3>2 · El "checklist de contexto" para predecir un resultado</h3>
  ${best('Hazte estas 5 preguntas en cada CALCULATE', `<ol>
    <li><b>¿Dónde estoy?</b> ¿En qué celda/total se evalúa? ¿Qué slicers hay?</li>
    <li><b>¿Hay contexto de fila?</b> Si sí, ¿habrá transición que filtre cosas que no esperaba?</li>
    <li><b>Por cada filtro:</b> ¿lo agrego, lo reemplazo o lo quito? ¿sobre qué columna?</li>
    <li><b>¿Qué conservo?</b> ¿Qué filtros del visual siguen vivos tras el CALCULATE?</li>
    <li><b>¿El total cuadra?</b> Mentalmente evalúa también la fila Total (sin filtro de desglose); muchos bugs solo aparecen ahí.</li>
  </ol>`)}

  <h3>3 · Técnicas de depuración</h3>
  ${tbl(['Síntoma','Causa probable','Cómo depurar'],[
    ['Todas las filas muestran el mismo número (el total)','Falta transición de contexto o hay un <code class="inl">ALL</code> de más','Quita el ALL o envuelve en CALCULATE para forzar transición'],
    ['El total no es la suma de las filas','La medida no es aditiva (% , ratios, DISTINCTCOUNT)','Normal en ratios; si es una suma, revisa filtros que cambian entre fila y total'],
    ['Un slicer no afecta la medida','Un <code class="inl">ALL/REMOVEFILTERS</code> borra ese filtro, o la relación no propaga','Cambia ALL por ALLSELECTED, o revisa dirección de relación'],
    ['BLANK inesperado','Año anterior sin datos, división, o filtro que vacía la tabla','Usa <code class="inl">COALESCE</code>/<code class="inl">DIVIDE</code>; aísla cada VAR'],
    ['Número correcto en celda, raro en total','La medida asume un único valor (SELECTEDVALUE) que en el total no existe','Añade guard <code class="inl">HASONEVALUE</code>'],
  ])}

  <h3>4 · Aislar variables: el "console.log" de DAX</h3>
  ${best('Técnica del RETURN temporal', `<p>Para ver qué vale un paso intermedio, cambia temporalmente el RETURN para devolver esa variable:</p>
  ${dax(`
Medida Debug =
VAR A = CALCULATE ( [Ventas], ALL ( Clientes ) )
VAR B = [Ventas]
RETURN
    A          -- ← cambia entre A, B, A-B para inspeccionar cada pieza`)}
  <p>Pon la medida en una <b>tarjeta</b> y ve cambiando qué VAR devuelve. También usa el panel <b>"Ver como"</b>, el <b>Performance Analyzer</b> y herramientas externas (DAX Studio) para inspeccionar el plan de consulta.</p>`)}

  <h3>5 · Identificar errores de contexto típicos</h3>
  ${err('El "filtro fantasma" de la transición', `<p>Dentro de un iterador, una medida arrastra <b>todas</b> las columnas de la fila como filtro. Si iteras una tabla con muchas columnas, puedes filtrar por cosas que no querías. Solución: itera sobre <code class="inl">VALUES(Dim[Clave])</code> (solo la clave), no sobre la tabla entera.</p>`)}
  ${err('Reemplazo no intencionado', `<p>Pasar <code class="inl">Calendario[Año]=2025</code> dentro de una medida que el usuario filtró por 2026 <b>reemplaza</b> su selección sin avisar. Si querías <i>intersectar</i> y no reemplazar, usa <code class="inl">KEEPFILTERS(Calendario[Año]=2025)</code>.</p>`)}

  <h3>6 · Anticipar el resultado: ejercicio final del módulo</h3>
  ${exer('Lee y predice (nivel senior)', `<p>Contexto de celda: {Año=2026, Región=Sur}. Sur en 2026 = 800; Sur en 2025 = 1000; todas las regiones 2026 = 5000.</p>
  ${dax(`
Mix Var =
VAR A = CALCULATE ( [Ventas], SAMEPERIODLASTYEAR ( Calendario[Fecha] ) )
VAR B = CALCULATE ( [Ventas], ALL ( Clientes[Región] ) )
RETURN DIVIDE ( [Ventas], B ) - DIVIDE ( A, B )`)}
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary>
  <p><b>A</b> = Sur 2025 = 1000 (reemplaza fecha, conserva Región=Sur). <b>B</b> = quita filtro de Región pero conserva Año=2026 → 5000. <code class="inl">[Ventas]</code> = Sur 2026 = 800.<br>
  RETURN = 800/5000 − 1000/5000 = 0,16 − 0,20 = <b>−0,04</b> (la cuota de Sur cayó 4 puntos respecto al peso que tendría con sus ventas del año anterior). Si predijiste el signo y las dos divisiones, ya lees DAX como senior.</p></details>`)}

  ${analogy('Depurar es como revisar una receta que salió mal', `<p>No tiras el plato entero: pruebas cada ingrediente. ¿La sal (el filtro de año)? ¿El fuego (la transición)? ¿Olvidaste un paso (un KEEPFILTERS)? El <code class="inl">VAR</code> + RETURN temporal es tu cuchara para probar cada parte por separado.</p>`)}
  `
});

N({ id:'fn-agregacion', parent:'funciones', title:'Agregación: SUM, AVERAGE, COUNT, DISTINCTCOUNT, MIN, MAX', icon:'🟢',

N({ id:'fn-filtros', parent:'funciones', title:'Filtros: CALCULATE, FILTER, ALL, ALLEXCEPT, ALLSELECTED, REMOVEFILTERS, KEEPFILTERS', icon:'🔴⚠️⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado', uso:'Constante',
  deps:['calculate'], related:['ctx-filtro','calc-niveles'], fns:['calculate'],
  subtitle:'La familia que manipula el contexto de filtro. Aquí vive casi toda la dificultad real de DAX. Dominar estas siete funciones es dominar el lenguaje.',
  html: ()=> `
  ${why('Filtrar bien es el 80% del DAX avanzado', `<p>Comparativos, porcentajes, rankings, simuladores: todo se reduce a <b>qué filtros agregas, quitas o conservas</b>. Estas funciones son los verbos de esa gramática. La confusión entre ALL / ALLSELECTED / ALLEXCEPT / KEEPFILTERS es la causa nº1 de medidas que "casi funcionan".</p>`)}

  ${tbl(['Función','Qué hace con los filtros','Caso de uso','⚠️ Confusión típica'],[
    ['<b>CALCULATE</b>','Modifica el contexto (agrega/reemplaza)','Todo cálculo con cambio de contexto','Creer que "agrega" números (no, solo cambia contexto)'],
    ['<b>FILTER</b>','Devuelve una tabla filtrada fila a fila','Condiciones complejas/multi-columna','Usarlo para filtros simples (lento)'],
    ['<b>ALL</b>','Quita TODOS los filtros de tabla/columna','Denominador del % del total','Olvidar que también ignora el slicer'],
    ['<b>REMOVEFILTERS</b>','= ALL como removedor, pero legible','Limpiar filtros con intención clara','—'],
    ['<b>ALLEXCEPT</b>','Quita todo MENOS las columnas indicadas','% dentro de una categoría','Confundir qué se conserva vs qué se quita'],
    ['<b>ALLSELECTED</b>','Respeta lo del slicer, ignora el desglose del visual','% sobre lo seleccionado','Pensar que es igual a ALL'],

  ])}

  <h4>ALL vs ALLSELECTED vs ALLEXCEPT — el cuadro que resuelve la confusión ⚠️</h4>
  ${diagram(`
  Contexto: slicer Año=2026 ; matriz con Clientes en filas ; estás en Cliente A

  [Ventas]                  → A en 2026                (todo el contexto)
  ALL(Clientes)             → TODOS los clientes, 2026  (quita Cliente, deja Año)
  ALLSELECTED(Clientes)     → clientes del slicer, 2026 (quita solo el desglose de fila)

CALCULATE ( [Ventas], Productos[Tipo] = "Estándar" )

-- Con KEEPFILTERS: intersecta. En la celda "Premium" da BLANK

CALCULATE ( [Ventas], KEEPFILTERS ( Productos[Tipo] = "Estándar" ) )`)}

  <h4>Casos de negocio</h4>

% sobre Total Compañía   = DIVIDE ( [Ventas], CALCULATE ( [Ventas], ALL ( Clientes ) ) )

% sobre lo Seleccionado  = DIVIDE ( [Ventas], CALCULATE ( [Ventas], ALLSELECTED ( Clientes ) ) )`)}

  ${err('ALL borra más de lo que crees', `<p><code class="inl">ALL(Ventas)</code> (sobre la tabla de hechos entera) ignora <b>todos</b> los filtros, incluido el año del slicer. Para denominadores casi siempre quieres <code class="inl">ALL(Dimensión)</code> o <code class="inl">REMOVEFILTERS(columna concreta)</code>, no <code class="inl">ALL(TablaHechos)</code>.</p>`)}
  ${best('Decisión rápida', `<ul>
    <li>¿Total de toda la compañía ignorando slicers de esa dim? → <b>ALL</b></li>
    <li>¿Total de lo que el usuario seleccionó en el slicer? → <b>ALLSELECTED</b></li>
    <li>¿% dentro de una categoría padre? → <b>ALLEXCEPT</b> (conserva la categoría)</li>
    <li>¿Añadir condición sin pisar la del visual? → <b>KEEPFILTERS</b></li>
    <li>¿Solo quiero que se lea claro "quitar filtros"? → <b>REMOVEFILTERS</b></li>
  </ul>`)}
  `
});

N({ id:'fn-iteradores', parent:'funciones', title:'Iteradores: SUMX, AVERAGEX, COUNTX, RANKX', icon:'🟡⭐',
  importancia:'★★★★☆', dificultad:'🟡 Importante', uso:'Frecuente',
  deps:['ctx-fila'], related:['transicion','fn-ranking'], fns:['fn-agregacion','fn-ranking'],

  ${tbl(['Función','Hace','Ejemplo'],[

    ['<b>COUNTX</b>','Cuenta filas donde la expresión no es vacía','<code class="inl">COUNTX(Ventas, IF(Ventas[Importe]>0,1))</code>'],
    ['<b>RANKX</b>','Asigna ranking según una expresión','<code class="inl">RANKX(ALL(Clientes),[Ventas])</code>'],

  <h4>El patrón clave: iterar dimensión + medida (transición)</h4>

  ${warn('Performance: itera lo pequeño', `<p>Iterar la tabla de hechos con una medida dentro (transición por millones de filas) es lento. Itera sobre la <b>dimensión</b> (pocas filas) siempre que puedas. Ver <span class="pill" data-go="performance">Performance</span>.</p>`)}
  ${err('Olvidar que X necesita una tabla', `<p>El primer argumento de un iterador es <b>una tabla</b>: <code class="inl">SUMX(Ventas, ...)</code>, no <code class="inl">SUMX(Ventas[Importe], ...)</code>. Si pones una columna directamente, conceptualmente piensa "¿sobre qué tabla itero?".</p>`)}
  ${best('', `<p>Usa iteradores para: precio×cantidad, conversión de moneda fila a fila, ponderaciones, y cálculos "por entidad" (por cliente, por producto) combinados con transición.</p>`)}
  `
});

N({ id:'fn-variables', parent:'funciones', title:'Variables: VAR / RETURN', icon:'🟢⭐',
  importancia:'★★★★★', dificultad:'🟢 Fundamental', uso:'Diario',

  ${why('Tres beneficios en una sola herramienta', `<ul>
    <li><b>Legibilidad:</b> nombras cada paso, la medida se lee como prosa.</li>
    <li><b>Performance:</b> una VAR se evalúa <b>una sola vez</b> y se reutiliza, en vez de recalcular la misma expresión varias veces.</li>
    <li><b>Depuración:</b> puedes devolver cualquier VAR temporalmente para inspeccionarla.</li>
  </ul>`)}

  ${dax(`
Var % Ventas YoY =
VAR VentasActual = [Ventas]
VAR VentasAA     = CALCULATE ( [Ventas], SAMEPERIODLASTYEAR ( Calendario[Fecha] ) )
VAR Diferencia   = VentasActual - VentasAA
RETURN
    DIVIDE ( Diferencia, VentasAA )`)}

  ${warn('Las VAR congelan el contexto donde se definen ⚠️', `<p>Una VAR se evalúa <b>en el momento y contexto de su declaración</b>, no donde se usa. Si defines <code class="inl">VAR x = [Ventas]</code> fuera de un CALCULATE y luego usas <code class="inl">x</code> dentro de ese CALCULATE, <code class="inl">x</code> conserva el valor <b>original</b>, no el modificado. Esto es una herramienta poderosa (capturar un valor antes de cambiar el contexto), pero sorprende a quien no lo sabe.</p>
  ${dax(`
Ejemplo =
VAR VentaCelda = [Ventas]                    -- congela ventas de ESTA celda
RETURN
    CALCULATE ( VentaCelda, ALL ( Clientes ) ) -- sigue siendo el valor de la celda,
                                              -- ALL no lo afecta porque ya está calculado`)}`)}

  ${err('Recalcular en vez de guardar', `<p>Repetir <code class="inl">CALCULATE([Ventas], SAMEPERIODLASTYEAR(...))</code> tres veces en una medida la hace más lenta y frágil. Guárdalo en una VAR y reúsalo.</p>`)}
  ${best('', `<ul><li>Una VAR por cada concepto con nombre de negocio (<code class="inl">VentasAA</code>, <code class="inl">Umbral</code>), no nombres como <code class="inl">x1</code>.</li><li>Capturar un valor antes de un CALCULATE es un patrón legítimo y útil (sim. de cliente individual).</li><li>No puedes asignar una VAR a otra después; son inmutables. Encadena con varias VAR.</li></ul>`)}
  `
});

N({ id:'fn-tablas', parent:'funciones', title:'Tablas: VALUES, DISTINCT, SELECTEDVALUE, RELATED, RELATEDTABLE, LOOKUPVALUE', icon:'🟡⭐',

  html: ()=> `
  ${tbl(['Función','Devuelve','Uso típico','Nota'],[
    ['<b>VALUES</b>','Valores distintos VISIBLES en el contexto','Universo de iteración; leer selección','Incluye un BLANK si hay filas huérfanas'],
    ['<b>DISTINCT</b>','Valores distintos','Similar a VALUES','No añade el BLANK de integridad'],
    ['<b>SELECTEDVALUE</b>','El único valor visible, o un default','Leer slicers (simuladores)','BLANK/default si hay 0 o >1'],
    ['<b>RELATED</b>','Un valor del lado "1"','Traer precio/categoría a la fila de hechos','Solo de * hacia 1'],
    ['<b>RELATEDTABLE</b>','Las filas "*" relacionadas','Iterar detalle desde una dim','De 1 hacia *'],
    ['<b>LOOKUPVALUE</b>','Un valor buscando por clave','BUSCARV sin relación','Más lento que RELATED'],
  ])}

  <h4>VALUES / SELECTEDVALUE: leer lo que el usuario eligió</h4>
  ${dax(`
Cliente Elegido  = SELECTEDVALUE ( Clientes[Nombre], "Todos" )
Nº Categorías    = COUNTROWS ( VALUES ( Productos[Categoría] ) )
Título Dinámico  = "Análisis de " & SELECTEDVALUE ( Clientes[Nombre], "todos los clientes" )`)}
  ${engine('SELECTEDVALUE por dentro', `<p>Equivale a <code class="inl">IF(HASONEVALUE(col), VALUES(col), default)</code>. Devuelve el valor solo si en el contexto actual hay <b>exactamente uno</b>. En un total (varios valores visibles) devuelve el default. Por eso es perfecto para slicers y por eso falla "en el total" si no pones default.</p>`)}

  <h4>RELATED vs RELATEDTABLE: dirección de navegación</h4>
  ${dax(`
-- En la fila de Ventas (lado *), traer el precio del producto (lado 1)
Precio Lista = SUMX ( Ventas, RELATED ( Productos[PrecioLista] ) )

-- En la fila de un Cliente (lado 1), iterar sus ventas (lado *)
Nº Compras = COUNTROWS ( RELATEDTABLE ( Ventas ) )`)}
  ${warn('La dirección importa', `<p><code class="inl">RELATED</code> va del lado <b>muchos → uno</b> (necesita contexto de fila en la tabla de hechos). <code class="inl">RELATEDTABLE</code> va de <b>uno → muchos</b>. Confundirlos da error o BLANK.</p>`)}

  <h4>LOOKUPVALUE: cuando no hay relación</h4>
  ${dax(`

  ${err('Usar LOOKUPVALUE donde había relación', `<p>Si existe una relación, <code class="inl">RELATED</code> es más rápido y limpio que <code class="inl">LOOKUPVALUE</code>. Reserva LOOKUPVALUE para cuando de verdad no puedes (o no quieres) crear la relación.</p>`)}
  ${best('', `<p><code class="inl">SELECTEDVALUE</code> con default explícito en todo lo que lea slicers. <code class="inl">VALUES</code> como universo de iteración en patrones de ranking y simuladores.</p>`)}

});

N({ id:'fn-ranking', parent:'funciones', title:'Ranking: RANKX, TOPN', icon:'🔴⭐',
  importancia:'★★★☆☆', dificultad:'🔴 Avanzado', uso:'Ocasional',
  deps:['fn-iteradores','fn-filtros'], related:['casos'], fns:['fn-filtros'],
  subtitle:'Ordenar y quedarse con los N mejores. Sensibles al contexto: requieren elegir bien el universo sobre el que rankear.',
  html: ()=> `
  <h4>RANKX — posición dentro de un universo</h4>
  ${dax(`
Ranking Ventas =
IF (
    HASONEVALUE ( Clientes[ClienteID] ),
    RANKX (
        ALLSELECTED ( Clientes[ClienteID] ),  -- universo: clientes seleccionados
        [Ventas],                              -- criterio
        ,                                      -- valor (opcional)
        DESC,                                  -- mayor primero
        DENSE                                  -- sin saltos en empates
    )
)`)}
  ${engine('', `<p><code class="inl">RANKX</code> evalúa <code class="inl">[Ventas]</code> para cada elemento del universo, los ordena y devuelve la posición del elemento actual. El <b>universo</b> (1er argumento) lo es todo: <code class="inl">ALL</code> rankea contra todos, <code class="inl">ALLSELECTED</code> contra lo filtrado. El guard <code class="inl">HASONEVALUE</code> evita un ranking absurdo en la fila Total.</p>`)}

  <h4>TOPN — quedarse con los N mejores (devuelve tabla)</h4>

)`)}
  ${dax(`

Ventas Cola = [Ventas Totales] - [Ventas Top 5 Clientes]`)}

  ${warn('Empates', `<p>En <code class="inl">RANKX</code>, <code class="inl">DENSE</code> no salta posiciones tras empate (1,2,2,3); el modo por defecto sí (1,2,2,4). En <code class="inl">TOPN</code>, si hay empate en el puesto N, <b>devuelve todos los empatados</b>: "Top 5" puede dar 6 filas. Tenlo en cuenta en KPIs de concentración.</p>`)}
  ${err('Rankear sin fijar el universo', `<p><code class="inl">RANKX(Clientes, ...)</code> sin ALL/ALLSELECTED rankea dentro del contexto de cada fila → casi siempre da 1 en todas. Debes <b>liberar</b> el filtro de la columna que rankeas.</p>`)}
  ${best('', `<p>Para análisis de concentración (Pareto 80/20, top clientes/productos, ABC) combina TOPN con medidas de "resto". Para tablas de clasificación, RANKX con guard de total. Ver <span class="pill" data-go="casos">Casos de negocio</span>.</p>`)}
  `
});

N({ id:'fn-tiempo', parent:'funciones', title:'Inteligencia del Tiempo: DATESYTD, TOTALYTD, SAMEPERIODLASTYEAR, DATEADD, DATESINPERIOD, PARALLELPERIOD, PREVIOUSMONTH', icon:'🔴⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado', uso:'Frecuente',

  html: ()=> `
  ${why('El lenguaje del reporting financiero', `<p>Todo comité de dirección habla en YTD, variación interanual y forecast móvil. Esta familia traduce esas preguntas a DAX. La clave conceptual: <b>no "calculan tiempo"; generan un conjunto de fechas y se lo pasan a CALCULATE</b>, que reemplaza el filtro de calendario por ese conjunto.</p>`)}

  ${warn('Requisito previo innegociable', `<p>Necesitas una <span class="pill" data-go="modelado">tabla Calendario</span> dedicada, continua (sin huecos), que cubra todo el rango y esté <b>marcada como tabla de fechas</b>. Sin ella, estas funciones dan resultados erróneos o BLANK.</p>`)}

  ${tbl(['Función','Qué genera','Pregunta de negocio'],[
    ['<b>DATESYTD</b>','Fechas desde el 1-ene hasta hoy visible','Acumulado del año'],
    ['<b>TOTALYTD</b>','Atajo: CALCULATE + DATESYTD en uno','Ventas YTD en una línea'],
    ['<b>SAMEPERIODLASTYEAR</b>','El mismo periodo, un año antes','Variación interanual (YoY)'],
    ['<b>DATEADD</b>','Desplaza N periodos (día/mes/trim/año)','MoM, YoY flexible, comparativos'],
    ['<b>DATESINPERIOD</b>','Un rango de N periodos desde una fecha','Media móvil 12 meses, rolling'],
    ['<b>PARALLELPERIOD</b>','Periodo completo desplazado','Mes/trim/año anterior completo'],
    ['<b>PREVIOUSMONTH</b>','El mes anterior completo','Comparativa mes a mes'],
  ])}

  <h4>El kit esencial</h4>
  ${dax(`
Ventas YTD      = TOTALYTD ( [Ventas], Calendario[Fecha] )
Ventas YTD (AF) = TOTALYTD ( [Ventas], Calendario[Fecha], "06-30" )   -- año fiscal cierra 30-jun
Ventas AA       = CALCULATE ( [Ventas], SAMEPERIODLASTYEAR ( Calendario[Fecha] ) )
Var % YoY       = DIVIDE ( [Ventas] - [Ventas AA], [Ventas AA] )
Ventas Mes Ant. = CALCULATE ( [Ventas], DATEADD ( Calendario[Fecha], -1, MONTH ) )
Var % MoM       = DIVIDE ( [Ventas] - [Ventas Mes Ant.], [Ventas Mes Ant.] )`)}

  <h4>Media móvil (rolling) con DATESINPERIOD</h4>
  ${dax(`
Ventas Móvil 12M =
CALCULATE (
    [Ventas],
    DATESINPERIOD ( Calendario[Fecha], MAX ( Calendario[Fecha] ), -12, MONTH )
)
Promedio Móvil 12M = DIVIDE ( [Ventas Móvil 12M], 12 )`)}
  ${engine('Cómo encaja con CALCULATE', `<p><code class="inl">DATESINPERIOD(...,-12,MONTH)</code> devuelve las fechas de los últimos 12 meses hasta la última visible. CALCULATE <b>reemplaza</b> el filtro de fecha por ese rango y <b>conserva</b> el resto (producto, región). Por eso el rolling respeta tus otros slicers.</p>`)}

  ${err('DATEADD necesita una columna de fechas, no una medida', `<p><code class="inl">DATEADD([Fecha visible], ...)</code> no funciona: el primer argumento es la <b>columna</b> <code class="inl">Calendario[Fecha]</code>. Además, DATEADD necesita fechas <i>contiguas</i> en el contexto; con selecciones irregulares usa <code class="inl">SAMEPERIODLASTYEAR</code> o revisa el calendario.</p>`)}
  ${err('YoY que no respeta el año fiscal', `<p>Si tu cierre no es 31-dic, <code class="inl">DATESYTD</code>/<code class="inl">TOTALYTD</code> sin el parámetro de fin de año fiscal dan acumulados incorrectos. Pasa <code class="inl">"06-30"</code> (o el que corresponda) y marca bien la tabla de fechas.</p>`)}
  ${best('', `<ul>
    <li>Crea medidas base reutilizables: <code class="inl">[Ventas]</code> → <code class="inl">[Ventas YTD]</code> → <code class="inl">[Var YoY]</code>, encadenadas.</li>
    <li>Usa <code class="inl">DATEADD</code> para comparativos flexibles; <code class="inl">SAMEPERIODLASTYEAR</code> para el YoY estándar (más legible).</li>
    <li>Para rolling y forecast móvil, <code class="inl">DATESINPERIOD</code>. Ver <span class="pill" data-go="sim-7">Forecast corporativo</span>.</li>
  </ul>`)}
  `
});

N({ id:'simuladores', parent:'powerbi', title:'Simuladores Corporativos y Slicers Avanzados', icon:'🎛️⭐',
  importancia:'★★★★★ (máxima)', dificultad:'🔴 Avanzado', uso:'Planeamiento / Forecast / Comercial',
  subtitle:'Cómo se construyen los simuladores reales de Planeamiento Financiero, Forecast, Presupuesto e Inteligencia Comercial: tablas desconectadas, What-If, SELECTEDVALUE y CALCULATE trabajando juntos. Desde cero.',
  deps:['calculate','fn-tablas'], related:['ctx-filtro','fn-tiempo'], fns:['calculate','fn-tablas'],
  html: ()=> `
  ${why('Es lo que pide la dirección, y casi nadie sabe hacerlo bien', `<p>"¿Qué pasa con el EBITDA si subimos ventas un 10%?" Esa pregunta convierte un informe estático en una <b>herramienta de decisión</b>. Los simuladores son la habilidad más valorada (y peor entendida) en BI corporativo. El truco común a todos: una <b>tabla desconectada</b> cuyo valor seleccionado se lee con <code class="inl">SELECTEDVALUE</code> y se inyecta en el cálculo. Aquí lo construimos paso a paso, 9 escenarios.</p>`)}

  <h3>El concepto central: la tabla desconectada ⭐</h3>
  ${analogy('El mando a distancia', `<p>Una <b>tabla desconectada</b> (sin relación con el modelo) es como un <b>mando a distancia</b>: sus botones (los valores del slicer) no están "cableados" a los datos. No filtran nada por sí solos. Es tu medida la que <b>lee qué botón pulsaste</b> (<code class="inl">SELECTEDVALUE</code>) y decide qué hacer con esa señal. Si la tabla estuviera relacionada, filtraría datos en vez de darte un parámetro libre.</p>`)}
  ${engine('Por qué desconectada y no relacionada', `<ul>
    <li>Una tabla <b>relacionada</b> filtra los hechos: seleccionar "+10%" intentaría mostrar solo filas "+10%" (que no existen) → BLANK.</li>
    <li>Una tabla <b>desconectada</b> no filtra nada: solo expone un valor que tú lees y usas como multiplicador/parámetro. El cálculo lo haces tú en DAX.</li>
  </ul>`)}

  <h3>What-If Parameters: el atajo de Power BI</h3>
  <p>Modelado de datos → "Nuevo parámetro" genera automáticamente: (1) una tabla desconectada con <code class="inl">GENERATESERIES</code>, (2) una medida <code class="inl">[Valor] = SELECTEDVALUE(Tabla[Valor])</code>, y (3) un slicer. Es exactamente el patrón "tabla desconectada + SELECTEDVALUE", empaquetado.</p>
  ${dax(`
-- Lo que genera un What-If de -30% a +30% en pasos de 5%
Ajuste = GENERATESERIES ( -0.30, 0.30, 0.05 )
Ajuste Valor = SELECTEDVALUE ( Ajuste[Ajuste], 0 )   -- 0 = sin ajuste por defecto`)}

  <p>Los 9 escenarios van de lo simple (ajuste global) a lo complejo (global + individual, matrices, forecast, KPIs y el funcionamiento interno completo). Hazlos en orden:</p>
  `
});

/* ---- Guía paso a paso desde cero (solo slicers) ---- */
N({ id:'sim-guia', parent:'simuladores', title:'Guía Paso a Paso desde Cero (solo con slicers)', icon:'🟢⭐',
  importancia:'★★★★★', dificultad:'🟢 Para empezar (explicado para no expertos)', uso:'Tu primer simulador',
  deps:['simuladores'], related:['sim-1','sim-2','sim-5'], fns:['fn-tablas','calculate'],
  subtitle:'Construye, desde cero y con clics reales en Power BI, un simulador donde mueves un SLICER (no editas una tabla) y las ventas se recalculan. Cubre los tres modos: todos los clientes por igual, un solo cliente, y un cliente con un % y el resto con otro.',
  html: ()=> `
  ${why('Escrito para quien nunca lo ha hecho', `<p>Esta guía no asume que sepas DAX. Cada paso te dice <b>dónde hacer clic</b> y <b>qué escribir</b>, y después te explica en palabras normales <b>por qué funciona</b>. Vas a interactuar con <b>slicers</b> (esas cajas de botones que filtran), no con una tabla que tengas que editar a mano. Al final tendrás un simulador real funcionando.</p>`)}

  <h3>Parte 0 · Tres palabras que necesitas entender primero</h3>
  ${analogy('El slicer, el parámetro y la tabla "suelta"', `<ul>
    <li><b>Slicer (segmentación):</b> una caja con botones o un control deslizante en el informe. Al pulsarlo, <b>filtra</b> lo que se ve. Es el "mando" con el que el usuario juega.</li>
    <li><b>Parámetro What-If:</b> un asistente de Power BI que, con un par de clics, te crea automáticamente <b>un slicer de porcentajes</b> (por ejemplo de −30% a +30%). Es la forma más fácil de tener un slicer numérico sin escribir nada.</li>
    <li><b>Tabla "suelta" (desconectada):</b> una tabla que <b>no está unida</b> con flechas al resto del modelo. Sirve para que el slicer te dé un valor <i>sin filtrar los datos</i>. Si estuviera unida, al elegir "+10%" intentaría buscar ventas "del +10%" (que no existen) y saldría vacío.</li>
  </ul>
  <p>Idea clave: <b>el slicer te entrega un número; tú, con una fórmula, decides qué hacer con ese número.</b> Power BI no "ajusta solo": tú escribes una medida que multiplica las ventas por ese número.</p>`)}

  <h3>Parte 1 · Preparación (el punto de partida)</h3>
  <p>Supongamos que ya tienes una tabla de ventas con clientes. Lo mínimo:</p>
  ${tbl(['Tabla','Columnas','Para qué'],[
    ['<b>Ventas</b>','Cliente, Importe (y Fecha si la tienes)','Los datos reales que vas a simular'],
    ['<b>Clientes</b>','Cliente (lista de clientes)','La dimensión; unida a Ventas con una flecha 1→∗'],
  ])}
  <p>Crea primero una medida base (lo que vas a ajustar). En la cinta <b>Inicio → Nueva medida</b>, pega:</p>
  ${dax(`Ventas Base = SUM ( Ventas[Importe] )`)}
  ${best('Cómo crear una medida (clic a clic)', `<ol>
    <li>Pestaña <b>Inicio</b> (o <b>Modelado</b>) → botón <b>Nueva medida</b>.</li>
    <li>En la barra de fórmulas, borra lo que haya y escribe el nombre, un <code class="inl">=</code> y la fórmula.</li>
    <li>Pulsa <span class="kbd">Enter</span>. La medida aparece en el panel de la derecha con un icono de calculadora.</li>
    <li>Arrástrala a una <b>tarjeta</b> o a una <b>tabla</b> para verla.</li>
  </ol>`)}

  <h3>Parte 2 · MODO 1 — Ajustar TODOS los clientes por igual 🟢</h3>
  <p>Objetivo: un slicer de % que sube o baja las ventas de <b>todos</b> a la vez.</p>
  ${best('Paso a paso en Power BI', `<ol>
    <li>Ve a la cinta <b>Modelado → Nuevo parámetro → Rango numérico</b> (en versiones antiguas: <b>Modelado → Nuevo parámetro</b>).</li>
    <li>Rellena la ventana así:
      <ul>
        <li><b>Nombre:</b> <code class="inl">Ajuste %</code></li>
        <li><b>Tipo de datos:</b> Número decimal</li>
        <li><b>Mínimo:</b> <code class="inl">-0,30</code> &nbsp; <b>Máximo:</b> <code class="inl">0,30</code> &nbsp; <b>Incremento:</b> <code class="inl">0,05</code> &nbsp; <b>Predeterminado:</b> <code class="inl">0</code></li>
      </ul>
    </li>
    <li>Deja marcada la casilla <b>"Agregar segmentación de datos a esta página"</b> y pulsa <b>Crear</b>.</li>
    <li>Power BI hace <b>tres cosas solo</b>: crea una tabla suelta llamada <code class="inl">Ajuste %</code>, una medida <code class="inl">Ajuste % Valor</code>, y coloca el <b>slicer</b> en el lienzo. 🎉</li>
  </ol>`)}
  ${engine('Qué te creó Power BI por dentro (no tienes que escribirlo, ya está)', `${dax(`
-- La tabla suelta de valores del slicer:
Ajuste % = GENERATESERIES ( -0.30, 0.30, 0.05 )

-- La medida que LEE el botón pulsado en el slicer:
Ajuste % Valor = SELECTEDVALUE ( 'Ajuste %'[Ajuste %], 0 )`)}
  <p>En palabras: <code class="inl">SELECTEDVALUE</code> mira qué número está elegido en el slicer. Si eliges +10% devuelve 0,10; si no eliges nada, devuelve 0 (sin cambio).</p>`)}
  <p>Ahora la única medida que escribes tú. <b>Inicio → Nueva medida</b>:</p>
  ${dax(`
Ventas Ajustadas =
[Ventas Base] * ( 1 + [Ajuste % Valor] )`)}
  ${engine('Léelo en palabras normales', `<p>"Toma las ventas base y multiplícalas por (1 + el porcentaje del slicer)". Si el slicer está en +10% (0,10): <code class="inl">Ventas × (1 + 0,10) = Ventas × 1,10</code> → suben un 10%. Si está en −20%: <code class="inl">× 0,80</code> → bajan un 20%. Como la fórmula no nombra a ningún cliente, <b>el mismo % se aplica a todos por igual</b>: en la fila de cada cliente multiplica las ventas de ese cliente; en el total, el total.</p>`)}
  ${best('Cómo probarlo', `<ol>
    <li>Pon una <b>tabla</b> (visual) con <code class="inl">Clientes[Cliente]</code>, <code class="inl">[Ventas Base]</code> y <code class="inl">[Ventas Ajustadas]</code>.</li>
    <li>Mueve el slicer <code class="inl">Ajuste %</code>. Verás que la columna "Ventas Ajustadas" cambia para todos los clientes a la vez. ✔</li>
  </ol>`)}

  <h3>Parte 3 · MODO 2 — Ajustar UN SOLO cliente (con dos slicers) 🟡</h3>
  <p>Objetivo: un slicer para <b>elegir qué cliente</b> y otro para <b>el %</b>. Solo ese cliente cambia; el resto queda igual.</p>
  ${best('Paso 1 · Crear el slicer de "cliente objetivo" (una lista de clientes SUELTA)', `<ol>
    <li>Cinta <b>Modelado → Nueva tabla</b>.</li>
    <li>Escribe:
      ${dax(`Cliente Objetivo = DISTINCT ( Clientes[Cliente] )`)}
      Esto crea una <b>copia suelta</b> de la lista de clientes (Power BI <b>no</b> la une con flechas: justo lo que queremos).</li>
    <li>Inserta un <b>slicer</b> nuevo y arrástrale el campo <code class="inl">Cliente Objetivo[Cliente]</code>. Este será el slicer de "a quién ajustar".</li>
  </ol>`)}
  ${warn('¿Por qué una copia SUELTA y no la lista normal de clientes?', `<p>Si usaras el slicer con la tabla <code class="inl">Clientes</code> normal (la que está unida), al elegir "Cliente B" <b>desaparecerían</b> A y C de la tabla: filtrarías los datos. Con la copia suelta, el slicer solo te dice "el objetivo es B" <b>sin esconder</b> a los demás. Así puedes ver a todos y ajustar solo a uno.</p>`)}
  <p>Paso 2 · Reutiliza el slicer <code class="inl">Ajuste %</code> del Modo 1 (el del porcentaje). Paso 3 · Reescribe la medida:</p>
  ${dax(`
Ventas Ajustadas =
VAR Pct = [Ajuste % Valor]                       -- el % del slicer
RETURN
    SUMX (
        VALUES ( Clientes[Cliente] ),            -- recorre cliente por cliente
        VAR Base = [Ventas Base]                 -- ventas de ESTE cliente
        VAR EsObjetivo =                         -- ¿este cliente es el elegido?
            Clientes[Cliente] IN VALUES ( 'Cliente Objetivo'[Cliente] )
        RETURN
            IF ( EsObjetivo, Base * ( 1 + Pct ), Base )  -- sí: ajusta; no: igual
    )`)}
  ${engine('Léelo en palabras normales, línea por línea', `<ol>
    <li><code class="inl">Pct</code> = el porcentaje que pusiste en el slicer.</li>
    <li><code class="inl">SUMX(VALUES(Clientes[Cliente]), …)</code> = "ve cliente por cliente y al final suma todo".</li>
    <li><code class="inl">Base</code> = las ventas de <b>ese</b> cliente concreto (la fila en la que estamos).</li>
    <li><code class="inl">EsObjetivo</code> = pregunta "¿el cliente de esta fila está entre los elegidos en el slicer de objetivo?". Da Verdadero o Falso.</li>
    <li><code class="inl">IF(...)</code> = si es el objetivo, multiplica por (1 + %); si no, deja sus ventas tal cual.</li>
  </ol>
  <p>Resultado: eliges "Cliente B" y "+20%" → solo B sube un 20%; A y C no se tocan. Y como usamos <code class="inl">SUMX</code>, el <b>total</b> también sale bien (suma a B ya ajustado con los demás sin tocar).</p>`)}
  ${best('Truco útil', `<p>Si <b>no</b> eliges ningún cliente en el slicer de objetivo, <code class="inl">VALUES('Cliente Objetivo'[Cliente])</code> contiene a todos → <b>se comporta como el Modo 1</b> (ajuste a todos). Una sola medida te sirve para los dos modos.</p>`)}

  <h3>Parte 4 · MODO 3 — Un cliente con un %, el resto con otro % 🔴</h3>
  <p>Objetivo: el cliente (o clientes) que elijas reciben un %, y <b>todos los demás</b> reciben otro % distinto. Todo con slicers.</p>
  ${best('Paso 1 · Crea DOS parámetros What-If de porcentaje', `<ol>
    <li><b>Modelado → Nuevo parámetro → Rango numérico</b>, nómbralo <code class="inl">Ajuste Objetivo %</code> (mín −0,30, máx 0,30, incremento 0,05). Marca "agregar segmentación". Crear.</li>
    <li>Repite y nómbralo <code class="inl">Ajuste Resto %</code>. Ya tienes <b>dos slicers de %</b>: uno para el cliente objetivo y otro para el resto.</li>
    <li>Mantén el slicer <code class="inl">Cliente Objetivo</code> del Modo 2 para elegir a quién.</li>
  </ol>`)}
  <p>Paso 2 · La medida que combina ambos:</p>
  ${dax(`
Ventas Ajustadas =
VAR PctObjetivo = [Ajuste Objetivo % Valor]      -- % para el/los elegidos
VAR PctResto    = [Ajuste Resto % Valor]         -- % para todos los demás
RETURN
    SUMX (
        VALUES ( Clientes[Cliente] ),
        VAR Base = [Ventas Base]
        VAR EsObjetivo =
            Clientes[Cliente] IN VALUES ( 'Cliente Objetivo'[Cliente] )
        VAR PctAplicado = IF ( EsObjetivo, PctObjetivo, PctResto )  -- elige el % correcto
        RETURN
            Base * ( 1 + PctAplicado )
    )`)}
  ${engine('Qué hace, en palabras', `<p>Por cada cliente decide: "¿es de los elegidos? entonces uso el % objetivo; si no, uso el % del resto". Luego multiplica sus ventas por (1 + ese %). Así, con tres slicers (cliente, % objetivo, % resto) puedes decir, por ejemplo: <b>"Cliente B sube +25%, y todos los demás bajan −5%"</b>. Cambias los slicers y todo el informe se recalcula al instante.</p>`)}
  ${tbl(['Lo que quieres','Cómo dejas los slicers'],[
    ['Todos igual (+10%)','No elijas cliente · "Resto %" = +10% (o usa el Modo 1)'],
    ['Solo Cliente B +20%','Cliente = B · "Objetivo %" = +20% · "Resto %" = 0%'],
    ['B sube +25% y el resto baja −5%','Cliente = B · "Objetivo %" = +25% · "Resto %" = −5%'],
    ['B y D suben +15%, el resto 0%','Cliente = B y D · "Objetivo %" = +15% · "Resto %" = 0%'],
  ])}
  ${warn('"Un cliente con %A y OTRO cliente con %B distinto, a la vez"', `<p>Con slicers, el patrón natural es <b>"objetivo vs resto"</b> (los elegidos comparten un %, los demás otro). Si necesitas que <i>cada</i> cliente tenga un % <b>diferente y simultáneo</b> (B +25%, C −15%, D +40%… todos a la vez), un slicer se queda corto porque solo guarda un valor a la vez. Dos caminos honestos:</p>
  <ul>
    <li><b>Por segmentos, con estos mismos slicers:</b> ajustas un grupo (objetivo) frente al resto; suele cubrir el 90% de las necesidades reales de planeamiento.</li>
    <li><b>Cada cliente con su % distinto a la vez:</b> tienes dos caminos, explicados paso a paso en el <span class="pill" data-go="sim-3">Escenario 3</span> → (1) una <b>tabla de factores</b> (un % por cliente; ideal para muchos clientes) y (2) <b>un slicer por cliente</b> (barras en vivo; ideal para pocos), más un <b>híbrido</b> que combina ambos. Ahí tienes los clics y las medidas listas para copiar.</li>
  </ul>`)}

  <h3>Parte 5 · Cómo encaja todo (resumen visual)</h3>
  ${diagram(`
   SLICERS (lo que toca el usuario)        MEDIDA (lo que tú escribiste una vez)
   ───────────────────────────────        ────────────────────────────────────
   [ Ajuste Objetivo % ] ──┐
   [ Ajuste Resto %    ] ──┤  SELECTEDVALUE lee cada slicer  →  PctObjetivo / PctResto
   [ Cliente Objetivo  ] ──┘  IN VALUES(...) dice quién es objetivo
                                          │
                                          ▼
                 Por cada cliente:  Ventas × (1 + % que le toca)
                                          │
                                          ▼
            La tabla / matriz / gráficos se recalculan solos`)}

  ${err('Los 4 errores típicos del principiante', `<ul>
    <li><b>Unir la tabla del slicer con flechas.</b> Las tablas <code class="inl">Ajuste %</code> y <code class="inl">Cliente Objetivo</code> deben quedar <b>sueltas</b>. Si Power BI creó una relación, bórrala (vista <b>Modelo</b>, clic derecho en la flecha → Eliminar).</li>
    <li><b>Olvidar el valor por defecto.</b> Si <code class="inl">SELECTEDVALUE</code> no tiene el "0" final y no eliges nada, sale vacío y el informe se queda en blanco.</li>
    <li><b>Usar el slicer de cliente "normal" (conectado).</b> Esconde a los demás clientes. Usa la <b>copia suelta</b> <code class="inl">Cliente Objetivo</code>.</li>
    <li><b>No usar SUMX y que el Total no cuadre.</b> Sin <code class="inl">SUMX(VALUES(Clientes[Cliente]),…)</code>, la fila Total no aplica bien los ajustes por cliente.</li>
  </ul>`)}

  ${best('Checklist final', `<ol>
    <li>¿Tengo <code class="inl">[Ventas Base]</code>? ✔</li>
    <li>¿Creé el/los parámetro(s) What-If de % y aparecen como slicers? ✔</li>
    <li>¿La lista de "cliente objetivo" es una <b>copia suelta</b>? ✔</li>
    <li>¿Mi medida <code class="inl">Ventas Ajustadas</code> usa <code class="inl">SUMX</code> + <code class="inl">IF</code> con el % del slicer? ✔</li>
    <li>¿Muevo los slicers y la tabla cambia? ✔ ¡Listo!</li>
  </ol>`)}
  <p>Cuando esto te resulte natural, profundiza en el <span class="pill" data-go="sim-9">funcionamiento interno paso a paso</span> y en los <span class="pill" data-go="sim-6">ajustes sobre una matriz</span>.</p>
  `
});
