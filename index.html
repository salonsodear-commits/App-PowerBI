N({ id:'sim-1', parent:'simuladores', title:'Escenario 1 · Ajuste Global de Ventas', icon:'🟢',
  importancia:'★★★★☆', dificultad:'🟢 Punto de partida', uso:'Base de todo simulador',
  deps:['simuladores'], related:['sim-2','fn-tablas'], fns:['fn-tablas','calculate'],
  subtitle:'Un slicer de porcentaje (+5%…−30%) que modifica automáticamente la venta proyectada de TODOS los clientes a la vez.',
  html: ()=> `
  <h3>El problema</h3>
  <p>Tabla <code class="inl">Proyeccion</code>: <code class="inl">Cliente | VentaProyectada</code>. Un slicer con +5%, +10%, +20%, +30%, −5%, −10%, −20%, −30%. Al elegir uno, <b>todas</b> las ventas proyectadas se recalculan.</p>

  <h3>Paso 1 · Crear la tabla desconectada de ajustes</h3>
  ${dax(`
Ajustes =
DATATABLE (
    "Etiqueta", STRING,
    "Factor",   DOUBLE,
    {
        { "-30%", 0.70 }, { "-20%", 0.80 }, { "-10%", 0.90 }, { "-5%", 0.95 },
        { "+5%", 1.05 }, { "+10%", 1.10 }, { "+20%", 1.20 }, { "+30%", 1.30 }
    }
)`)}
  ${warn('NO la relaciones con nada', `<p><code class="inl">Ajustes</code> queda <b>flotando</b>, sin relación. Si la conectas, romperás el simulador. El slicer usará <code class="inl">Ajustes[Etiqueta]</code>; el cálculo usará <code class="inl">Ajustes[Factor]</code>.</p>`)}

  <h3>Paso 2 · Leer la selección</h3>
  ${dax(`
Factor Ajuste = SELECTEDVALUE ( Ajustes[Factor], 1 )   -- 1 = sin cambio si no se elige nada`)}

  <h3>Paso 3 · La medida del simulador</h3>
  ${dax(`
Venta Ajustada =
SUMX (
    VALUES ( Proyeccion[Cliente] ),
    CALCULATE ( SUM ( Proyeccion[VentaProyectada] ) ) * [Factor Ajuste]
)`)}
  <p>O, si solo necesitas el total agregado, la versión simple:</p>
  ${dax(`Venta Ajustada (simple) = SUM ( Proyeccion[VentaProyectada] ) * [Factor Ajuste]`)}

  ${engine('Qué ocurre en cada paso al elegir "+10%"', `<ol>
    <li>El slicer pone en el contexto <code class="inl">Ajustes[Etiqueta]="+10%"</code>. Como la tabla está desconectada, <b>esto NO filtra Proyeccion</b>.</li>
    <li><code class="inl">SELECTEDVALUE(Ajustes[Factor],1)</code> ve que hay un único valor visible → devuelve <b>1,10</b>.</li>
    <li><code class="inl">SUM(Proyeccion[VentaProyectada])</code> se evalúa con el contexto normal (todos los clientes, o el que filtren otros slicers) → la suma base.</li>
    <li>Se multiplica por 1,10 → todas las ventas suben un 10%. En la versión SUMX, esto pasa cliente a cliente y luego se acumula (idéntico resultado para un ajuste uniforme, pero preparado para el Escenario 4).</li>
  </ol>`)}

  <h3>Por qué funciona "para todos" automáticamente</h3>
  <p>No hay nada que diga "cliente A" o "cliente B": el factor multiplica la base <b>sea cual sea</b> el conjunto de clientes en el contexto. En la fila de cada cliente de una matriz, la base es la de ese cliente; en el total, es el total. El mismo factor aplica a todos. <b>Ese es el sentido de "ajuste global".</b></p>

  ${err('Olvidar el valor por defecto en SELECTEDVALUE', `<p>Sin el segundo argumento (1), cuando no hay selección o hay varias, <code class="inl">SELECTEDVALUE</code> devuelve BLANK y <code class="inl">base * BLANK = BLANK</code>: el informe se vacía. Pon siempre el default <b>1</b> (neutro multiplicativo).</p>`)}
  ${best('', `<p>Guarda el factor en una medida (<code class="inl">[Factor Ajuste]</code>) y reúsala en todas las medidas dependientes (ventas, margen, EBITDA). Cambias la lógica del slicer en un solo lugar.</p>`)}
  ${exer('', `<p>Base total = 1.000. Eliges "−20%". ¿Qué muestra <code class="inl">[Venta Ajustada]</code> en el total y en un cliente cuya base es 250?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Solución</summary><p>Factor = 0,80. Total: 1.000×0,80 = <b>800</b>. Cliente: 250×0,80 = <b>200</b>. El mismo factor, distinta base por contexto.</p></details>`)}
  `
});

N({ id:'sim-2', parent:'simuladores', title:'Escenario 2 · Ajuste de un Único Cliente', icon:'🟡⚠️',
  importancia:'★★★★☆', dificultad:'🟡 Salto conceptual', uso:'Ajustes puntuales',
  deps:['sim-1','transicion'], related:['sim-3','ctx-fila'], fns:['fn-tablas','calculate'],
  subtitle:'Cliente A → +20%; el resto sin cambios. El reto: detectar en qué fila/cliente estás y aplicar el ajuste solo ahí.',
  html: ()=> `
  <h3>El problema y por qué es más difícil</h3>
  <p>Ahora el ajuste NO es uniforme: solo Cliente A sube 20%, B y C quedan igual. La medida debe, <b>fila a fila</b>, preguntarse "¿soy el cliente objetivo? si sí, ajusto; si no, dejo la base".</p>

  <h3>Paso 1 · Slicers desconectados: cliente objetivo + factor</h3>
  ${dax(`
-- Slicer 1: qué cliente ajustar (tabla desconectada con la lista de clientes)
ClienteObjetivo = DISTINCT ( Proyeccion[Cliente] )   -- copia desconectada (sin relación)
-- Slicer 2: el factor → reutilizamos la tabla Ajustes del Escenario 1`)}
  ${warn('Copia desconectada, no la dimensión real', `<p>Necesitas una <b>segunda</b> tabla de clientes <b>desconectada</b> para el slicer objetivo. Si usaras la dimensión real conectada, al elegir "A" filtrarías el modelo a A y perderías B y C de la vista. La copia desconectada solo te dice "a quién apuntar", sin filtrar.</p>`)}

  <h3>Paso 2 · La medida: detectar el contexto de columna</h3>
  ${dax(`
Venta Ajuste Individual =
VAR Objetivo   = SELECTEDVALUE ( ClienteObjetivo[Cliente] )   -- a quién ajustar
VAR Factor     = SELECTEDVALUE ( Ajustes[Factor], 1 )         -- cuánto
VAR ClienteFila = SELECTEDVALUE ( Proyeccion[Cliente] )       -- en qué fila estoy
VAR Base       = SUM ( Proyeccion[VentaProyectada] )
RETURN
    IF (
        ClienteFila = Objetivo,   -- ¿esta fila es el cliente objetivo?
        Base * Factor,            -- sí → ajusta
        Base                      -- no → base intacta
    )`)}

  ${engine('Cómo identifica Power BI el cliente de cada celda', `<ol>
    <li>En la fila "Cliente A" de la matriz, el contexto de filtro incluye <code class="inl">Proyeccion[Cliente]="A"</code>.</li>
    <li><code class="inl">SELECTEDVALUE(Proyeccion[Cliente])</code> lee ese contexto → <code class="inl">ClienteFila = "A"</code>.</li>
    <li><code class="inl">Objetivo</code> viene del slicer desconectado → digamos "A".</li>
    <li>Como <code class="inl">"A" = "A"</code> → aplica <code class="inl">Base * Factor</code>. En la fila B, <code class="inl">ClienteFila="B" ≠ "A"</code> → devuelve Base. ✔</li>
  </ol>
  <p>La clave es que <code class="inl">SELECTEDVALUE(Proyeccion[Cliente])</code> "lee la fila" porque cada celda de la matriz <b>impone su propio cliente</b> en el contexto de filtro.</p>`)}

  <h3>El problema del Total ⚠️</h3>
  ${warn('En el total, ClienteFila no es único', `<p>En la fila <b>Total</b> hay varios clientes visibles → <code class="inl">SELECTEDVALUE(Proyeccion[Cliente])</code> devuelve BLANK → nunca coincide con Objetivo → el total NO incluye el ajuste. <b>El total quedaría mal.</b> Solución: calcular el total como suma de las filas ajustadas con SUMX:</p>
  ${dax(`
Venta Ajuste Individual (total correcto) =
VAR Objetivo = SELECTEDVALUE ( ClienteObjetivo[Cliente] )
VAR Factor   = SELECTEDVALUE ( Ajustes[Factor], 1 )
RETURN
    SUMX (
        VALUES ( Proyeccion[Cliente] ),
        VAR ClienteFila = SELECTEDVALUE ( Proyeccion[Cliente] )
        VAR Base = CALCULATE ( SUM ( Proyeccion[VentaProyectada] ) )
        RETURN IF ( ClienteFila = Objetivo, Base * Factor, Base )
    )`)}
  <p>Ahora SUMX recorre cliente a cliente (incluso en el total), aplica el IF por cliente y suma. El total cuadra con las filas.</p>`)}

  ${err('Usar la dimensión conectada para el slicer objetivo', `<p>Al seleccionar el cliente en un slicer <i>conectado</i>, filtras el modelo y desaparecen los demás clientes. Por eso el slicer objetivo <b>debe</b> salir de una tabla desconectada.</p>`)}
  ${best('Patrón senior', `<p>Captura con <code class="inl">VAR</code> las tres señales (objetivo, factor, fila), compáralas con <code class="inl">IF</code>, y envuelve en <code class="inl">SUMX(VALUES(dim))</code> para que el total funcione. Esta estructura se reutiliza en los escenarios 3, 4 y 5.</p>`)}
  `
});

N({ id:'sim-3', parent:'simuladores', title:'Escenario 3 · Ajuste de Varios Clientes', icon:'🔴',
  importancia:'★★★★☆', dificultad:'🔴 Avanzado', uso:'Planes comerciales por cuenta',
  deps:['sim-2'], related:['sim-4','sim-guia','modelado'], fns:['fn-tablas','calculate'],
  subtitle:'Cada cliente con su propio % a la vez (A +10%, B +25%, C −15%). Dos formas explicadas paso a paso y fácil: (1) una TABLA DE FACTORES y (2) SLICERS (un control por cliente). Y un híbrido que combina ambas.',
  html: ()=> `
  <h3>El problema</h3>
  <p>Quieres que <b>cada</b> cliente tenga un porcentaje <b>distinto y al mismo tiempo</b>: A sube +10%, B sube +25%, C baja −15%… El resultado, en una tabla/matriz:</p>
  ${tbl(['Cliente','Venta Base','Su %','Total Ajustado'],[
    ['A','100','+10%','100 × 1,10 = <b>110</b>'],
    ['B','200','+25%','200 × 1,25 = <b>250</b>'],
    ['C','300','−15%','300 × 0,85 = <b>255</b>'],
    ['<b>Total</b>','<b>600</b>','','<b>615</b>'],
  ])}
  <p>Hay dos maneras de lograrlo. Te explico las dos desde cero; elige según cuántos clientes tengas.</p>

  <h3>━━━ MÉTODO 1 · Tabla de factores (la más escalable) ━━━</h3>
  ${analogy('Qué es una "tabla de factores"', `<p>Es simplemente una <b>tablita</b> con dos columnas: el <b>cliente</b> y <b>su porcentaje</b>. Una fila por cliente. Power BI la lee y le da a cada cliente el % que le corresponde. Piensa en ella como una <b>lista de instrucciones</b>: "a A súbele 10%, a B 25%, a C bájale 15%".</p>`)}

  ${best('Paso 1 · Crear la tabla (la forma más fácil: "Escribir datos")', `<ol>
    <li>Cinta <b>Inicio → Escribir datos</b> (en inglés "Enter data").</li>
    <li>Se abre una mini-hoja. Crea dos columnas: <code class="inl">Cliente</code> y <code class="inl">Ajuste %</code>.</li>
    <li>Escribe una fila por cliente:
      ${tbl(['Cliente','Ajuste %'],[['A','0,10'],['B','0,25'],['C','-0,15']])}
      (0,10 = +10%. Usa decimales: 25% se escribe 0,25.)
    </li>
    <li>Ponle de nombre <code class="inl">Factores Cliente</code> y pulsa <b>Cargar</b>. ¡Ya tienes la tabla en el modelo!</li>
  </ol>
  <p><b>Alternativa profesional:</b> en vez de "Escribir datos", conecta un <b>Excel</b> donde Planeamiento escribe los % y, al pulsar <b>Actualizar</b>, se recargan. Mismo resultado, pero el equipo mantiene el Excel.</p>`)}

  ${best('Paso 2 · La medida que reparte cada % a su cliente', `${dax(`
Venta Ajustada =
SUMX (
    VALUES ( Clientes[Cliente] ),                       -- ve cliente por cliente
    VAR Cli  = SELECTEDVALUE ( Clientes[Cliente] )       -- quién es este cliente
    VAR Base = [Ventas Base]                             -- sus ventas
    VAR Pct  =                                           -- busca SU % en la tabla
        LOOKUPVALUE (
            'Factores Cliente'[Ajuste %],
            'Factores Cliente'[Cliente], Cli,
            0                                            -- si no está en la tabla: 0%
        )
    RETURN Base * ( 1 + Pct )
)`)}`)}
  ${engine('Léelo en palabras', `<ol>
    <li><code class="inl">SUMX(VALUES(Clientes[Cliente]), …)</code> = recorre los clientes uno a uno y al final suma.</li>
    <li><code class="inl">Cli</code> = el cliente de la fila actual (A, luego B, luego C…).</li>
    <li><code class="inl">LOOKUPVALUE(…)</code> = "ve a la tabla Factores Cliente y tráeme el % de ESTE cliente". Es como un BUSCARV. Si el cliente no está, devuelve 0 (no se ajusta).</li>
    <li><code class="inl">Base × (1 + Pct)</code> = aplica su porcentaje. A → ×1,10, B → ×1,25, C → ×0,85.</li>
  </ol>
  <p>Con <code class="inl">LOOKUPVALUE</code> <b>ni siquiera hace falta unir</b> la tabla con flechas: la búsqueda es por nombre. Más simple para empezar.</p>`)}

  ${best('Paso 3 · Usarla', `<ol>
    <li>Pon una <b>matriz/tabla</b>: <code class="inl">Clientes[Cliente]</code> en filas, <code class="inl">[Ventas Base]</code> y <code class="inl">[Venta Ajustada]</code> en valores. Verás 110, 250, 255.</li>
    <li>¿Cambió el plan? Edita los % (Inicio → Transformar datos → tabla <code class="inl">Factores Cliente</code>, o el Excel) y pulsa <b>Actualizar</b>. Todos los clientes se recalculan con sus nuevos %.</li>
  </ol>`)}
  ${tbl(['👍 Ventajas','👎 Límites'],[
    ['Soporta MUCHOS clientes (miles), cada uno su %','No se cambia "en vivo" desde el informe: hay que editar y Actualizar'],
    ['Centralizado, fácil de auditar y versionar','Necesita que alguien mantenga el Excel/tabla'],
    ['Soporta escenarios (añade columna Escenario)','—'],
  ])}

  <h3>━━━ MÉTODO 2 · Slicers (un control por cliente) ━━━</h3>
  <p>Si quieres tocarlo <b>en vivo con barras</b> y tienes <b>pocos clientes</b>, dale a cada cliente su propio slicer de %. Cada uno se mueve independientemente y todos a la vez.</p>
  ${best('Paso a paso', `<ol>
    <li>Crea un parámetro What-If por cliente: <b>Modelado → Nuevo parámetro → Rango numérico</b>, nómbralos <code class="inl">Ajuste A %</code>, <code class="inl">Ajuste B %</code>, <code class="inl">Ajuste C %</code> (mín −0,30, máx 0,30, paso 0,05). Marca "agregar segmentación" en cada uno.</li>
    <li>Tendrás <b>una barra por cliente</b> en la página.</li>
    <li>Usa esta medida (la misma idea del <span class="pill" data-go="sim-4">Escenario 4</span>):
      ${dax(`
Venta Ajustada =
SUMX (
    VALUES ( Clientes[Cliente] ),
    VAR Base = [Ventas Base]
    VAR Pct  =
        SWITCH (
            SELECTEDVALUE ( Clientes[Cliente] ),
            "A", [Ajuste A % Valor],     -- la barra de A
            "B", [Ajuste B % Valor],     -- la barra de B
            "C", [Ajuste C % Valor],     -- la barra de C
            0
        )
    RETURN Base * ( 1 + Pct )
)`)}
    </li>
    <li>Mueve cada barra: el total de su cliente cambia al instante, cada uno con su propio %. ✔</li>
  </ol>`)}
  ${warn('Esto es lo que un slicer SÍ puede hacer (y su límite)', `<p>Con <b>una barra por cliente</b>, cada cliente tiene su % distinto y simultáneo, en vivo. Funciona muy bien hasta ~5-8 clientes. Con 50 clientes serían 50 barras: inviable. Ahí el <b>Método 1 (tabla)</b> es el correcto. Regla simple: <b>pocos y a mano → slicers; muchos → tabla de factores</b>.</p><p>¿Quieres editar el % de cada cliente <b>en vivo dentro del informe</b> aun con 30-50 clientes? Eso sí se puede, pero ya no con sliders: lo explico paso a paso en <span class="pill" data-go="sim-envivo">Edición dinámica en vivo con muchos clientes</span> (Power Apps/writeback, segmentos e híbrido).</p>`)}

  <h3>━━━ MÉTODO 3 · Híbrido (lo mejor de los dos) ⭐ ━━━</h3>
  <p>El patrón que más se usa en la práctica: la <b>tabla de factores</b> guarda el % "fino" de cada cliente, y un <b>slicer global</b> te deja jugar en vivo por encima de todos.</p>
  ${dax(`
Venta Ajustada =
VAR SliderGlobal = [Ajuste Global % Valor]               -- una barra para jugar en vivo
RETURN
    SUMX (
        VALUES ( Clientes[Cliente] ),
        VAR Cli  = SELECTEDVALUE ( Clientes[Cliente] )
        VAR Base = [Ventas Base]
        VAR PctCliente =
            LOOKUPVALUE ( 'Factores Cliente'[Ajuste %], 'Factores Cliente'[Cliente], Cli, 0 )
        RETURN Base * ( 1 + PctCliente ) * ( 1 + SliderGlobal )
    )`)}
  ${engine('', `<p>Cada cliente parte de su % de la tabla (granular, muchos clientes) y, encima, el slicer global escala a todos en vivo. Así combinas la <b>escala</b> de la tabla con la <b>interactividad</b> del slicer. Por ejemplo: la tabla pone los % por cuenta que negoció Comercial, y el director mueve el slicer global para ver "¿y si todo el mercado cae un 5% más?".</p>`)}

  ${tbl(['Tu situación','Método recomendado'],[
    ['Muchos clientes, cada uno su %, se actualiza por Excel','1 · Tabla de factores'],
    ['Pocos clientes, quiero moverlos en vivo con barras','2 · Slicers (uno por cliente)'],
    ['% finos por cliente + jugar en vivo con un control','3 · Híbrido'],
    ['Un grupo con un % y el resto con otro','"Objetivo vs resto" (ver <span class="pill" data-go="sim-guia">Guía, Parte 4</span>)'],
  ])}

  ${warn('La pieza invisible que hace que cada factor llegue a su cliente', `<p>En los tres métodos, lo que conecta cada % con su cliente es recorrer <code class="inl">VALUES(Clientes[Cliente])</code> con <code class="inl">SUMX</code>: en cada vuelta "estamos parados" en un cliente y leemos solo su %. Es la <span class="pill" data-go="transicion">transición de contexto</span>. Por eso el <b>total</b> también sale bien (suma cada cliente ya ajustado).</p>`)}
  ${exer('', `<p>Tabla de factores: A +10%, B +25%, C −15%. Bases 100/200/300. Además mueves el slicer global a +10%. ¿Total con el método híbrido?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary><p>A: 100×1,10×1,10 = 121 · B: 200×1,25×1,10 = 275 · C: 300×0,85×1,10 = 280,5. Total = <b>676,5</b>. Cada cliente con su % de tabla, y el slicer global multiplica encima a todos.</p></details>`)}
  `
});

N({ id:'sim-4', parent:'simuladores', title:'Escenario 4 · Ajuste Global + Ajuste Individual', icon:'🔴⚠️⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado', uso:'Forecast realista',
  deps:['sim-3'], related:['sim-7','calc-leer'], fns:['calculate','fn-iteradores'],
  subtitle:'Un slicer global + un slicer de % POR cliente. El resultado es una matriz/tabla donde el total de cada cliente queda afectado por su propio porcentaje, todo movido desde las barras de los slicers (sin tablas editadas a mano).',
  html: ()=> `
  <h3>Qué vamos a lograr (el resultado final)</h3>
  <p>Una <b>tabla o matriz</b> con un cliente por fila. Cada fila muestra su venta base y su <b>venta ajustada</b>, donde el ajuste de cada cliente sale de <b>su propio slicer</b> de porcentaje, y además hay un slicer <b>global</b> que afecta a todos a la vez. Así se ve cuando mueves los slicers a Global +10%, A +20%, B −10%, C 0%:</p>
  ${tbl(['Cliente','Venta Base','Slicer Global','Slicer Individual','<b>Total Ajustado (en la matriz)</b>'],[
    ['A','100','+10%','+20%','100 × 1,10 × 1,20 = <b>132</b>'],
    ['B','200','+10%','−10%','200 × 1,10 × 0,90 = <b>198</b>'],
    ['C','300','+10%','0%','300 × 1,10 × 1,00 = <b>330</b>'],
    ['<b>Total</b>','<b>600</b>','','','<b>660</b>'],
  ])}
  <p>Cada total de cliente reacciona a un % distinto; el total general suma los tres ya ajustados.</p>

  ${why('La técnica clave: un slicer (parámetro What-If) por cliente', `<p>Como cada cliente necesita su <b>propio</b> porcentaje al mismo tiempo, y un slicer solo guarda un valor, creamos <b>un parámetro What-If por cliente</b> (A, B, C). Cada uno aparece como su propia barra deslizante. La medida luego "enruta" a cada cliente hacia su slicer. Esto funciona perfecto cuando los clientes son pocos y conocidos (como aquí). Para decenas de clientes, ver la nota de escalabilidad al final.</p>`)}

  <h3>Paso 1 · Crear los slicers (clic a clic)</h3>
  ${best('', `<ol>
    <li><b>Slicer global:</b> Modelado → Nuevo parámetro → Rango numérico. Nombre <code class="inl">Ajuste Global %</code> (mín −0,30, máx 0,30, incremento 0,05, predet. 0). Marca "agregar segmentación". Crear.</li>
    <li><b>Un slicer por cliente:</b> repite el asistente tres veces, creando <code class="inl">Ajuste A %</code>, <code class="inl">Ajuste B %</code> y <code class="inl">Ajuste C %</code>. Tendrás 4 barras de slicer en la página.</li>
    <li>Cada asistente crea su tabla suelta y su medida de lectura (p. ej. <code class="inl">Ajuste A % Valor = SELECTEDVALUE('Ajuste A %'[Ajuste A %], 0)</code>). Ya está hecho por Power BI.</li>
  </ol>`)}

  <h3>Paso 2 · La medida que enruta cada cliente a su slicer</h3>
  ${dax(`
Venta Ajustada =
VAR Global = [Ajuste Global % Valor]                 -- la barra global (una para todos)
RETURN
    SUMX (
        VALUES ( Clientes[Cliente] ),                -- recorre cliente por cliente
        VAR Base = [Ventas Base]                     -- ventas de ESTE cliente
        VAR Indiv =                                  -- elige la barra de ESTE cliente
            SWITCH (
                SELECTEDVALUE ( Clientes[Cliente] ),
                "A", [Ajuste A % Valor],
                "B", [Ajuste B % Valor],
                "C", [Ajuste C % Valor],
                0                                    -- si aparece otro cliente: sin ajuste
            )
        RETURN
            Base * ( 1 + Global ) * ( 1 + Indiv )    -- base × global × individual
    )`)}
  ${engine('Léelo en palabras, línea por línea', `<ol>
    <li><code class="inl">Global</code> = el % de la barra global (vale para todos).</li>
    <li><code class="inl">SUMX(VALUES(Clientes[Cliente]), …)</code> = ve cliente por cliente y al final suma.</li>
    <li><code class="inl">Base</code> = ventas del cliente de la fila actual.</li>
    <li><code class="inl">SWITCH(SELECTEDVALUE(Clientes[Cliente]), …)</code> = mira QUIÉN es este cliente y devuelve el % de SU barra: si es "A" toma la barra de A, si es "B" la de B, etc.</li>
    <li><code class="inl">Base × (1+Global) × (1+Indiv)</code> = aplica primero el % global y encima el individual.</li>
  </ol>
  <p>Como cada fila de la matriz "es" un cliente, <code class="inl">SELECTEDVALUE(Clientes[Cliente])</code> sabe en qué cliente está y le da el % de su propia barra. Por eso cada total de cliente queda afectado por un porcentaje distinto.</p>`)}

  <h3>Paso 3 · Armar la visualización</h3>
  ${best('', `<ol>
    <li>Inserta una <b>matriz</b> (o una tabla). En <b>Filas</b> pon <code class="inl">Clientes[Cliente]</code>.</li>
    <li>En <b>Valores</b> pon <code class="inl">[Ventas Base]</code> y <code class="inl">[Venta Ajustada]</code>.</li>
    <li>Coloca al lado las 4 barras de slicer. Muévelas: cada total de cliente cambia según su propia barra, y todos a la vez según la global. ✔</li>
  </ol>`)}

  ${warn('¿Por qué multiplicar y no sumar los % ?', `<p>"+10% global y +20% individual" se aplican <b>uno sobre otro</b>: 1,10 × 1,20 = 1,32 (+32%), no 1,10 + 0,20. Multiplicar modela el crecimiento compuesto. Si tu negocio los define como aditivos, sería <code class="inl">Base × (1 + Global + Indiv)</code>: acláralo con Finanzas, es una decisión de negocio.</p>`)}
  ${err('No sumes dos medidas que comparten la base (doble conteo)', `<p>Si calcularas "ajuste global" y "ajuste individual" por separado y los sumaras, la venta base entraría <b>dos veces</b>. Por eso todo va en <b>una sola medida</b>, con <b>una sola base</b>, multiplicando los dos factores dentro del mismo <code class="inl">SUMX</code>.</p>`)}

  ${best('Cómo escala esto', `<ul>
    <li><b>Pocos clientes y conocidos:</b> un parámetro What-If por cliente + <code class="inl">SWITCH</code> (lo de aquí). Totalmente por slicers.</li>
    <li><b>Muchos clientes:</b> una barra por cliente es inviable. Ahí la herramienta correcta es una <b>tabla de factores</b> en el modelo (un % por cliente, traída de Excel/origen, no editada en el informe) o <b>parámetros de campo</b>. Ver <span class="pill" data-go="sim-3">Escenario 3</span>.</li>
  </ul>`)}

  ${exer('Comprueba que lo entendiste', `<p>Mueves: Global = −10%, A = +20%, B = 0%, C = −5%. Bases: A 100, B 200, C 300. ¿Qué muestra cada fila y el total de la matriz?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary>
  <p>A: 100 × 0,90 × 1,20 = <b>108</b> · B: 200 × 0,90 × 1,00 = <b>180</b> · C: 300 × 0,90 × 0,95 = <b>256,5</b>. Total = <b>544,5</b>. Cada fila usa su propia barra encima de la global; el total suma las tres ya ajustadas.</p></details>`)}
  `
});

N({ id:'sim-5', parent:'simuladores', title:'Escenario 5 · Selección Dinámica de Cliente', icon:'🔴',
  importancia:'★★★★☆', dificultad:'🔴 Avanzado', uso:'Análisis interactivo',
  deps:['sim-2','relaciones'], related:['sim-6','ctx-filtro'], fns:['fn-tablas','calculate'],
  subtitle:'Slicer 1 = Cliente, Slicer 2 = Porcentaje. El usuario elige "Cliente B" y "+15%" y SOLO B cambia, manteniendo a todos visibles. Paso a paso, con los clics en Power BI.',
  html: ()=> `
  <h3>Qué vamos a lograr</h3>
  <p>Dos slicers: uno para <b>elegir el cliente</b> y otro para <b>el %</b>. El usuario elige "B" y "+15%", y en la tabla <b>solo la fila de B</b> sube; A, C, D… siguen visibles y sin cambios. La diferencia con el Escenario 2 es que aquí el cliente se elige en un slicer cómodo (no hace falta tocar la medida).</p>
  ${diagram(`
   ┌──────────────────┐        ┌──────────────────┐
   │ Cliente Objetivo │        │     Ajuste %     │
   │  (SUELTA)        │        │  (What-If)       │
   │   slicer 1       │        │    slicer 2      │
   └────────┬─────────┘        └────────┬─────────┘
            │ SELECTEDVALUE              │ SELECTEDVALUE
            ▼                            ▼
        Objetivo = "B"              Pct = +15%
            └──────────┬─────────────────┘
                       ▼
   Por cada cliente: ¿es el objetivo? → Base × (1+Pct), si no → Base
                       ▼
   La tabla de Ventas (conectada) se muestra COMPLETA`)}

  <h3>Paso 1 · El slicer de % (What-If)</h3>
  ${best('', `<p>Si ya hiciste la <span class="pill" data-go="sim-guia">Guía</span>, reutiliza <code class="inl">Ajuste %</code>. Si no: Modelado → Nuevo parámetro → Rango numérico, nómbralo <code class="inl">Ajuste %</code> (mín −0,30, máx 0,30, paso 0,05, predet. 0), marca "agregar segmentación". Crear.</p>`)}

  <h3>Paso 2 · El slicer de cliente (una copia SUELTA)</h3>
  ${best('', `<ol>
    <li>Modelado → <b>Nueva tabla</b>: <code class="inl">Cliente Objetivo = DISTINCT ( Clientes[Cliente] )</code>. Crea una copia <b>suelta</b> de la lista de clientes (Power BI no la une).</li>
    <li>Inserta un <b>slicer</b> y arrástrale <code class="inl">Cliente Objetivo[Cliente]</code>. Este será el selector de "a quién ajustar".</li>
  </ol>`)}
  ${warn('¿Por qué una copia suelta y no la lista normal?', `<p>Si el slicer usara la tabla <code class="inl">Clientes</code> conectada, al elegir "B" <b>desaparecerían</b> A, C, D de la tabla (filtrarías los datos). Con la copia <b>suelta</b> solo le dices a la medida "el objetivo es B", <b>sin esconder</b> a nadie. Por eso la tabla se ve completa.</p>`)}

  <h3>Paso 3 · La medida</h3>
  ${dax(`
Simulación Dinámica =
VAR Objetivo = SELECTEDVALUE ( 'Cliente Objetivo'[Cliente] )   -- a quién (slicer suelto)
VAR Pct      = [Ajuste % Valor]                                -- cuánto (What-If)
RETURN
    SUMX (
        VALUES ( Clientes[Cliente] ),
        VAR ClienteFila = SELECTEDVALUE ( Clientes[Cliente] )
        VAR Base = [Ventas Base]
        RETURN IF ( ClienteFila = Objetivo, Base * ( 1 + Pct ), Base )
    )`)}
  ${engine('En palabras', `<ol>
    <li><code class="inl">Objetivo</code> = el cliente elegido en el slicer suelto.</li>
    <li>Recorre cliente por cliente. En cada uno: <code class="inl">ClienteFila</code> = quién es.</li>
    <li><code class="inl">IF(ClienteFila = Objetivo, …)</code>: si coincide con el elegido, le aplica el %; si no, deja su base intacta.</li>
  </ol>
  <p>Como el slicer es suelto, no esconde a nadie: solo aporta el "a quién". El % y el "a quién" se comparan con cada fila para decidir.</p>`)}

  <h3>Paso 4 · Permitir elegir VARIOS clientes objetivo</h3>
  ${best('', `<p>¿Quieres seleccionar B y D a la vez (ambos +15%)? Cambia una línea: en vez de comparar con un único objetivo, comprueba <b>pertenencia</b> a la selección.</p>
  ${dax(`
Simulación Multi-objetivo =
VAR Pct = [Ajuste % Valor]
RETURN
    SUMX (
        VALUES ( Clientes[Cliente] ),
        VAR ClienteFila = SELECTEDVALUE ( Clientes[Cliente] )
        VAR Base = [Ventas Base]
        VAR EsObjetivo =
            ClienteFila IN VALUES ( 'Cliente Objetivo'[Cliente] )  -- ¿está en la selección?
        RETURN IF ( EsObjetivo, Base * ( 1 + Pct ), Base )
    )`)}`)}
  ${warn('SELECTEDVALUE se "rompe" con selección múltiple', `<p>Si eliges varios clientes, <code class="inl">SELECTEDVALUE('Cliente Objetivo'[Cliente])</code> devuelve BLANK (no hay "uno solo"). Por eso para varios usas <code class="inl">ClienteFila IN VALUES(...)</code>, que da Verdadero si el cliente está entre los elegidos.</p>`)}

  ${err('Relacionar el slicer de cliente', `<p>El error que mata este escenario: si conectas <code class="inl">Cliente Objetivo</code> con flechas, filtras la tabla de hechos y pierdes la vista completa. <b>Suelta siempre.</b></p>`)}
  ${exer('', `<p>Eliges "C" y "−20%". C base 300, resto 100/200/400. ¿Qué muestra la tabla?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary><p>Solo C cambia: 300×0,80 = <b>240</b>. Los demás siguen en 100, 200, 400. Total = 100+200+240+400 = <b>940</b>. El slicer suelto no escondió a nadie; la medida solo ajustó a C.</p></details>`)}
  `
});

N({ id:'sim-6', parent:'simuladores', title:'Escenario 6 · Matriz de Ventas Proyectadas (Meses × Clientes)', icon:'🔴⚠️⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado', uso:'Vista típica de planning',
  deps:['sim-5','ctx-filtro'], related:['sim-9','evaluacion'], fns:['calculate','fn-tablas'],
  subtitle:'Matriz con MESES en las filas y CLIENTES en las columnas. La misma medida del Escenario 4 (slicer global + un slicer por cliente) funciona igual aunque los clientes estén en columnas: cada columna queda afectada por su propio %.',
  html: ()=> `
  <h3>La matriz objetivo (meses en filas, clientes en columnas)</h3>
  ${diagram(`
   VENTA BASE              Cliente A   Cliente B   Cliente C
   Ene-26                      100         200         300
   Feb-26                      110         220         310
   Mar-26                      120         230         320`)}
  <p>Queremos que, al mover los slicers, <b>cada columna de cliente</b> se ajuste por <b>su propio %</b>, encima de un % global, en todos los meses. Reutilizamos exactamente los slicers del <span class="pill" data-go="sim-4">Escenario 4</span>: <code class="inl">Ajuste Global %</code> y un What-If por cliente (<code class="inl">Ajuste A %</code>, <code class="inl">Ajuste B %</code>, <code class="inl">Ajuste C %</code>).</p>

  <h3>La gran noticia: la medida es LA MISMA ⭐</h3>
  ${dax(`
Venta Ajustada =
VAR Global = [Ajuste Global % Valor]
RETURN
    SUMX (
        VALUES ( Clientes[Cliente] ),
        VAR Base  = [Ventas Base]                    -- respeta el MES (fila) y el cliente (columna)
        VAR Indiv =
            SWITCH (
                SELECTEDVALUE ( Clientes[Cliente] ),
                "A", [Ajuste A % Valor],
                "B", [Ajuste B % Valor],
                "C", [Ajuste C % Valor],
                0
            )
        RETURN Base * ( 1 + Global ) * ( 1 + Indiv )
    )`)}
  ${warn('No cambia nada porque los clientes estén en columnas en vez de filas', `<p>Da igual si pones <code class="inl">Clientes[Cliente]</code> en filas o en columnas: para Power BI, cada <b>celda</b> de la matriz lleva sus dos coordenadas (mes y cliente) en el contexto de filtro. La medida lee el cliente con <code class="inl">SELECTEDVALUE(Clientes[Cliente])</code> sin importar dónde esté colocado. Por eso <b>la misma medida del Escenario 4 sirve tal cual</b>.</p>`)}

  <h3>Cómo lo entiende Power BI, celda por celda</h3>
  ${engine('Celda "Feb-26 / Cliente B"', `<p>Esa celda tiene en su contexto: <code class="inl">Calendario[Mes]="Feb-26"</code> (viene de la <b>fila</b>) y <code class="inl">Clientes[Cliente]="B"</code> (viene de la <b>columna</b>). Entonces:</p>
  <ol>
    <li><code class="inl">[Ventas Base]</code> ya está filtrado a Feb-26 y a B → 220. <b>No filtras el mes a mano: lo pone la fila.</b></li>
    <li><code class="inl">SELECTEDVALUE(Clientes[Cliente])</code> = "B" (lo pone la columna) → el SWITCH toma <code class="inl">[Ajuste B % Valor]</code>.</li>
    <li>Resultado de la celda: 220 × (1+Global) × (1+%B).</li>
  </ol>`)}

  <h3>Paso a paso para construir la matriz</h3>
  ${best('', `<ol>
    <li>Asegúrate de tener los slicers del Escenario 4 en la página (global + A, B, C) y la medida <code class="inl">Venta Ajustada</code>.</li>
    <li>Inserta una <b>Matriz</b>.</li>
    <li><b>Filas</b> → arrastra <code class="inl">Calendario[Mes]</code>.</li>
    <li><b>Columnas</b> → arrastra <code class="inl">Clientes[Cliente]</code>. (Aquí es donde los clientes quedan en columnas.)</li>
    <li><b>Valores</b> → arrastra <code class="inl">[Venta Ajustada]</code>.</li>
    <li>Mueve los slicers: cada <b>columna de cliente</b> reacciona a su propio %, en todos los meses. ✔</li>
  </ol>`)}

  <h3>El resultado con Global +10%, A +20%, B −10%, C 0%</h3>
  ${diagram(`
   Factores por columna:    A ×1,10×1,20=1,32   B ×1,10×0,90=0,99   C ×1,10×1,00=1,10

   VENTA AJUSTADA           Cliente A   Cliente B   Cliente C   | Total mes
   Ene-26                       132         198         330     |    660
   Feb-26                    145,2       217,8         341     |  704,0
   Mar-26                    158,4       227,7         352     |  738,1
   ────────────────────────────────────────────────────────────────────
   Total cliente             435,6       643,5        1023     | 2102,1`)}
  <p>Cada columna usa su propio factor en todos los meses; la columna "Total mes" y la fila "Total cliente" suman lo ya ajustado.</p>

  ${warn('Por qué los TOTALES salen bien (gracias a SUMX)', `<p>En la columna <b>Total mes</b> (por ejemplo el total de Ene) no hay un cliente único: están A, B y C juntos. <code class="inl">SUMX(VALUES(Clientes[Cliente]),…)</code> recorre los tres, le da a cada uno <b>su</b> %, y luego suma. Sin <code class="inl">SUMX</code>, el total no sabría qué % usar y saldría mal. Lo mismo ocurre con el total general. Ver <span class="pill" data-go="sim-9">funcionamiento interno</span>.</p>`)}
  ${err('Filtrar el mes dentro de la medida', `<p>No escribas <code class="inl">Calendario[Mes]=...</code> en la medida: el mes ya lo impone la fila de la matriz. Tu medida solo se ocupa del ajuste por cliente; el visual aporta las coordenadas.</p>`)}
  ${best('', `<p>Una <b>única medida</b> (la del Escenario 4) cubre filas o columnas, un cliente o todos, global o individual. Cambias dónde colocas los campos y qué slicers tocas; la lógica no se duplica.</p>`)}
  `
});

N({ id:'sim-7', parent:'simuladores', title:'Escenario 7 · Forecast Corporativo (Base / Optimista / Pesimista)', icon:'🔴⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado', uso:'Planeamiento financiero',
  deps:['sim-4','fn-tiempo'], related:['sim-8','casos'], fns:['calculate','fn-logica','fn-tiempo'],
  subtitle:'Un slicer de escenario (Base / Optimista / Pesimista) que recalcula toda la matriz de forecast (meses en filas, clientes en columnas) de golpe. Paso a paso, con el resultado en matriz.',
  html: ()=> `
  <h3>Qué vamos a lograr</h3>
  <p>Una <b>matriz</b> con meses en filas y <b>clientes en columnas</b>, donde un <b>slicer</b> permite cambiar entre <b>Base</b>, <b>Optimista</b> y <b>Pesimista</b>. Al pulsar otro escenario, todos los valores (y los KPIs del informe) se recalculan al instante con sus supuestos.</p>

  <h3>Paso 1 · Crear la tabla de escenarios y su slicer</h3>
  ${best('', `<ol>
    <li>Cinta <b>Modelado → Nueva tabla</b> y pega lo siguiente (es una tabla <b>suelta</b>, sin unir):
      ${dax(`
Escenarios =
DATATABLE (
    "Escenario", STRING, "Crecimiento", DOUBLE, "Inflación Costos", DOUBLE,
    {
        { "Base",      0.05, 0.04 },
        { "Optimista", 0.15, 0.03 },
        { "Pesimista", -0.05, 0.07 }
    }
)`)}
    </li>
    <li>Inserta un <b>slicer</b> y arrástrale el campo <code class="inl">Escenarios[Escenario]</code>. Ya tienes los tres botones: Base / Optimista / Pesimista.</li>
  </ol>`)}

  <h3>Paso 2 · La medida de forecast (lee el slicer)</h3>
  ${dax(`
Forecast Ventas =
VAR Crecimiento = SELECTEDVALUE ( Escenarios[Crecimiento], 0 )   -- lee el escenario elegido
RETURN
    [Ventas Base] * ( 1 + Crecimiento )`)}
  ${engine('En palabras', `<p>El slicer pone, por ejemplo, <code class="inl">Escenarios[Escenario]="Optimista"</code>. <code class="inl">SELECTEDVALUE(Escenarios[Crecimiento])</code> trae el crecimiento de esa fila (0,15). La medida multiplica las ventas base por 1,15. Como la tabla está <b>suelta</b>, el slicer no filtra los datos: solo entrega el número de crecimiento que tú usas.</p>`)}

  <h3>Paso 3 · Armar la matriz (clientes en columnas)</h3>
  ${best('', `<ol>
    <li>Inserta una <b>Matriz</b>. <b>Filas</b> → <code class="inl">Calendario[Mes]</code>. <b>Columnas</b> → <code class="inl">Clientes[Cliente]</code>. <b>Valores</b> → <code class="inl">[Forecast Ventas]</code>.</li>
    <li>Pon el slicer de escenario al lado. Cámbialo y la matriz entera se recalcula.</li>
  </ol>`)}
  ${diagram(`
   Escenario = OPTIMISTA  (crecimiento +15% → ×1,15)

   FORECAST VENTAS         Cliente A   Cliente B   Cliente C
   Ene-26                       115         230         345
   Feb-26                    126,5         253       356,5
   Mar-26                       138       264,5         368`)}
  <p>Cambias a <b>Pesimista</b> (−5% → ×0,95) y toda la matriz baja; a <b>Base</b> (+5%) queda en medio. Un solo slicer, tres narrativas.</p>

  ${analogy('Combínalo con el Escenario 4', `<p>Si quieres, puedes <b>encadenar</b> este slicer de escenario con los slicers por cliente del <span class="pill" data-go="sim-4">Escenario 4</span>: el escenario aporta el crecimiento macro y cada cliente su ajuste fino. Sería <code class="inl">Base × (1 + Crecimiento del escenario) × (1 + % del cliente)</code> dentro del mismo <code class="inl">SUMX</code>.</p>`)}

  <h3>Forecast de costos y margen (palancas independientes)</h3>
  ${dax(`
Forecast Costos =
VAR Inflacion = SELECTEDVALUE ( Escenarios[Inflación Costos], 0 )
RETURN
    [Costos Base] * ( 1 + Inflacion )

Forecast Margen = [Forecast Ventas] - [Forecast Costos]`)}
  ${engine('', `<p>Ventas y costos tienen palancas <b>distintas</b> (crecimiento ≠ inflación). En "Pesimista" las ventas caen y los costos suben a la vez → el margen se aprieta de forma realista. El mismo slicer mueve ambos.</p>`)}

  ${best('Buenas prácticas de forecast', `<ul>
    <li>Separa los <b>supuestos</b> (la tabla de escenarios) de la <b>lógica</b> (las medidas): cambiar un número no obliga a tocar DAX.</li>
    <li>Para <b>rolling forecast</b> (últimos N meses como base) usa <span class="pill" data-go="fn-tiempo">DATESINPERIOD</span>.</li>
    <li>Si necesitas ver los tres escenarios <b>a la vez</b> (gráfico de abanico), crea tres medidas; si solo muestras uno, la versión con slicer es más limpia.</li>
  </ul>`)}
  ${warn('Define qué es la "base"', `<p>¿La base del forecast es el año anterior, el real YTD anualizado, el presupuesto? Cambia por completo los números. Documenta el supuesto en el propio informe para que nadie lo malinterprete.</p>`)}
  `
});

N({ id:'sim-8', parent:'simuladores', title:'Escenario 8 · Impacto en KPIs (cascada hasta EBITDA)', icon:'🔴⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado', uso:'Dashboards ejecutivos',
  deps:['sim-7'], related:['casos','sim-9'], fns:['calculate','fn-errores'],
  subtitle:'Cómo un ajuste en ventas se propaga automáticamente a facturación, margen, EBITDA, rentabilidad, presupuesto y variaciones, sin recalcular nada a mano.',
  html: ()=> `
  ${why('El valor del simulador está en la cascada', `<p>Ajustar ventas es trivial; lo valioso es que ese ajuste <b>fluya</b> por todo el P&L hasta el EBITDA y los ratios. Si construyes tus KPIs <b>referenciando</b> la medida ajustada (no la base), todo el tablero reacciona solo. Eso es un simulador ejecutivo de verdad.</p>`)}

  <h3>La cadena de dependencias de medidas</h3>
  ${diagram(`
   [Factor / Escenario]  (slicer)
            │
            ▼
   [Ventas Ajustadas] ──────────────┐
            │                        │
            ▼                        ▼
   [Facturación Aj.]          [Costo Variable Aj.]  (% sobre ventas)
            │                        │
            └──────────┬─────────────┘
                       ▼
                 [Margen Bruto Aj.]
                       │  − [OPEX]  (fijo o con su palanca)
                       ▼
                  [EBITDA Aj.]
                 ╱        ╲
                ▼          ▼
   [% Margen EBITDA]   [Var vs Presupuesto]`)}

  <h3>Paso a paso para construir la cascada</h3>
  ${best('Crea estas medidas EN ESTE ORDEN (cada una usa la anterior)', `<ol>
    <li>Parte de tu medida ajustada de cualquiera de los escenarios anteriores, por ejemplo <code class="inl">[Ventas Ajustadas]</code> del <span class="pill" data-go="sim-4">Escenario 4</span> (la que ya reacciona al slicer).</li>
    <li>Necesitas dos supuestos en el modelo: <code class="inl">[% Costo Variable]</code> (qué porción de la venta es costo que escala, p.ej. 40%) y <code class="inl">[OPEX]</code> (los costos fijos del periodo). Pueden ser medidas o columnas de tu P&L.</li>
    <li>Crea las medidas de la cascada una a una (Inicio → Nueva medida):
      ${dax(`
Costo Variable Aj. = [Ventas Ajustadas] * [% Costo Variable]   -- escala con ventas
Margen Bruto Aj.   = [Ventas Ajustadas] - [Costo Variable Aj.]
EBITDA Ajustado    = [Margen Bruto Aj.] - [OPEX]               -- OPEX fijo, NO escala
% Margen EBITDA    = DIVIDE ( [EBITDA Ajustado], [Ventas Ajustadas] )
Var EBITDA vs Ppto = [EBITDA Ajustado] - [EBITDA Presupuesto]
Var %              = DIVIDE ( [Var EBITDA vs Ppto], [EBITDA Presupuesto] )`)}
    </li>
    <li>Pon cada una en una <b>tarjeta</b> (o todas en una tabla). Coloca el slicer de ajuste al lado.</li>
    <li>Mueve el slicer: <b>todas</b> las tarjetas cambian a la vez, porque todas cuelgan de <code class="inl">[Ventas Ajustadas]</code>.</li>
  </ol>`)}

  <h3>Ejemplo numérico completo (slicer en +20%)</h3>
  <p>Supuestos: Ventas base 1.000, % Costo Variable 40%, OPEX fijo 300, EBITDA Presupuesto 350.</p>
  ${tbl(['Renglón','Base (slicer 0%)','Ajustado (slicer +20%)','Cómo sale el ajustado'],[
    ['Ventas','1.000','<b>1.200</b>','1.000 × 1,20'],
    ['Costo Variable (40%)','−400','<b>−480</b>','1.200 × 40% (escala con ventas)'],
    ['Margen Bruto','600','<b>720</b>','1.200 − 480'],
    ['OPEX (fijo)','−300','<b>−300</b>','no cambia'],
    ['<b>EBITDA</b>','<b>300</b>','<b>420</b>','720 − 300'],
    ['% Margen EBITDA','30,0%','<b>35,0%</b>','420 / 1.200'],
    ['Var vs Presupuesto','−50','<b>+70</b>','420 − 350'],

  ${engine('Lee el ejemplo: el apalancamiento operativo ⭐', `<p>Las ventas suben <b>+20%</b> (1.000→1.200), pero el EBITDA sube <b>+40%</b> (300→420). ¿Por qué el doble? Porque el costo variable subió proporcional, pero el <b>OPEX fijo (300) no se movió</b>: ese costo fijo se "diluye" sobre más ventas. Eso es el <b>apalancamiento operativo</b>, y por eso el % de margen mejora del 30% al 35%. Además, pasaste de estar <b>50 por debajo</b> del presupuesto a <b>70 por encima</b>. Un solo slider cuenta toda esta historia.</p>`)}

  ${warn('Costos fijos vs variables: el detalle que da realismo ⚠️', `<p>El error frecuente es escalar <b>todo</b> el costo con las ventas. En la realidad, los <b>variables</b> (materia prima, comisiones) escalan; los <b>fijos</b> (alquileres, estructura, gran parte del OPEX) no. Modelar esa diferencia es lo que hace creíble el simulador ante un CFO y lo que revela el apalancamiento operativo.</p>`)}

  ${tbl(['KPI','Cómo reacciona al +20% en ventas','Por qué'],[
    ['Facturación','+20%','Directo'],
    ['Costo variable','+20%','Proporcional a ventas'],
    ['OPEX fijo','0%','No depende del volumen'],
    ['EBITDA','> +20%','Apalancamiento: costos fijos diluidos'],
    ['% Margen','Mejora','EBITDA crece más rápido que ventas'],
    ['Var vs Ppto','Mejora','Mayor EBITDA sobre el mismo presupuesto'],
  ])}

  ${best('', `<ul>
    <li><b>Nunca</b> repitas la lógica de ajuste en cada KPI. Defínela una vez en <code class="inl">[Ventas Ajustadas]</code> y referencia hacia arriba.</li>
    <li>Separa costos fijos y variables en el modelo (o con una clasificación en PlanCuentas).</li>
    <li>Muestra siempre el <b>delta vs presupuesto/base</b>: el ejecutivo piensa en variaciones, no en valores absolutos.</li>

  `
});

N({ id:'sim-9', parent:'simuladores', title:'Escenario 9 · Funcionamiento Interno (flujo paso a paso)', icon:'🔴⚠️⭐',
  importancia:'★★★★★ (la parte más importante)', dificultad:'🔴 Avanzado', uso:'Modelo mental maestro',
  deps:['sim-6','evaluacion','transicion'], related:['ctx-filtro','calc-leer'], fns:['calculate','fn-tablas'],
  subtitle:'El "rayos X" del simulador: qué hace el slicer internamente, qué hace SELECTEDVALUE, qué hace CALCULATE, cómo se construye y propaga el contexto, y cómo Power BI decide qué clientes modificar y cuáles no.',
  html: ()=> `
  ${why('Si entiendes este flujo, puedes construir cualquier simulador', `<p>Los ocho escenarios anteriores son variaciones de <b>un mismo mecanismo</b>. Esta página lo abre en canal. Cuando lo domines, no necesitarás recetas: deducirás la medida desde primeros principios.</p>`)}

  <h3>1 · ¿Qué hace el slicer internamente?</h3>
  ${engine('', `<p>Un slicer <b>no ejecuta código</b>. Lo único que hace es <b>añadir un filtro al contexto de filtro</b> de todos los visuales de la página. Slicer de <code class="inl">Ajustes[Etiqueta]</code> en "+10%" → añade <code class="inl">Ajustes[Etiqueta]="+10%"</code> al contexto. Como <code class="inl">Ajustes</code> está <b>desconectada</b>, ese filtro no se propaga a ninguna tabla de datos: queda "disponible" para que una medida lo lea. Si estuviera conectada, se propagaría por la relación y filtraría hechos.</p>`)}

  <h3>2 · ¿Qué hace SELECTEDVALUE internamente?</h3>
  ${engine('', `<p><code class="inl">SELECTEDVALUE(Ajustes[Factor], 1)</code> mira la columna <code class="inl">Ajustes[Factor]</code> <b>dentro del contexto de filtro actual</b>. Como el slicer dejó visible una sola fila ("+10%" → Factor 1,10), hay un único valor → lo devuelve. Internamente es <code class="inl">IF(HASONEVALUE(Ajustes[Factor]), VALUES(Ajustes[Factor]), 1)</code>. Si hubiera 0 o varias filas visibles, devuelve el default. <b>Convierte "qué botón pulsó el usuario" en un número usable.</b></p>`)}

  <h3>3 · ¿Qué hace CALCULATE internamente aquí?</h3>
  ${engine('', `<p>En <code class="inl">CALCULATE(SUM(Proyeccion[VentaProyectada]))</code> dentro del SUMX, CALCULATE ejecuta la <span class="pill" data-go="transicion">transición de contexto</span>: toma el cliente de la iteración actual y lo convierte en filtro sobre <code class="inl">Proyeccion</code>. Así "Base" pasa de ser el total a ser <b>la base de ese cliente concreto</b>. Sin ese CALCULATE, cada iteración sumaría el total completo.</p>`)}

  <h3>4 · Cómo se construye el contexto de filtro de una celda</h3>
  ${diagram(`
  Celda "Mar-26 / Cliente B" en la matriz, slicers: Ajuste="+10%", Objetivo="B"

  CONTEXTO DE FILTRO de la celda =
     { Calendario[Mes] = "Mar-26" }     ← de la FILA del visual
   ∪ { Cliente[Cliente] = "B" }         ← de la COLUMNA del visual
   ∪ { Ajustes[Etiqueta] = "+10%" }     ← del SLICER (desconectado: no propaga)
   ∪ { ClienteObjetivo[Cliente] = "B" } ← del SLICER (desconectado: no propaga)`)}

  <h3>5 · Cómo se propagan los filtros</h3>
  ${diagram(`
   { Mes="Mar-26" }  ──1:*──►  Proyeccion  (queda solo marzo)
   { Cliente="B" }   ──1:*──►  Proyeccion  (queda solo B)
   ──────────────────────────────────────────────────────
   Intersección: Proyeccion filtrada a (Mar-26 ∧ B) = la celda exacta
   Ajustes / ClienteObjetivo: NO propagan (desconectadas) → solo se leen`)}

  <h3>6 · Cómo Power BI sabe qué clientes modificar y cuáles no</h3>
  ${engine('El corazón de la decisión', `<p>Dentro del <code class="inl">SUMX(VALUES(Cliente[Cliente]))</code>, en cada iteración:</p>
  <ol>
    <li><code class="inl">ClienteFila = SELECTEDVALUE(Cliente[Cliente])</code> → el cliente de esta iteración (ej. "B").</li>
    <li>Se compara con <code class="inl">Objetivo</code> (del slicer desconectado, "B").</li>
    <li><code class="inl">IF(ClienteFila = Objetivo, ...)</code> decide: <b>coincide → ajusta; no coincide → base intacta</b>.</li>
  </ol>
  <p>Power BI no "sabe" nada mágico: <b>tú</b> comparas la coordenada de la celda (que el visual impone) con el parámetro del slicer (que tú lees). La igualdad <code class="inl">ClienteFila = Objetivo</code> es toda la inteligencia. Los que no cumplen la condición conservan su base — por eso el resto no se modifica.</p>`)}

  <h3>7 · El flujo completo de evaluación, de principio a fin</h3>
  ${diagram(`
  ┌─ Usuario pulsa "+10%" y "Cliente B" en los slicers ──────────────┐
  │                                                                    │
  ▼                                                                    │
  1. Slicers añaden al contexto: Ajuste="+10%", Objetivo="B"          │
  2. Para CADA celda de la matriz, el visual añade Mes + Cliente       │
  3. La medida arranca:                                                │
        FactorGlobal = SELECTEDVALUE(Ajustes[Factor]) = 1,10           │
        Objetivo     = SELECTEDVALUE(ClienteObjetivo[Cliente]) = "B"   │
  4. SUMX recorre VALUES(Cliente[Cliente]):                            │
        · Cliente A → ClienteFila="A" ≠ "B" → Base_A × 1,10 × 1        │
        · Cliente B → ClienteFila="B" = "B" → Base_B × 1,10 × FIndiv   │
        · Cliente C → ClienteFila="C" ≠ "B" → Base_C × 1,10 × 1        │
     (cada Base sale de CALCULATE = transición al cliente y al mes)    │
  5. SUMX acumula → valor de la celda                                  │
  6. Se pinta. Siguiente celda → vuelve al paso 2 con sus coordenadas  │
  └────────────────────────────────────────────────────────────────────┘`)}

  <h3>8 · Cómo interactúan slicers con matrices, gráficos y tablas</h3>
  ${engine('', `<p>El mecanismo es <b>idéntico</b> en cualquier visual, porque todos generan contexto de filtro igual:</p>
  <ul>
    <li><b>Matriz:</b> fila × columna → contexto bidimensional (lo visto arriba).</li>
    <li><b>Gráfico de barras:</b> cada barra es una categoría del eje → un contexto por barra.</li>
    <li><b>Tabla:</b> cada fila → un contexto. <b>Tarjeta:</b> un único contexto (a veces sin desglose → cuidado con SELECTEDVALUE).</li>
    <li><b>Slicer:</b> añade su filtro a <b>todos</b> los visuales de la página por igual.</li>
  </ul>
  <p>Por eso la misma medida de simulación funciona en todos a la vez: no depende del tipo de visual, sino del contexto de filtro que cada uno genera.</p>`)}

  ${best('La regla mental definitiva del simulador', `<p><b>El visual aporta las coordenadas (qué celda). El slicer desconectado aporta los parámetros (qué hacer). La medida compara coordenadas con parámetros y decide. CALCULATE/transición trae la base correcta de cada coordenada.</b> Con esas cuatro frases puedes reconstruir cualquiera de los 9 escenarios desde cero.</p>`)}
  `
});

N({ id:'sim-envivo', parent:'simuladores', title:'Edición Dinámica en Vivo con Muchos Clientes (30–50+)', icon:'🔴⭐',

  html: ()=> `

  <h3>━━━ OPCIÓN 1 · Visual de Power Apps (writeback) — la más potente ⭐ ━━━</h3>

  ${best('Paso a paso (visión completa)', `<ol>
    <li><b>Crea el "almacén" de los %:</b> una tabla en <b>Dataverse</b>, <b>SharePoint</b> o <b>SQL</b> con columnas <code class="inl">Cliente</code> y <code class="inl">Ajuste %</code> (una fila por cliente). Aquí se guardarán los valores que escriba el usuario.</li>
    <li><b>Conecta esa tabla a Power BI</b> con <b>Get Data</b>. Importante: usa <b>DirectQuery</b> (no Importar) si quieres que los cambios se reflejen casi al instante sin "Actualizar".</li>
    <li><b>Inserta el visual de Power Apps:</b> en el panel <i>Visualizaciones</i>, elige el icono de Power Apps. Arrastra al visual el campo <code class="inl">Clientes[Cliente]</code> (le da el contexto de qué clientes mostrar).</li>

    <li><b>La medida en Power BI</b> es la misma del Método 1 (lee la tabla de factores):
      ${dax(`
Venta Ajustada =
SUMX (
    VALUES ( Clientes[Cliente] ),
    VAR Cli  = SELECTEDVALUE ( Clientes[Cliente] )
    VAR Base = [Ventas Base]
    VAR Pct  = LOOKUPVALUE ( 'Factores Cliente'[Ajuste %], 'Factores Cliente'[Cliente], Cli, 0 )

)`)}

  <h3>━━━ OPCIÓN 2 · Translytical task flows (nativo, nuevo) ━━━</h3>
  ${analogy('Qué es', `<p>Es la función <b>reciente</b> de Power BI (2025) para <b>escribir de vuelta desde el propio informe</b> sin Power Apps. Pones controles nativos (botones, cuadros de número) en el informe; al usarlos, Power BI ejecuta una acción que <b>guarda</b> el valor en una base de datos y refresca el visual.</p>`)}

  <h3>━━━ OPCIÓN 3 · Segmentos / tiers (sin writeback, en vivo) ━━━</h3>

  ${best('Paso a paso', `<ol>
    <li><b>Etiqueta a cada cliente con su segmento.</b> En la dimensión <code class="inl">Clientes</code> añade una columna <code class="inl">Segmento</code> (A/B/C). Se hace en Power Query, o como columna calculada:
      ${dax(`
-- Ejemplo simple por tamaño de ventas (columna calculada en Clientes):
Segmento =
VAR v = CALCULATE ( SUM ( Ventas[Importe] ) )
RETURN SWITCH ( TRUE (), v >= 1000000, "A", v >= 200000, "B", "C" )`)}
    </li>
    <li><b>Crea un What-If por segmento:</b> Modelado → Nuevo parámetro → Rango numérico, tres veces: <code class="inl">Ajuste Seg A %</code>, <code class="inl">Ajuste Seg B %</code>, <code class="inl">Ajuste Seg C %</code>. Marca "agregar segmentación". Tendrás 3 sliders.</li>

    VAR Pct  =

            "B", [Ajuste Seg B % Valor],
            "C", [Ajuste Seg C % Valor],

        )
    RETURN Base * ( 1 + Pct )
)`)}
    </li>
    <li><b>Afinar uno puntual:</b> añade el patrón "objetivo vs resto" de la <span class="pill" data-go="sim-guia">Guía (Parte 4)</span> con un slicer de cliente, para sobre-ajustar un cliente concreto encima de su segmento.</li>

  ${engine('', `<p>No es "cada cliente 100% independiente", pero en planeamiento real <b>casi siempre</b> los ajustes se piensan por grupos (por tier, región o canal), no cliente a cliente. Por eso esta opción cubre la mayoría de los casos <b>sin montar ninguna infraestructura</b> y con interacción totalmente en vivo.</p>`)}

  <h3>━━━ OPCIÓN 4 · Híbrido (tabla de factores + slider global) ━━━</h3>
  ${analogy('La idea', `<p>La <b>tabla de factores</b> (Método 1) lleva el % fino de cada uno de los 50 clientes (mantenido en Excel y actualizado), y un <b>slider global</b> te deja jugar en vivo por encima de todos. Combinas la <b>escala</b> de la tabla con la <b>interactividad</b> de un control.</p>`)}
  ${dax(`
Venta Ajustada =
VAR SliderGlobal = [Ajuste Global % Valor]
RETURN
    SUMX (
        VALUES ( Clientes[Cliente] ),
        VAR Cli  = SELECTEDVALUE ( Clientes[Cliente] )
        VAR Base = [Ventas Base]
        VAR PctCliente = LOOKUPVALUE ( 'Factores Cliente'[Ajuste %], 'Factores Cliente'[Cliente], Cli, 0 )
        RETURN Base * ( 1 + PctCliente ) * ( 1 + SliderGlobal )
    )`)}
  ${best('Paso a paso', `<ol>
    <li>Monta la tabla de factores del <span class="pill" data-go="sim-3">Método 1</span> (50 clientes con su %).</li>
    <li>Crea un único What-If <code class="inl">Ajuste Global %</code> y su slicer.</li>
    <li>Usa la medida de arriba. El % fino lo da la tabla; el slicer global escala a todos en vivo.</li>
  </ol>`)}
  ${engine('Cuándo es ideal', `<p>Cuando los % por cliente los negocia/define Comercial (van en la tabla) y la Dirección quiere preguntar "¿y si todo el mercado cae un 5% más?" moviendo un solo control. Lo individual no se edita en vivo, pero el escenario global sí.</p>`)}

  <h3>Cómo decidir (en detalle)</h3>
  ${tbl(['Tu prioridad','Opción','Por qué','Coste / requisito'],[
    ['Editar el % de cada cliente en vivo, con muchos clientes','<b>1 · Power Apps</b>','Escritura individual desde el informe, escala a miles','Licencia Power Apps + almacén (Dataverse/SharePoint/SQL)'],
    ['Lo mismo, pero todo nativo Power BI','<b>2 · Translytical</b>','Writeback nativo desde controles del informe','Fabric + BD compatible; función nueva (validar madurez)'],
    ['Interacción en vivo sin montar infraestructura','<b>3 · Segmentos</b>','Pocos sliders (por grupo), 100% nativo y en vivo','Solo una columna de segmento en el modelo'],
    ['% finos por cliente + jugar en vivo con un control','<b>4 · Híbrido</b>','Tabla escala + slider global interactivo','Tabla de factores (Excel) + 1 What-If'],
  ])}
  ${best('Mi recomendación práctica', `<ul>
    <li><b>¿De verdad necesitas editar cliente por cliente en vivo?</b> Si sí y tienes el ecosistema Microsoft → <b>Power Apps (Opción 1)</b>.</li>
    <li><b>¿Tus ajustes se piensan por grupos?</b> (lo más común) → <b>Segmentos (Opción 3)</b>: simple, nativo, en vivo, cero infraestructura.</li>
    <li><b>¿Quieres lo mejor sin complicarte?</b> → <b>Híbrido (Opción 4)</b>: tabla para el detalle, slider para jugar.</li>
    <li>Empieza por la Opción 3 o 4 (rápidas); pasa a la 1 solo si el negocio realmente exige edición individual en vivo.</li>
  </ul>`)}
  `
});

/* ===================== PERFORMANCE ===================== */
N({ id:'performance', parent:'powerbi', title:'Performance y Optimización', icon:'🚀⭐',
  importancia:'★★★★☆', dificultad:'🔴 Avanzado', uso:'Modelos productivos',
  subtitle:'Por qué una medida es lenta y cómo arreglarlo: motor de almacenamiento vs motor de fórmulas, antipatrones, uso correcto de variables y optimización de modelo y medidas.',
  deps:['modelado','transicion'], related:['fn-variables','fn-iteradores'], fns:['fn-variables','calculate'],
  html: ()=> `
  ${why('La performance se diseña, no se parchea', `<p>Un informe lento mata la adopción: nadie usa un tablero que tarda 20 segundos por clic. La mayoría de los problemas de performance nacen en el <b>modelo</b> (cardinalidad, relaciones, columnas innecesarias), no en las medidas. Entender los dos motores internos te dice <i>dónde</i> está el cuello de botella.</p>`)}

  <h3>Los dos motores de DAX</h3>
  ${diagram(`
   ┌────────────────────────────┐     ┌─────────────────────────────┐
   │  STORAGE ENGINE (VertiPaq)  │     │  FORMULA ENGINE (FE)        │
   │  ─────────────────────────  │     │  ─────────────────────────  │
   │  • Comprime y guarda datos  │     │  • Ejecuta la lógica DAX    │
   │  • Escanea columnas (rápido)│     │  • Itera, transición, CALC  │
   │  • Multinúcleo, cacheable   │     │  • Un solo núcleo, sin caché│
   │  • Operaciones simples      │     │  • Operaciones complejas    │
   └────────────────────────────┘     └─────────────────────────────┘
        ▲  rápido y paralelo                 ▲  lento si hace mucho
   OBJETIVO: que el trabajo lo haga el SE; minimizar el FE.`)}
  ${engine('La regla de oro de performance', `<p>El <b>Storage Engine</b> (SE) es rápido, paralelo y cacheable; el <b>Formula Engine</b> (FE) es secuencial y caro. Una medida lenta casi siempre es una que obliga al FE a iterar fila a fila (muchos "callbacks" al SE). <b>Optimizar = empujar el trabajo al SE y reducir lo que hace el FE.</b> Lo mides con DAX Studio (Server Timings: tiempo SE vs FE).</p>`)}

  <h3>Antipatrones más comunes ❌</h3>
  ${tbl(['Antipatrón','Por qué es lento','Solución'],[
    ['Iterar la tabla de hechos con una medida dentro','Transición por millones de filas (FE)','Itera la dimensión: <code class="inl">SUMX(VALUES(Dim[Clave]),[M])</code>'],
    ['Columnas calculadas que podrían ser medidas','Ocupan memoria, no se comprimen bien','Conviértelas en medidas si dependen del contexto'],
    ['<code class="inl">FILTER</code> sobre tabla entera para un valor','Itera todo en el FE','Predicado simple: <code class="inl">CALCULATE([M], Dim[Col]="x")</code>'],
    ['Relaciones bidireccionales globales','Propagación cara y ambigua','Simple + <code class="inl">CROSSFILTER</code> puntual en medida'],
    ['Columnas de texto de alta cardinalidad en hechos','Mala compresión, modelo pesado','Llévalas a dimensiones; deja claves enteras en hechos'],
    ['<code class="inl">DISTINCTCOUNT</code> innecesario','Costoso en alta cardinalidad','<code class="inl">COUNTROWS</code> si solo cuentas filas'],
    ['Repetir la misma subexpresión','El FE la recalcula N veces','Guárdala en una <code class="inl">VAR</code>'],
  ])}

  <h3>Variables: la optimización más fácil</h3>
  ${dax(`
-- ❌ [Ventas AA] se calcula 3 veces
Var Mala = DIVIDE([Ventas]-[Ventas AA],[Ventas AA]) + IF([Ventas AA]>0,1,0)

-- ✅ se calcula 1 vez
Var Buena =
VAR AA = [Ventas AA]
RETURN DIVIDE([Ventas]-AA, AA) + IF(AA>0,1,0)`)}
  ${best('', `<p>Una <code class="inl">VAR</code> se evalúa una sola vez y se reutiliza. Además de legibilidad, es ganancia directa de performance cuando la expresión es cara (CALCULATE con time intelligence, DISTINCTCOUNT…).</p>`)}

  <h3>Optimización del modelo (mayor impacto)</h3>
  ${best('Checklist de modelo', `<ul>
    <li><b>Star schema</b>: dimensiones pequeñas, hechos estrechos. <span class="pill" data-go="modelado">Ver modelado</span>.</li>
    <li><b>Reduce cardinalidad</b>: claves enteras, no GUIDs/textos; separa fecha y hora en dos columnas.</li>
    <li><b>Elimina columnas que no usas</b>: cada columna pesa en memoria, aunque no la muestres.</li>
    <li><b>Evita columnas calculadas</b> que dependan del contexto; prefiere medidas.</li>
    <li><b>Tipos correctos</b>: enteros para claves, decimales fijos para importes; evita flotantes innecesarios.</li>
    <li><b>Una sola tabla de fechas</b> marcada; desactiva "Auto fecha/hora" (crea jerarquías ocultas que inflan el modelo).</li>
  </ul>`)}

  <h3>Optimización de medidas</h3>
  ${best('', `<ul>
    <li>Filtra con <b>predicados simples</b> antes que con <code class="inl">FILTER</code>; reserva FILTER para lógica multi-columna.</li>
    <li>Evita la <b>transición masiva</b>: itera dimensiones, no hechos.</li>
    <li>Mueve cálculos invariantes <b>fuera</b> de los iteradores (a una VAR previa).</li>
    <li>Usa <code class="inl">DIVIDE</code> y guards (<code class="inl">HASONEVALUE</code>) para evitar trabajo y errores en totales.</li>
    <li>Prefiere <code class="inl">SUMMARIZE</code>/<code class="inl">SUMMARIZECOLUMNS</code> bien hechos a iteraciones manuales para agrupar.</li>
  </ul>`)}

  ${warn('Mide antes de optimizar', `<p>No optimices a ciegas. Usa el <b>Performance Analyzer</b> de Power BI para ver qué visual tarda, y <b>DAX Studio</b> (Server Timings) para separar tiempo de SE y FE. Optimizar la medida equivocada es tiempo perdido: el cuello suele ser un visual con demasiados elementos o un modelo mal comprimido.</p>`)}

  ${exer('Diagnóstico de performance', `<p>Una medida <code class="inl">SUMX(Ventas, [Margen Cliente])</code> sobre 8M de filas tarda 15s. ¿Qué harías?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Solución</summary>
  <p>El problema es la <b>transición por fila</b> sobre 8M de registros (FE saturado). Reescribir para iterar la <b>dimensión cliente</b> (miles de filas), no los hechos: <code class="inl">SUMX(VALUES(Clientes[ClienteID]), [Margen Cliente])</code>. Si el margen es aditivo, mejor aún evitar el iterador y resolverlo con una agregación directa en el SE. Pasarías de 15s a milisegundos.</p></details>`)}
  `
});

N({ id:'casos-pyl', parent:'casos', title:'P&L: OPEX, CAPEX, EBITDA y Margen', icon:'🔴',
  importancia:'★★★★★', dificultad:'🔴', uso:'Reporting financiero',
  deps:['casos','fn-filtros'], related:['casos-control','sim-8'], fns:['calculate','fn-filtros'],
  subtitle:'La cuenta de resultados en DAX: clasificar gastos, construir el EBITDA por bloques y calcular márgenes.',
  html: ()=> `
  <h3>El modelo de P&L</h3>
  <p>Tabla de hechos <code class="inl">Movimientos</code>(Fecha, CuentaID, CECO, Escenario, Importe) + dimensión <code class="inl">PlanCuentas</code> con una columna <code class="inl">Grupo</code> (Ingresos, COGS, OPEX, D&A…) que define la estructura del P&L. <b>La clasificación vive en la dimensión, no en la medida.</b></p>

  <h3>Bloques del EBITDA</h3>
  ${dax(`
Ingresos = CALCULATE ( SUM ( Movimientos[Importe] ), PlanCuentas[Grupo] = "Ingresos" )
COGS     = CALCULATE ( SUM ( Movimientos[Importe] ), PlanCuentas[Grupo] = "COGS" )
OPEX     = CALCULATE ( SUM ( Movimientos[Importe] ), PlanCuentas[Grupo] = "OPEX" )

Margen Bruto   = [Ingresos] - [COGS]
% Margen Bruto = DIVIDE ( [Margen Bruto], [Ingresos] )
EBITDA         = [Margen Bruto] - [OPEX]
% EBITDA       = DIVIDE ( [EBITDA], [Ingresos] )`)}
  ${engine('', `<p>Cada bloque <b>reemplaza</b> el filtro de Grupo y <b>conserva</b> el resto del contexto (mes, CECO, escenario). Por eso el mismo <code class="inl">[EBITDA]</code> funciona en cualquier celda: por mes, por unidad de negocio, por región — el contexto lo aporta el visual.</p>`)}

  <h3>OPEX vs CAPEX: la distinción contable</h3>
  ${warn('CAPEX no va al P&L directamente', `<p>El <b>OPEX</b> (gasto operativo) impacta el resultado del periodo. El <b>CAPEX</b> (inversión en activos) <b>no</b> es gasto del periodo: se capitaliza y golpea el P&L <i>vía amortización</i> (D&A) a lo largo de la vida útil. Modelar esto bien evita el error de "restar el CAPEX del EBITDA".</p>`)}
  ${dax(`
CAPEX        = CALCULATE ( SUM ( Movimientos[Importe] ), PlanCuentas[Grupo] = "CAPEX" )
Amortización = CALCULATE ( SUM ( Movimientos[Importe] ), PlanCuentas[Grupo] = "D&A" )
EBIT         = [EBITDA] - [Amortización]    -- EBIT sí incluye D&A; EBITDA no`)}

  <h3>OPEX por naturaleza y por centro de coste</h3>
  ${dax(`
% OPEX sobre Ingresos = DIVIDE ( [OPEX], [Ingresos] )
OPEX por CECO         = [OPEX]   -- en una matriz con CECO en filas, se desglosa solo
Peso CECO en OPEX     = DIVIDE ( [OPEX], CALCULATE ( [OPEX], ALL ( CentrosCoste ) ) )`)}

  ${best('', `<ul>
    <li>Clasifica en la <b>dimensión de cuentas</b> (Grupo, Subgrupo, signo). Las medidas solo seleccionan grupos.</li>

/* ---- Casos Tesorería ---- */
N({ id:'casos-tesoreria', parent:'casos', title:'Tesorería: Aging, Cobranzas, Deuda y Provisiones', icon:'🔴⭐',
  importancia:'★★★★★', dificultad:'🔴', uso:'Crédito y cobranzas',
  deps:['casos','fn-tiempo'], related:['relaciones','fn-logica'], fns:['calculate','fn-logica'],
  subtitle:'Antigüedad de la deuda, días de cobro, provisiones por incobrabilidad: el DAX del circulante.',
  html: ()=> `
  <h3>Aging de cuentas por cobrar</h3>
  <p>Pregunta de negocio: <b>"¿cuánto me deben y desde hace cuánto?"</b> El aging clasifica la deuda pendiente por tramos de antigüedad.</p>
  ${dax(`
Días Vencido =
VAR Hoy = MAX ( Calendario[Fecha] )    -- fecha de corte del análisis
RETURN
    SUMX (
        Facturas,
        VAR dias = DATEDIFF ( RELATED ( Facturas[FechaVencimiento] ), Hoy, DAY )
        RETURN dias
    )`)}
  ${dax(`
Tramo Aging =
SWITCH (
    TRUE (),
    [Días Vencido] <= 0,  "Por vencer",
    [Días Vencido] <= 30, "1-30",
    [Días Vencido] <= 60, "31-60",
    [Días Vencido] <= 90, "61-90",
    "+90 (riesgo)"
)
Deuda Vencida +90 =
CALCULATE ( [Saldo Pendiente], FILTER ( Facturas, [Días Vencido] > 90 ) )`)}
  ${warn('El aging depende de la fecha de corte', `<p>El tramo cambia según el "hoy". Usa <code class="inl">MAX(Calendario[Fecha])</code> como corte para que el aging respete el slicer de fecha y puedas ver fotos históricas. Mídelo por <b>fecha de vencimiento</b>, no de emisión → suele requerir <span class="pill" data-go="relaciones">USERELATIONSHIP</span>.</p>`)}

  <h3>Días de cobro (DSO) y cobranzas</h3>
  ${dax(`
Saldo Pendiente = [Facturado] - [Cobrado]
DSO =
DIVIDE ( [Saldo Pendiente], [Facturado] ) * [Días del Periodo]   -- días de venta en la calle
% Cobrado = DIVIDE ( [Cobrado], [Facturado] )`)}

  <h3>Provisiones por incobrabilidad</h3>
  ${dax(`
Provisión Incobrables =
SUMX (
    VALUES ( Aging[Tramo] ),
    VAR saldo = [Saldo Pendiente]
    VAR pct   = RELATED ( Aging[% Provisión] )   -- % de riesgo por tramo (ej. +90 = 50%)
    RETURN saldo * pct
)`)}
  ${engine('', `<p>Cada tramo de aging tiene un % de provisión (mayor cuanto más vencido). La provisión total es la suma ponderada del saldo por su riesgo. Es el patrón <span class="pill" data-go="sim-3">factor por categoría</span> aplicado a riesgo crediticio.</p>`)}

  <h3>Evolución de la deuda</h3>
  ${dax(`
Deuda Inicio Periodo = CALCULATE ( [Saldo Pendiente], DATEADD ( Calendario[Fecha], -1, MONTH ) )
Variación Deuda      = [Saldo Pendiente] - [Deuda Inicio Periodo]`)}

  ${best('', `<ul>
    <li>Aging y DSO siempre con <b>fecha de corte</b> explícita (<code class="inl">MAX(Calendario[Fecha])</code>).</li>
    <li>Provisión por tramos en una <b>tabla de parámetros</b> (% por tramo), no hardcodeada.</li>
    <li>Separa <b>facturado</b> y <b>cobrado</b> como medidas base; el saldo se deriva.</li>
  </ul>`)}
  `
});

N({ id:'casos-control', parent:'casos', title:'Control de Gestión: Presupuesto, Forecast y Variaciones', icon:'🔴⭐',
  importancia:'★★★★★', dificultad:'🔴', uso:'Planning & control',
  deps:['casos','calculate'], related:['sim-7','sim-8'], fns:['calculate','fn-errores'],
  subtitle:'Real vs Presupuesto vs Forecast en un mismo modelo: el análisis de variaciones que sostiene cualquier comité de gestión.',
  html: ()=> `
  <h3>El patrón de escenarios en una sola tabla</h3>
  <p>Real, Presupuesto y Forecast conviven en la <b>misma tabla de hechos</b>, diferenciados por una dimensión <code class="inl">Escenario</code>. Una sola estructura, comparaciones triviales.</p>
  ${dax(`
Real     = CALCULATE ( SUM ( Movimientos[Importe] ), Escenario[Tipo] = "Real" )
Ppto     = CALCULATE ( SUM ( Movimientos[Importe] ), Escenario[Tipo] = "Presupuesto" )
Forecast = CALCULATE ( SUM ( Movimientos[Importe] ), Escenario[Tipo] = "Forecast" )`)}

  <h3>Análisis de variaciones</h3>
  ${dax(`
Desvío Ppto        = [Real] - [Ppto]
Desvío Ppto %      = DIVIDE ( [Desvío Ppto], [Ppto] )
Cumplimiento Ppto  = DIVIDE ( [Real], [Ppto] )                 -- 1 = 100%
Desvío Forecast    = [Real] - [Forecast]`)}
  ${dax(`
-- Semáforo de desempeño (cuidado con el signo en cuentas de gasto)
Estado Presupuestario =
VAR cumpl = [Cumplimiento Ppto]
RETURN
    SWITCH (
        TRUE (),
        cumpl >= 0.98 && cumpl <= 1.02, "🟢 En línea",
        cumpl < 0.98,  "🔵 Por debajo",
        "🔴 Sobre presupuesto"
    )`)}
  ${warn('El signo del desvío depende de si es ingreso o gasto ⚠️', `<p>En <b>ingresos</b>, Real &gt; Ppto es bueno. En <b>gastos</b>, Real &gt; Ppto es malo. Un semáforo que no distingue cuenta dará verde a un sobrecoste. Solución: una columna <code class="inl">Sentido</code> en PlanCuentas (+1 ingreso / −1 gasto) y multiplicar el desvío por ella antes de evaluar el color.</p>`)}

  <h3>Bridge de variación (puente Ppto → Real)</h3>
  ${dax(`
-- Descomposición precio/volumen del desvío de ingresos
Efecto Volumen = ( [Unidades Real] - [Unidades Ppto] ) * [Precio Ppto]
Efecto Precio  = ( [Precio Real]  - [Precio Ppto] )  * [Unidades Real]
Check Bridge   = [Efecto Volumen] + [Efecto Precio] - [Desvío Ppto]   -- debe dar ≈ 0`)}
  ${engine('', `<p>El "puente" explica <i>por qué</i> el real difiere del presupuesto separando cuánto es por vender más/menos unidades (volumen) y cuánto por precio. <code class="inl">Check Bridge</code> ≈ 0 valida que la descomposición cuadra: una verificación que todo controller agradece.</p>`)}

  <h3>Forecast = Real YTD + Presupuesto resto del año</h3>
  ${dax(`
Forecast Rolling =
VAR Corte = MAX ( Calendario[Fecha] )
VAR RealYTD =
    CALCULATE ( [Real], Calendario[Fecha] <= Corte )
VAR PptoResto =
    CALCULATE ( [Ppto], Calendario[Fecha] > Corte )
RETURN
    RealYTD + PptoResto`)}
  ${best('', `<ul>
    <li>Un único modelo con dimensión <b>Escenario</b>: evita duplicar medidas por versión.</li>
    <li>Maneja el <b>signo</b> de los desvíos por naturaleza de cuenta.</li>
    <li>Acompaña el desvío con su <b>descomposición</b> (precio/volumen, mix) — es lo que pide la dirección.</li>
    <li>Forecast rolling = real hasta el corte + plan después; el corte = <code class="inl">MAX(Calendario[Fecha])</code> o un parámetro.</li>
  </ul>`)}
  `
});

N({ id:'casos-comercial', parent:'casos', title:'Inteligencia Comercial: Clientes, Mix, Pareto y Retención', icon:'🔴⭐',
  importancia:'★★★★★', dificultad:'🔴', uso:'Análisis comercial',
  deps:['casos','fn-ranking'], related:['fn-ranking','sim-1'], fns:['fn-ranking','calculate','fn-filtros'],
  subtitle:'Concentración de clientes, análisis ABC/Pareto, mix de producto, ticket medio y retención: el DAX que dirige la estrategia comercial.',
  html: ()=> `
  <h3>Concentración de clientes (Pareto 80/20)</h3>
  ${dax(`
Ventas Top 10 Clientes =
CALCULATE ( [Ventas], TOPN ( 10, ALLSELECTED ( Clientes[ClienteID] ), [Ventas], DESC ) )

% Concentración Top 10 =
DIVIDE ( [Ventas Top 10 Clientes], CALCULATE ( [Ventas], ALLSELECTED ( Clientes ) ) )`)}
  ${dax(`
-- Pareto acumulado: ¿qué % de clientes hace el 80% de las ventas?
Ventas Acumuladas % =
VAR VentaCliente = [Ventas]
VAR Acumulado =
    CALCULATE (
        [Ventas],
        FILTER ( ALLSELECTED ( Clientes[ClienteID] ), [Ventas] >= VentaCliente )
    )
RETURN
    DIVIDE ( Acumulado, CALCULATE ( [Ventas], ALLSELECTED ( Clientes ) ) )`)}
  ${engine('', `<p>El Pareto acumulado suma las ventas de todos los clientes con ventas ≥ las del actual (los más grandes) y lo divide por el total. Ordenando clientes por ventas, ves la curva de concentración: si el 20% superior da el 80%, tienes riesgo de dependencia.</p>`)}

  <h3>Clasificación ABC</h3>
  ${dax(`
Clase ABC =
VAR p = [Ventas Acumuladas %]
RETURN SWITCH ( TRUE (), p <= 0.80, "A", p <= 0.95, "B", "C" )`)}

  <h3>Mix de producto y cross-sell</h3>
  ${dax(`
Mix Categoría %  = DIVIDE ( [Ventas], CALCULATE ( [Ventas], ALLSELECTED ( Productos[Categoría] ) ) )
Categorías x Cliente = AVERAGEX ( VALUES ( Clientes[ClienteID] ), DISTINCTCOUNT ( Ventas[CategoríaID] ) )
Ticket Medio     = DIVIDE ( [Ventas], DISTINCTCOUNT ( Ventas[FacturaID] ) )`)}

  <h3>Retención y clientes nuevos vs recurrentes</h3>
  ${dax(`
Clientes Activos = DISTINCTCOUNT ( Ventas[ClienteID] )

Clientes Nuevos =
VAR PrimeraCompra =
    CALCULATE ( MIN ( Ventas[Fecha] ), ALLEXCEPT ( Ventas, Ventas[ClienteID] ) )
RETURN
    COUNTROWS (
        FILTER (
            VALUES ( Ventas[ClienteID] ),
            CALCULATE ( MIN ( Ventas[Fecha] ) ) >= STARTOFMONTH ( MAX ( Calendario[Fecha] ) )
        )
    )

Clientes Recurrentes = [Clientes Activos] - [Clientes Nuevos]
Tasa Retención = DIVIDE ( [Clientes Recurrentes], CALCULATE ( [Clientes Activos], PREVIOUSMONTH ( Calendario[Fecha] ) ) )`)}
  ${warn('"Cliente nuevo" necesita una definición de negocio', `<p>¿Nuevo = primera compra en su vida, o primera en el periodo? Las medidas cambian por completo. Acuérdala con el área comercial antes de codificar; aquí "nuevo" = primera compra dentro del mes analizado.</p>`)}
  ${best('', `<ul>
    <li>Concentración y ABC con <code class="inl">ALLSELECTED</code> para respetar los slicers del usuario.</li>
    <li>Combina con los <span class="pill" data-go="simuladores">simuladores</span>: "¿qué pasa con el mix si subo precios al segmento A?"</li>
    <li>Define con negocio los conceptos ambiguos (nuevo, activo, churn) y documéntalos en el modelo.</li>
  </ul>`)}

  ${box('analogy','🎓 Cierre del Atlas', `<p>Has recorrido el camino completo: del <b>motor</b> (cómo piensa DAX) al <b>corazón</b> (CALCULATE), pasando por el <b>catálogo</b> de herramientas, los <b>simuladores</b> que convierten informes en herramientas de decisión, la <b>performance</b> que los hace usables y los <b>casos reales</b> que los conectan con el negocio. Pensar como un desarrollador senior de Power BI en Finanzas no es saber más funciones: es <b>entender el contexto, modelar bien y traducir preguntas de negocio en modelos analíticos</b>. Vuelve a cualquier nodo cuando lo necesites — este Atlas es tu base de conocimiento permanente.</p>`)}
  `
});

N({ id:'powerquery', parent:null, title:'Power Query / M', icon:'🔌',

   Power BI Desktop

/* ---- PQ: Pasos aplicados ---- */
N({ id:'pq-pasos', parent:'powerquery', title:'Pasos Aplicados: la receta que se ejecuta sola', icon:'🟢⭐',
  importancia:'★★★★★', dificultad:'🟢 Fundamental', uso:'En cada consulta',
  deps:['pq-intro'], related:['pq-m','pq-buenas'], fns:[],
  subtitle:'El corazón de Power Query: cada acción se graba como un paso ordenado y reproducible. Entender esto cambia cómo trabajas.',
  html: ()=> `
  ${why('Es lo que hace a Power Query repetible y mantenible', `<p>La gran diferencia con limpiar a mano en Excel: en Power Query <b>cada acción queda registrada</b>. Construyes la limpieza <b>una vez</b> y se repite automáticamente con cada actualización. Si el origen cambia el mes que viene, no rehaces nada: pulsas Actualizar y la receta corre sola.</p>`)}

  <h3>Cómo funciona, en concreto</h3>
  ${diagram(`
   PASOS APLICADOS (se leen de arriba a abajo)
   ┌─────────────────────────────┐
   │ ✓ Origen                    │  ← de dónde vienen los datos
   │ ✓ Encabezados promovidos    │  ← primera fila = títulos
   │ ✓ Tipo cambiado             │  ← columnas a número/fecha/texto
   │ ✓ Columnas quitadas         │  ← eliminamos las que no sirven
   │ ✓ Filas con errores quitadas│
   │ ▸ ...                        │
   └─────────────────────────────┘
   Cada Actualizar vuelve a ejecutar TODA la lista, en orden.`)}
  ${engine('Qué pasa al pulsar "Actualizar"', `<ol>
    <li>Power Query va al <b>Origen</b> y trae los datos frescos.</li>
    <li>Aplica el paso 2 sobre el resultado del paso 1, el 3 sobre el 2… <b>en cascada</b>.</li>
    <li>El resultado final es lo que se carga al modelo. Si un paso falla (porque el origen cambió), te avisa en ese paso exacto.</li>
  </ol>`)}

  <h3>Qué puedes hacer con los pasos</h3>
  ${tbl(['Acción','Cómo','Para qué'],[
    ['Ver un paso anterior','Clic en el paso','Inspeccionar cómo estaban los datos en ese punto'],
    ['Borrar un paso','La ✕ a su izquierda','Deshacer una transformación intermedia'],
    ['Renombrar un paso','Clic derecho → Cambiar nombre','Documentar ("Quitar clientes inactivos")'],
    ['Insertar uno en medio','Selecciona el paso anterior y actúa','Corregir sin rehacer todo'],
    ['Ver el código','⚙️ junto al paso, o Editor avanzado','Ver/editar el M que generó'],
  ])}
  ${warn('Borrar un paso del medio puede romper los siguientes', `<p>Si un paso posterior depende de algo que creó el que borras (p. ej. una columna), saltará un error. Power Query te lo marca. Es normal: ajusta o reinserta el paso. Por eso conviene <b>renombrar los pasos</b> con nombres claros.</p>`)}
  ${best('', `<ul>
    <li><b>Renombra los pasos importantes</b>: la receta se vuelve autoexplicativa para quien la mantenga (incluido tú en 6 meses).</li>
    <li>Cada paso es una línea de <span class="pill" data-go="pq-m">lenguaje M</span>: los pasos y el código son la misma cosa vista de dos formas.</li>
  </ul>`)}
  `
});

N({ id:'pq-encabezados', parent:'powerquery', title:'Promover Encabezados y Renombrar Columnas', icon:'🟢',
