<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas DAX · Artefacto Interactivo de Aprendizaje — Power BI, DAX y Analítica Corporativa</title>
<style>
  :root{
    --bg:#0d1117; --bg2:#111722; --panel:#161b22; --panel2:#1c2430;
    --border:#283041; --border2:#39435a;
    --text:#e6edf3; --muted:#9aa7b8; --faint:#6b788a;
    --accent:#4f9cf9; --accent2:#7ee787; --warn:#f2cc60; --crit:#ff7b72; --star:#d2a8ff;
    --green:#3fb950; --yellow:#d29922; --red:#f85149; --purple:#bc8cff;
    --code-bg:#0b1220; --kw:#ff7b72; --fn:#d2a8ff; --num:#79c0ff; --str:#a5d6ff; --com:#8b949e; --tbl:#7ee787;
    --shadow:0 8px 30px rgba(0,0,0,.45);
    --radius:12px;
    --sidebar-w:340px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#0b0f16,#0d1117 40%);
    color:var(--text); font-size:15.5px; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ---------- Layout ---------- */
  .app{display:flex;height:100vh;overflow:hidden}
  .sidebar{
    width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;
    background:var(--bg2);border-right:1px solid var(--border);
    display:flex;flex-direction:column;
  }
  .sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(135deg,#4f9cf9,#bc8cff);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#0b0f16;font-size:18px;
    box-shadow:0 2px 10px rgba(79,156,249,.4);
  }
  .brand h1{font-size:16px;margin:0;line-height:1.15;letter-spacing:.2px}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .search{margin-top:12px;position:relative}
  .search input{
    width:100%;padding:9px 32px 9px 32px;border-radius:9px;border:1px solid var(--border2);
    background:var(--panel);color:var(--text);font-size:13.5px;outline:none;
  }
  .search input:focus{border-color:var(--accent)}
  .search .ico{position:absolute;left:10px;top:9px;color:var(--faint);font-size:13px}
  .search .clr{position:absolute;right:8px;top:7px;color:var(--faint);cursor:pointer;font-size:14px;display:none;padding:2px 5px;border-radius:6px}
  .search .clr:hover{background:var(--panel2);color:var(--text)}
  .legend{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:11px;font-size:10.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:3px;white-space:nowrap}

  .tree{flex:1;overflow-y:auto;padding:8px 8px 40px}
  .tree::-webkit-scrollbar{width:9px}
  .tree::-webkit-scrollbar-thumb{background:#222c3a;border-radius:8px}
  .tree::-webkit-scrollbar-thumb:hover{background:#2c3a4d}

  .node{user-select:none}
  .node-row{
    display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;cursor:pointer;
    font-size:13.5px;color:var(--text);position:relative;
  }
  .node-row:hover{background:var(--panel)}
  .node-row.active{background:#1d3050;color:#fff;box-shadow:inset 0 0 0 1px #2f5party}
  .node-row.active{background:#16314f;box-shadow:inset 0 0 0 1px #27496f}
  .node-row .tw{width:14px;flex:0 0 auto;color:var(--faint);font-size:10px;transition:transform .15s;text-align:center}
  .node-row.collapsed .tw{transform:rotate(-90deg)}
  .node-row .ic{flex:0 0 auto;font-size:13px;width:16px;text-align:center}
  .node-row .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .node-row .badge{flex:0 0 auto;font-size:9px;padding:1px 5px;border-radius:20px;background:var(--panel2);color:var(--muted);border:1px solid var(--border)}
  .children{margin-left:13px;border-left:1px solid var(--border);padding-left:4px;overflow:hidden}
  .children.hidden{display:none}
  .node-row.hit{outline:1px solid var(--accent)}
  .dim{opacity:.32}

  /* ---------- Main ---------- */
  .main{flex:1;height:100%;overflow-y:auto;scroll-behavior:smooth}
  .main::-webkit-scrollbar{width:12px}
  .main::-webkit-scrollbar-thumb{background:#222c3a;border-radius:8px}
  .topbar{
    position:sticky;top:0;z-index:20;backdrop-filter:blur(8px);
    background:rgba(13,17,23,.82);border-bottom:1px solid var(--border);
    padding:10px 26px;display:flex;align-items:center;gap:14px;
  }
  .crumbs{font-size:12.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crumbs b{color:var(--text)}
  .nav-btns{display:flex;gap:6px}
  .nav-btns button{
    background:var(--panel);border:1px solid var(--border2);color:var(--muted);
    border-radius:8px;padding:5px 11px;font-size:12.5px;cursor:pointer;
  }
  .nav-btns button:hover{background:var(--panel2);color:var(--text)}

  .content{max-width:980px;margin:0 auto;padding:30px 32px 120px}
  .content.wide{max-width:1180px}

  h2.title{font-size:27px;margin:0 0 6px;line-height:1.2;letter-spacing:-.3px}
  .meta-bar{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 22px}
  .chip{font-size:11.5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--panel);color:var(--muted);display:inline-flex;gap:5px;align-items:center}
  .chip b{color:var(--text);font-weight:600}
  .chip.g{border-color:#1f6f33;background:#0f2417;color:#7ee787}
  .chip.y{border-color:#6f5717;background:#241f0f;color:#f2cc60}
  .chip.r{border-color:#6f2420;background:#240f0f;color:#ff9d96}
  .chip.s{border-color:#4b2f6f;background:#1a0f24;color:#d2a8ff}

  .content h3{font-size:20px;margin:34px 0 10px;padding-top:8px;border-top:1px solid var(--border);color:#fff;letter-spacing:-.2px}
  .content h3:first-of-type{border-top:none;padding-top:0}
  .content h4{font-size:16px;margin:22px 0 8px;color:var(--accent2)}
  .content h5{font-size:14px;margin:16px 0 6px;color:var(--star);text-transform:uppercase;letter-spacing:.6px}
  .content p{margin:10px 0}
  .content ul,.content ol{margin:10px 0;padding-left:24px}
  .content li{margin:5px 0}
  .content li::marker{color:var(--faint)}
  .lead{font-size:16.5px;color:var(--muted);border-left:3px solid var(--accent);padding:2px 0 2px 16px;margin:0 0 4px}

  code.inl{background:var(--code-bg);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-family:'Cascadia Code',Consolas,Monaco,monospace;font-size:13px;color:#ffa657}

  /* callouts */
  .box{border-radius:var(--radius);padding:14px 16px 14px 18px;margin:16px 0;border:1px solid var(--border2);background:var(--panel);position:relative}
  .box .bt{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .box p:last-child,.box ul:last-child{margin-bottom:0}
  .box.why{border-left:4px solid var(--accent);background:#0e1a2b}
  .box.why .bt{color:var(--accent)}
  .box.warn{border-left:4px solid var(--warn);background:#231d0c}
  .box.warn .bt{color:var(--warn)}
  .box.err{border-left:4px solid var(--crit);background:#240f0f}
  .box.err .bt{color:var(--crit)}
  .box.best{border-left:4px solid var(--green);background:#0f2417}
  .box.best .bt{color:var(--green)}
  .box.analogy{border-left:4px solid var(--star);background:#190f24}
  .box.analogy .bt{color:var(--star)}
  .box.engine{border-left:4px solid #58c4dd;background:#0a1f26}
  .box.engine .bt{color:#58c4dd}
  .box.exer{border-left:4px solid #ff9d5c;background:#241608}
  .box.exer .bt{color:#ff9d5c}

  /* code blocks */
  pre{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;overflow-x:auto;margin:14px 0;position:relative}
  pre code{font-family:'Cascadia Code',Consolas,Monaco,monospace;font-size:13px;line-height:1.6;color:#c9d1d9;white-space:pre}
  pre .cap{position:absolute;top:8px;right:12px;font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}
  .tok-kw{color:var(--kw);font-weight:600}
  .tok-fn{color:var(--fn)}
  .tok-num{color:var(--num)}
  .tok-str{color:var(--str)}
  .tok-com{color:var(--com);font-style:italic}
  .tok-tbl{color:var(--tbl)}
  .tok-op{color:#ff7b72}

  /* tables */
  .tw-wrap{overflow-x:auto;margin:16px 0;border-radius:10px;border:1px solid var(--border)}
  table.dx{border-collapse:collapse;width:100%;font-size:13px;min-width:520px}
  table.dx th{background:var(--panel2);color:#fff;text-align:left;padding:9px 12px;border-bottom:2px solid var(--border2);font-weight:600;position:sticky;top:0}
  table.dx td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text)}
  table.dx tr:last-child td{border-bottom:none}
  table.dx tr:nth-child(even) td{background:rgba(255,255,255,.018)}
  table.dx tr:hover td{background:rgba(79,156,249,.06)}
  table.dx td b{color:#fff}

  /* ascii diagrams */
  .diagram{background:#0a0f18;border:1px dashed var(--border2);border-radius:10px;padding:16px;margin:16px 0;overflow-x:auto}
  .diagram pre{background:none;border:none;padding:0;margin:0;color:#9fd0ff;font-size:12.5px;line-height:1.45}

  /* relation / dep cards */
  .rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
  @media(max-width:760px){.rel-grid{grid-template-columns:1fr}}
  .rel-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .rel-card .h{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .pill{display:inline-block;margin:3px 5px 3px 0;padding:3px 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--border2);font-size:12px;cursor:pointer;color:var(--text)}
  .pill:hover{border-color:var(--accent);color:var(--accent)}
  .pill.fn{color:#d2a8ff;border-color:#3a2a52}
  .pill.fn:hover{background:#1a0f24}

  .next-prev{display:flex;justify-content:space-between;gap:14px;margin-top:46px;border-top:1px solid var(--border);padding-top:20px}
  .np{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;max-width:48%}
  .np:hover{border-color:var(--accent)}
  .np .d{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}
  .np .t{font-size:14px;color:var(--text);margin-top:3px}
  .np.n{text-align:right}

  .kbd{background:var(--panel2);border:1px solid var(--border2);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;font-family:monospace;color:var(--muted)}

  /* progressive level steps for CALCULATE */
  .levels{counter-reset:lvl;margin:18px 0}
  .lvl{border:1px solid var(--border);border-radius:10px;margin:10px 0;overflow:hidden;background:var(--panel)}
  .lvl-h{padding:11px 14px;background:var(--panel2);cursor:pointer;display:flex;align-items:center;gap:10px;font-weight:600}
  .lvl-h:hover{background:#222c3a}
  .lvl-h .n{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#4f9cf9,#bc8cff);color:#0b0f16;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex:0 0 auto}
  .lvl-h .arr{margin-left:auto;color:var(--faint);transition:transform .15s}
  .lvl.open .lvl-h .arr{transform:rotate(90deg)}
  .lvl-b{padding:4px 16px 14px;display:none}
  .lvl.open .lvl-b{display:block}

  .tag-mini{font-size:10px;padding:1px 6px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}

  .hidden{display:none !important}
  .empty-search{padding:20px;color:var(--muted);font-size:13px;text-align:center}
  .home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:22px 0}
  .home-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:.15s}
  .home-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
  .home-card .ic{font-size:22px}
  .home-card .t{font-size:15px;font-weight:600;margin:8px 0 4px;color:#fff}
  .home-card .d{font-size:12.5px;color:var(--muted)}

  .footnote{font-size:12px;color:var(--faint);margin-top:8px}
  .mob-toggle{display:none}
  @media(max-width:880px){
    .sidebar{position:fixed;z-index:50;transform:translateX(-100%);transition:transform .2s;box-shadow:var(--shadow)}
    .sidebar.open{transform:translateX(0)}
    .mob-toggle{display:inline-flex}
    .content{padding:22px 18px 100px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="brand">
        <div class="logo">Σ</div>
        <div>
          <h1>Atlas DAX</h1>
          <div class="sub">Artefacto interactivo · Power BI · DAX · Analítica Corporativa</div>
        </div>
      </div>
      <div class="search">
        <span class="ico">🔍</span>
        <input id="searchInput" type="text" placeholder="Buscar conceptos, funciones, escenarios…" autocomplete="off">
        <span class="clr" id="searchClear">✕</span>
      </div>
      <div class="legend">
        <span>🟢 Fundamental</span>
        <span>🟡 Importante</span>
        <span>🔴 Avanzado</span>
        <span>⭐ Crítico senior</span>
        <span>⚠️ Suele confundir</span>
      </div>
    </div>
    <nav class="tree" id="tree"></nav>
  </aside>

  <main class="main" id="main">
    <div class="topbar">
      <button class="nav-btns mob-toggle" id="mobToggle" style="border:1px solid var(--border2);background:var(--panel);color:var(--muted);border-radius:8px;padding:5px 11px;cursor:pointer">☰</button>
      <div class="crumbs" id="crumbs"></div>
      <div class="nav-btns">
        <button id="btnPrev">← Anterior</button>
        <button id="btnNext">Siguiente →</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
/* ============================================================
   ATLAS DAX — Motor de navegación
   El contenido vive en el array NODES (data-driven).
   Cada nodo: {id, parent, title, icon, importancia, dificultad,
               uso, deps[], related[], fns[], html}
   ============================================================ */
const NODES = [];
/* ---------- Helpers para escribir nodos de forma compacta ---------- */
const N = o => NODES.push(o);
function _esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const dax = (s,cap) => '<pre><span class="cap">'+(cap||'DAX')+'</span><code class="dax">'+_esc(s.replace(/^\n/,'').replace(/\n\s*$/,''))+'</code></pre>';
const box = (cls,title,body) => '<div class="box '+cls+'"><div class="bt">'+title+'</div>'+body+'</div>';
const why    = (t,b)=>box('why','💡 Por qué importa'+(t?': '+t:''),b);
const analogy= (t,b)=>box('analogy','🎭 Analogía'+(t?': '+t:''),b);
const engine = (t,b)=>box('engine','⚙️ Qué ocurre internamente'+(t?': '+t:''),b);
const warn   = (t,b)=>box('warn','⚠️ '+(t||'Cuidado'),b);
const err    = (t,b)=>box('err','❌ '+(t||'Error frecuente'),b);
const best   = (t,b)=>box('best','✅ '+(t||'Mejores prácticas'),b);
const exer   = (t,b)=>box('exer','✏️ '+(t||'Ejercicio'),b);
const diagram= s=>'<div class="diagram"><pre>'+_esc(s.replace(/^\n/,'').replace(/\n\s*$/,''))+'</pre></div>';
function tbl(headers, rows){
  let h='<div class="tw-wrap"><table class="dx"><thead><tr>'+headers.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{ h+='<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>'; });
  return h+'</tbody></table></div>';
}

/* ===================== INICIO ===================== */
N({ id:'home', parent:null, title:'Inicio · Cómo usar este Atlas', icon:'🏠',
  importancia:'★★★★★', dificultad:'Lectura', uso:'Empieza aquí',
  subtitle:'Un único artefacto navegable que funciona a la vez como mapa de conocimiento, roadmap, manual de consulta, wiki técnica y centro de referencia profesional de Power BI / DAX para Finanzas, Planeamiento, Control de Gestión e Inteligencia Comercial.',
  html: ()=> `
  ${why('No es un curso lineal', `<p>Este artefacto está pensado para <b>navegación no lineal</b>. No tienes que leerlo en orden. La barra lateral es un <b>árbol de conocimiento</b>: expándelo, busca, salta entre conceptos relacionados y sigue las dependencias. Cada nodo es autocontenido y enseña algo real.</p>`)}

  <h3>Cómo está organizado</h3>
  <p>El conocimiento está dividido en módulos jerárquicos. Cada nodo declara su <b>importancia</b>, <b>dificultad</b>, <b>requisitos previos</b>, <b>conceptos relacionados</b> y <b>funciones asociadas</b> (todos clicables, para que puedas saltar entre ideas conectadas).</p>

  <div class="home-grid">
    <div class="home-card" data-go="prioridades"><div class="ic">🗺️</div><div class="t">Mapa de Prioridades DAX</div><div class="d">Las 30 funciones más usadas en proyectos corporativos, rankeadas por frecuencia real.</div></div>
    <div class="home-card" data-go="motor"><div class="ic">⚙️</div><div class="t">Fundamentos del Motor</div><div class="d">Contexto de fila, de filtro, transición, relaciones y modelado dimensional.</div></div>
    <div class="home-card" data-go="calculate"><div class="ic">⭐</div><div class="t">CALCULATE (módulo estrella)</div><div class="d">El corazón de DAX, en 9 niveles progresivos. El objetivo central de aprendizaje.</div></div>
    <div class="home-card" data-go="funciones"><div class="ic">📚</div><div class="t">Catálogo de Funciones</div><div class="d">Agregación, filtros, iteradores, variables, lógica, tablas, ranking y tiempo.</div></div>
    <div class="home-card" data-go="simuladores"><div class="ic">🎛️</div><div class="t">Simuladores Corporativos</div><div class="d">9 escenarios reales de slicers, What-If y ajustes de forecast paso a paso.</div></div>
    <div class="home-card" data-go="performance"><div class="ic">🚀</div><div class="t">Performance y Optimización</div><div class="d">Antipatrones, variables, motor de fórmulas vs. almacenamiento.</div></div>
    <div class="home-card" data-go="casos"><div class="ic">🏢</div><div class="t">Casos Reales de Negocio</div><div class="d">OPEX, CAPEX, EBITDA, aging, cobranzas, provisiones, forecast.</div></div>
  </div>

  <h3>Indicadores visuales que verás en todo el árbol</h3>
  ${tbl(['Indicador','Significado','Cómo interpretarlo'],[
    ['🟢','Fundamental','Base imprescindible. Si esto no está sólido, lo demás se derrumba.'],
    ['🟡','Importante','Lo usarás de forma habitual en proyectos reales.'],
    ['🔴','Avanzado','Requiere dominio previo. Aquí se separa el intermedio del senior.'],
    ['⭐','Crítico para desarrolladores senior','Diferencia a quien "escribe medidas" de quien "diseña soluciones".'],
    ['⚠️','Suele generar confusión','Punto donde casi todos tropiezan. Léelo dos veces.'],
  ])}

  <h3>Ruta de aprendizaje recomendada</h3>
  ${diagram(`
  ┌─────────────────────────────────────────────────────────────────────┐
  │  1. MODELO MENTAL        2. EL CORAZÓN         3. HERRAMIENTAS        │
  │  ─────────────────       ─────────────         ───────────────       │
  │  Motor DAX               CALCULATE  ⭐          Catálogo de           │
  │   • Contexto de fila  →   • 9 niveles      →    funciones            │
  │   • Contexto de filtro    • leer/depurar        (filtros, tiempo,    │
  │   • Transición            • anticipar           iteradores…)         │
  │   • Relaciones            mentalmente                                 │
  │   • Star schema                                  │                    │
  │        │                       │                 ▼                    │
  │        └───────────────────────┴──────►  4. APLICACIÓN REAL          │
  │                                          ────────────────            │
  │                                          • Simuladores (9 escenarios)│
  │                                          • Performance               │
  │                                          • Casos de negocio          │
  └─────────────────────────────────────────────────────────────────────┘`)}

  ${best('Cómo sacarle el máximo', `<ul>
    <li><b>Lee el "por qué" antes del "cómo".</b> Cada nodo explica primero la intuición y el problema de negocio, luego la técnica.</li>
    <li><b>Haz los ejercicios mentalmente.</b> No memorices: predice el resultado de cada medida antes de leer la solución.</li>

N({ id:'ctx-fila', parent:'motor', title:'Contexto de Fila', icon:'🟢',
  importancia:'★★★★☆', dificultad:'🟢 Fundamental', uso:'Iteradores y columnas',
  subtitle:'"¿En qué fila estoy parado ahora mismo?" El contexto que te da acceso a los valores de una fila concreta.',

  html: ()=> `
  <h3>1 · Explicación simple</h3>
  <p>El <b>contexto de fila</b> es la idea de "estar parado en una fila concreta de una tabla". Cuando estás en esa fila, puedes leer el valor de cualquier columna <i>de esa fila</i>. Es exactamente lo que ocurre en Excel cuando escribes una fórmula en la celda <code class="inl">D2</code> que usa <code class="inl">B2*C2</code>: estás "en la fila 2".</p>

  <h3>2 · Explicación conceptual</h3>
  <p>El contexto de fila aparece en dos situaciones, y solo en dos:</p>
  <ul>
    <li><b>Columnas calculadas:</b> se evalúan fila por fila para toda la tabla. Cada fila trae su propio contexto de fila automáticamente.</li>
    <li><b>Funciones iteradoras</b> (las que terminan en <b>X</b>: <code class="inl">SUMX</code>, <code class="inl">AVERAGEX</code>, <code class="inl">RANKX</code>…, y también <code class="inl">FILTER</code>): recorren una tabla fila a fila y, en cada paso, abren un contexto de fila.</li>
  </ul>
  ${analogy('El dedo sobre el renglón', `<p>Imagina que lees una tabla impresa con el dedo apoyado en un renglón. Mientras tu dedo está en la fila de "Juan", puedes leer su sueldo, su área, su antigüedad. El contexto de fila <b>es ese dedo</b>: te da acceso a los valores de la fila donde estás parado, una a la vez.</p>`)}

  <h3>3 · Explicación técnica</h3>
  <p>El contexto de fila <b>NO filtra el modelo</b>. Esta es la confusión número uno. Estar parado en la fila de "Juan" <b>no</b> filtra automáticamente el resto del modelo a Juan. Solo te da acceso a leer las columnas de esa fila.</p>
  ${dax(`
Margen = Ventas[Precio] - Ventas[Costo]   // columna calculada
// En cada fila, lee Precio y Costo DE ESA FILA. Eso es contexto de fila.`)}
  ${dax(`
Ingreso Total =
SUMX (
    Ventas,                              -- itera fila a fila sobre Ventas
    Ventas[Cantidad] * Ventas[Precio]    -- en cada fila lee Cantidad y Precio
)`)}

  ${engine('', `<p>Internamente, <code class="inl">SUMX(Ventas, ...)</code> hace esto:</p>
  <ol>
    <li>Toma la tabla <code class="inl">Ventas</code> <b>ya filtrada por el contexto de filtro actual</b>.</li>
    <li>Para cada fila, abre un contexto de fila apuntando a esa fila.</li>
    <li>Evalúa la expresión (<code class="inl">Cantidad * Precio</code>) leyendo los valores de esa fila.</li>
    <li>Acumula el resultado y pasa a la siguiente fila.</li>
  </ol>`)}

  <h3>4 · El detalle que separa intermedios de seniors ⚠️</h3>
  ${warn('Contexto de fila NO recorre relaciones por sí solo', `<p>Si estás en una fila de <code class="inl">Ventas</code> y quieres el nombre de la categoría que vive en la tabla <code class="inl">Productos</code>, <b>el contexto de fila no cruza la relación automáticamente</b>. Necesitas <code class="inl">RELATED</code> para "saltar" del lado muchos al lado uno:</p>
  ${dax(`
Venta con Categoría =
SUMX (
    Ventas,
    Ventas[Cantidad] * RELATED ( Productos[Precio] )   -- RELATED cruza la relación
)`)}
  <p>Sin <code class="inl">RELATED</code>, el contexto de fila de <code class="inl">Ventas</code> no "ve" las columnas de <code class="inl">Productos</code>.</p>`)}

  <h3>5 · Caso empresarial</h3>
  <p><b>Cálculo de OPEX ponderado por tipo de cambio.</b> Tienes gastos en distintas monedas y un tipo de cambio por fila. No puedes sumar primero y convertir después; debes convertir <i>fila a fila</i>:</p>
  ${dax(`
OPEX en USD =
SUMX (
    Gastos,
    Gastos[Importe Local] * RELATED ( TipoCambio[Tasa USD] )
)`)}

  <h3>6 · Errores frecuentes</h3>
  ${err('Usar SUM cuando necesitas SUMX', `<p><code class="inl">SUM(Ventas[Cantidad] * Ventas[Precio])</code> <b>no compila</b>. <code class="inl">SUM</code> solo acepta una columna, no una expresión por fila. Necesitas <code class="inl">SUMX</code> porque hay una operación que debe ocurrir <i>en cada fila</i> antes de sumar.</p>`)}
  ${err('Creer que el contexto de fila filtra', `<p>Una columna calculada <code class="inl">Total Cliente = SUM(Ventas[Importe])</code> en la tabla de clientes da el <b>gran total para todos</b>, no el total de ese cliente. ¿Por qué? Porque el contexto de fila no se convierte en filtro automáticamente. Para eso necesitas <span class="pill" data-go="transicion">transición de contexto</span> (CALCULATE).</p>`)}

  <h3>7 · Mejores prácticas</h3>
  ${best('', `<ul>
    <li>Usa iteradores (X) <b>solo</b> cuando necesitas operar fila a fila. Si la columna ya tiene el valor listo, <code class="inl">SUM</code> es más barato.</li>
    <li>Prefiere <code class="inl">RELATED</code> dentro de iteradores a crear columnas calculadas que dupliquen datos.</li>
    <li>Recuerda: <b>contexto de fila = acceso a valores</b>, <b>contexto de filtro = qué filas existen</b>. Son cosas distintas.</li>
  </ul>`)}

  ${exer('Predice el resultado', `<p>Tabla <code class="inl">Ventas</code>: 3 filas → (Cant 2, Precio 10), (Cant 1, Precio 50), (Cant 4, Precio 5).</p>
  <p>¿Cuánto da <code class="inl">SUMX(Ventas, Ventas[Cantidad] * Ventas[Precio])</code>?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución paso a paso</summary>
  <p>Fila 1: 2×10 = 20 · Fila 2: 1×50 = 50 · Fila 3: 4×5 = 20. SUMX acumula: 20+50+20 = <b>90</b>. Nota que <code class="inl">SUM(Cant)×SUM(Precio)</code> daría 7×65 = 455, ¡completamente distinto! Ese es el sentido del iterador: multiplica <i>dentro</i> de cada fila.</p></details>`)}
  `
});

  html: ()=> `
  <h3>1 · Explicación simple</h3>
  <p>El <b>contexto de filtro</b> es el conjunto de filtros que están activos cuando se evalúa una medida. Responde a: <b>"¿de qué subconjunto de datos estamos hablando ahora?"</b>. En una matriz, la celda de "Marzo / Cliente A" tiene un contexto de filtro = {Mes = Marzo, Cliente = A}.</p>

  <h3>2 · De dónde viene el contexto de filtro</h3>
  <p>Se construye sumando <b>todas</b> estas fuentes:</p>
  ${tbl(['Fuente','Ejemplo','Aporta al contexto'],[
    ['Filas de un visual','La fila "Marzo" de una matriz','Mes = Marzo'],
    ['Columnas de un visual','La columna "Cliente A"','Cliente = A'],
    ['Slicers / segmentaciones','Slicer de Año = 2026','Año = 2026'],
    ['Filtros de página/informe','Filtro de Región = LATAM','Región = LATAM'],
    ['CALCULATE','Una medida que añade un filtro','Lo que CALCULATE imponga'],
  ])}
  ${analogy('La comanda del restaurante', `<p>El contexto de filtro es la <b>comanda</b> que llega a la cocina: "mesa 4, sin gluten, para 2 personas". El cocinero (la medida) solo cocina lo que la comanda especifica. Cada celda de tu informe genera una comanda distinta, y por eso la misma medida da números diferentes en cada celda. <b>Una sola receta, miles de comandas.</b></p>`)}

  <h3>3 · Explicación técnica: filtra el MODELO, no la medida</h3>
  <p>El contexto de filtro actúa <b>antes</b> de que tu medida se ejecute: filtra físicamente las tablas. Cuando <code class="inl">SUM(Ventas[Importe])</code> corre en la celda "Marzo", el motor ya recortó <code class="inl">Ventas</code> a solo las filas de marzo. Tú no escribiste ningún filtro: <b>lo puso el visual</b>.</p>
  ${engine('Secuencia exacta en una celda', `<ol>
    <li>El visual declara sus coordenadas: {Mes=Marzo, Cliente=A}.</li>
    <li>El motor aplica esos filtros sobre las <b>dimensiones</b> (Calendario, Clientes).</li>
    <li>Esos filtros se <b>propagan por las relaciones</b> hasta la tabla de hechos <code class="inl">Ventas</code>, recortándola.</li>
    <li>La medida se evalúa <b>sobre esa tabla ya recortada</b>.</li>
    <li>El número resultante se pinta en la celda.</li>
  </ol>`)}

  <h3>4 · El gran total y el problema de "no hay filtro"</h3>

  <h3>5 · Caso empresarial: % sobre el total</h3>
  <p>Para calcular qué porcentaje del EBITDA total aporta cada unidad de negocio, necesitas <b>dos contextos a la vez</b>: el de la fila (esta UN) y uno sin filtro de UN (el total). Ahí entra <code class="inl">CALCULATE + ALL</code>:</p>
  ${dax(`
% sobre Total =
DIVIDE (
    [EBITDA],                                    -- contexto de la fila (esta UN)
    CALCULATE ( [EBITDA], ALL ( UnidadNegocio ) ) -- contexto sin filtro de UN = total
)`)}

  <h3>6 · Errores frecuentes</h3>

  ${err('Asumir que un slicer "ya filtró la medida"', `<p>El slicer filtra el <b>modelo</b>, no "la medida". Si dentro usas <code class="inl">ALL()</code>, borras ese filtro y el slicer deja de tener efecto. Saber qué filtros conserva o borra cada función es el núcleo del módulo CALCULATE.</p>`)}

  <h3>7 · Mejores prácticas</h3>
  ${best('', `<ul>
    <li>Antes de escribir una medida, pregúntate: <b>"¿en qué contexto de filtro se va a evaluar?"</b> (¿celda de matriz? ¿total? ¿con qué slicers?).</li>
    <li>Para "romper" el contexto usa funciones explícitas (<code class="inl">ALL</code>, <code class="inl">REMOVEFILTERS</code>, <code class="inl">ALLSELECTED</code>) y entiende exactamente cuál necesitas.</li>

  ${exer('Predice el resultado', `<p>Matriz con Clientes en filas. Medida <code class="inl">Ventas = SUM(Ventas[Importe])</code>. Cliente A tiene 100, B tiene 200, C tiene 300.</p>

  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary>
  <p>Fila A: contexto {Cliente=A} → 100. Fila B → 200. Fila C → 300. <b>Total:</b> sin filtro de Cliente → ve las tres filas → 600. La <b>misma medida</b> da 4 números distintos porque cada celda impone un contexto de filtro diferente. Esa es toda la magia de Power BI.</p></details>`)}

/* ---- Transición de Contexto ---- */
N({ id:'transicion', parent:'motor', title:'Transición de Contexto', icon:'🔴⚠️⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado (clave senior)', uso:'Medidas dentro de iteradores',
  subtitle:'El mecanismo por el que CALCULATE convierte el contexto de fila en contexto de filtro. El concepto que "desbloquea" el DAX avanzado y el que más errores silenciosos causa.',
  deps:['ctx-fila','ctx-filtro'], related:['calculate','sim-2','sim-6'], fns:['calculate','fn-iteradores'],
  html: ()=> `
  ${why('Es el puente entre los dos contextos', `<p>Hasta ahora tienes dos mundos separados: el contexto de fila (leer valores) y el de filtro (qué filas existen). La <b>transición de contexto</b> es el único puente entre ellos. Entenderla explica por qué una medida dentro de <code class="inl">SUMX</code> "de repente" funciona, por qué una columna calculada con una medida da el valor correcto por fila, y por qué a veces tu cálculo "se filtra solo" sin que lo pidieras.</p>`)}

  <h3>1 · Explicación simple</h3>
  <p><b>Transición de contexto = "convertir dónde estoy parado en un filtro".</b> Cuando hay un contexto de fila y aparece <code class="inl">CALCULATE</code> (o llamas a una medida, que lleva un CALCULATE implícito), el motor toma los valores de la fila actual y los <b>transforma en filtros</b> sobre el modelo.</p>

  ${analogy('De señalar a aislar', `<p>En el contexto de fila tu dedo señala la fila de "Cliente A" (puedes leer sus datos, pero el resto del modelo sigue completo). La transición de contexto es como decir: <b>"ahora el restaurante entero solo cocina para Cliente A"</b>. Pasaste de <i>señalar una fila</i> a <i>aislar todo el modelo a esa fila</i>. Ese salto lo hace CALCULATE.</p>`)}

  <h3>2 · El disparador: CALCULATE (explícito o implícito)</h3>
  ${warn('Toda medida lleva un CALCULATE invisible', `<p>Cuando escribes <code class="inl">[Ventas]</code> (una medida) dentro de un iterador, DAX la envuelve automáticamente: se comporta como <code class="inl">CALCULATE([Ventas])</code>. Por eso <b>llamar a una medida dentro de un contexto de fila SIEMPRE dispara transición de contexto</b>, aunque no escribas CALCULATE. Esta es la fuente nº1 de resultados "mágicos" que no entiendes.</p>`)}

  <h3>3 · El ejemplo canónico</h3>
  <p>Columna calculada en la tabla <code class="inl">Clientes</code>:</p>
  ${dax(`
-- ❌ SIN transición: el contexto de fila NO filtra
Total A = SUM ( Ventas[Importe] )
-- Resultado: el GRAN TOTAL en cada fila (no filtra por cliente)`)}
  ${dax(`
-- ✅ CON transición: CALCULATE convierte la fila en filtro
Total B = CALCULATE ( SUM ( Ventas[Importe] ) )
-- Resultado: el total DE ESE cliente en cada fila`)}
  ${engine('Qué hace CALCULATE en Total B, paso a paso', `<ol>
    <li>Estamos en la fila de, digamos, "Cliente A" (contexto de fila).</li>
    <li><code class="inl">CALCULATE</code> detecta que hay contexto de fila activo.</li>
    <li>Lee <b>todas las columnas de la fila actual</b>: Clientes[ClienteID]=A, Clientes[Nombre]="A", etc.</li>
    <li>Las convierte en <b>filtros</b>: contexto de filtro += {Clientes[ClienteID]=A …}.</li>
    <li>Ese filtro se propaga por la relación Clientes→Ventas, recortando Ventas a las de A.</li>
    <li><code class="inl">SUM(Ventas[Importe])</code> se evalúa ya filtrado → total de A. ✔</li>
  </ol>`)}

  <h3>4 · Dónde aparece en la práctica</h3>
  ${tbl(['Situación','¿Hay transición?','Por qué'],[
    ['Columna calculada que llama a una medida','Sí','La medida = CALCULATE implícito + hay contexto de fila'],
    ['SUMX(Clientes, [Ventas])','Sí, en cada iteración','La medida [Ventas] dispara transición por cada fila de Clientes'],
    ['SUMX(Ventas, Ventas[Cant]*Ventas[Precio])','No','No hay medida ni CALCULATE; solo se leen columnas'],
    ['Medida directa en una tarjeta','No (no hay contexto de fila que convertir)','Solo hay contexto de filtro'],
  ])}

  <h3>5 · Caso empresarial: clientes por encima de su media</h3>
  <p>"¿Cuántos clientes facturan más que el promedio de facturación por cliente?" Necesitas, por cada cliente, su propio total (transición) y compararlo:</p>
  ${dax(`
Clientes Sobre Media =
VAR MediaPorCliente =
    AVERAGEX ( Clientes, [Ventas] )       -- [Ventas] dispara transición: total de cada cliente
RETURN
    COUNTROWS (
        FILTER ( Clientes, [Ventas] > MediaPorCliente )  -- de nuevo transición por fila
    )`)}
  <p>Sin transición, <code class="inl">[Ventas]</code> daría el gran total en cada fila y todos serían iguales. La transición es lo que hace que <code class="inl">[Ventas]</code> signifique "las ventas de <i>este</i> cliente".</p>

  <h3>6 · Errores frecuentes</h3>
  ${err('Performance: transición masiva', `<p><code class="inl">SUMX(TablaGrande, [Medida])</code> dispara una transición de contexto <b>por cada fila</b>. Sobre millones de filas, esto puede ser lentísimo. A menudo se reescribe iterando sobre una dimensión pequeña o evitando la medida dentro del iterador. Ver <span class="pill" data-go="performance">Performance</span>.</p>`)}
  ${err('Transición no deseada que "ensucia" el filtro', `<p>A veces la transición añade filtros que NO querías (todas las columnas de la fila). Si solo necesitabas filtrar por una clave, usa <code class="inl">VALUES</code>/<code class="inl">SELECTEDVALUE</code> en lugar de confiar en la transición completa.</p>`)}

  <h3>7 · Mejores prácticas</h3>
  ${best('', `<ul>
    <li>Cuando veas una <b>medida llamada dentro de un iterador</b>, di mentalmente: "aquí hay transición de contexto". Eso explica el 90% de los resultados extraños.</li>
    <li>Itera sobre <b>dimensiones pequeñas</b> (Clientes, Productos), no sobre la tabla de hechos, cuando uses transición.</li>
    <li>Si solo necesitas un valor escalar de la fila, considera capturarlo con <code class="inl">VAR</code> antes de entrar en CALCULATE.</li>
  </ul>`)}

  ${exer('El clásico que todos fallan', `<p>Columna calculada en <code class="inl">Productos</code>: <code class="inl">Ventas Prod = SUM(Ventas[Importe])</code>. Hay 3 productos. Las ventas totales del modelo son 1000.</p>
  <p>¿Qué muestra cada fila?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary>
  <p>Las tres filas muestran <b>1000</b> (el gran total), porque <code class="inl">SUM</code> sin CALCULATE no convierte el contexto de fila en filtro. Para obtener las ventas de cada producto necesitas <code class="inl">CALCULATE(SUM(Ventas[Importe]))</code> → eso dispara la transición y cada fila muestra su propio total. <b>Recuerda esta diferencia: es la prueba de fuego de si entendiste el concepto.</b></p></details>`)}
  `
});

  <h3>1 · Cardinalidad: cuántas filas se relacionan</h3>

  ])}

  <h3>2 · Dirección del filtro: por dónde viaja</h3>
  ${diagram(`
   DIRECCIÓN SIMPLE (recomendada)          DIRECCIÓN BIDIRECCIONAL (cuidado)
   ───────────────────────────            ──────────────────────────────

           │  el filtro baja                       │ ▲  el filtro va y vuelve
           ▼  hacia los hechos                     ▼ │
        Ventas (*)                              Ventas (*)

   El filtro va SIEMPRE del lado "1"        El filtro puede subir de "*" a "1".

    <li>Por la relación 1:* el filtro <b>desciende</b> a <code class="inl">Ventas</code>: solo filas con ClienteID = A.</li>

  <h3>3 · Por qué la dirección simple es la mejor práctica</h3>

  ${exer('Diagnóstico', `<p>Un slicer de "Categoría de Producto" no afecta a una medida que cuenta clientes. ¿Por qué podría ser?</p>

  ┌──────────────────────────────────────────────────────────────────────┐
  │ 1. El visual genera el CONTEXTO DE FILTRO INICIAL                       │
  │    (coordenadas de la celda + slicers + filtros de página)             │
  ├──────────────────────────────────────────────────────────────────────┤
  │ 2. CALCULATE (si lo hay) MODIFICA el contexto de filtro                │
  │    · evalúa sus argumentos de filtro                                   │
  │    · aplica TRANSICIÓN si venía de un contexto de fila                 │
  │    · agrega / reemplaza / conserva filtros (ver módulo CALCULATE)      │
  ├──────────────────────────────────────────────────────────────────────┤
  │ 3. Los filtros se PROPAGAN por las relaciones                          │
  │    dimensiones ──1:*──► tabla de hechos (queda recortada)              │
  ├──────────────────────────────────────────────────────────────────────┤
  │ 4. Si hay un ITERADOR (SUMX…), se abre un CONTEXTO DE FILA             │
  │    y se recorre la tabla (ya filtrada) fila a fila                     │
  ├──────────────────────────────────────────────────────────────────────┤
  │ 5. Dentro del iterador, una MEDIDA dispara TRANSICIÓN (vuelve a paso 2)│
  ├──────────────────────────────────────────────────────────────────────┤
  │ 6. Se calcula la AGREGACIÓN final sobre las filas visibles             │
  ├──────────────────────────────────────────────────────────────────────┤
  │ 7. El motor de fórmulas pide los datos al motor de almacenamiento      │
  │    (VertiPaq) y combina los resultados                                 │
  ├──────────────────────────────────────────────────────────────────────┤
  │ 8. El número se PINTA en la celda. Siguiente celda → vuelve al paso 1  │
  └──────────────────────────────────────────────────────────────────────┘`)}

  <h3>Aplicado a una medida real, narrado</h3>
  ${dax(`
% Margen YTD vs AA =
VAR MargenYTD     = CALCULATE ( [Margen], DATESYTD ( Calendario[Fecha] ) )
VAR MargenYTD_AA  = CALCULATE ( [Margen], DATESYTD ( SAMEPERIODLASTYEAR ( Calendario[Fecha] ) ) )
RETURN
    DIVIDE ( MargenYTD - MargenYTD_AA, MargenYTD_AA )`)}
  ${engine('Narración en la celda "Marzo 2026 / Región Norte"', `<ol>
    <li><b>Contexto inicial:</b> {Mes ≤ implícito por la celda = Marzo, Año=2026, Región=Norte} desde el visual y slicers.</li>
    <li><b>VAR MargenYTD:</b> CALCULATE toma <code class="inl">DATESYTD</code>, que <b>reemplaza</b> el filtro de fecha por "1-ene-2026 … 31-mar-2026". Región=Norte se <b>conserva</b>.</li>
    <li>El nuevo filtro de fechas se propaga por la relación Calendario→Ventas; queda el Q1 de la región Norte.</li>
    <li><code class="inl">[Margen]</code> se evalúa sobre ese subconjunto → margen acumulado del trimestre.</li>
    <li><b>VAR MargenYTD_AA:</b> igual, pero <code class="inl">SAMEPERIODLASTYEAR</code> desplaza el rango a 2025 antes del YTD.</li>
    <li><b>RETURN:</b> <code class="inl">DIVIDE</code> calcula la variación y evita el error si el año anterior fue 0.</li>
    <li>Se pinta el % en la celda. La siguiente celda (Abril) reinicia todo el proceso con su propio contexto.</li>
  </ol>`)}

  ${best('Cómo usar este flujo para depurar', `<ol>
    <li><b>Identifica el contexto inicial:</b> ¿en qué celda estás? ¿qué slicers hay?</li>
    <li><b>Localiza cada CALCULATE</b> y pregúntate: ¿qué filtro agrega, reemplaza o conserva?</li>
    <li><b>Marca los iteradores</b> y recuerda que las medidas dentro disparan transición.</li>
    <li><b>Sigue la propagación</b> por las relaciones hasta los hechos.</li>
    <li>Si el número no cuadra, casi siempre el fallo está en el paso 2 (qué hace CALCULATE) o en el 3 (la propagación no llega).</li>
  </ol>`)}

  <p>Con este modelo mental completo, estás listo para el módulo más importante del Atlas: <span class="pill" data-go="calculate">CALCULATE</span>.</p>
  `
});

/* __CONTENT_INJECTION_POINT__ */

/* ---------- Helpers de contenido (azúcar para escribir nodos) ---------- */
function node(o){ NODES.push(o); return o; }
</script>
<script>
/* ============================================================
   RENDER ENGINE
   ============================================================ */
(function(){
  const byId = {};
  NODES.forEach(n=>byId[n.id]=n);
  const childrenOf = {};
  NODES.forEach(n=>{ const p=n.parent||'__root__'; (childrenOf[p]=childrenOf[p]||[]).push(n); });

  // ordered flat list (DFS) for prev/next
  const flat=[];
  (function dfs(pid){ (childrenOf[pid]||[]).forEach(n=>{ flat.push(n.id); dfs(n.id); }); })('__root__');

  const treeEl=document.getElementById('tree');
  const contentEl=document.getElementById('content');
  const crumbsEl=document.getElementById('crumbs');
  const searchEl=document.getElementById('searchInput');
  const searchClear=document.getElementById('searchClear');

  let current=null;
  const collapsed={};

  function iconFor(n){ return n.icon||''; }

  function buildTree(){
    treeEl.innerHTML='';
    (childrenOf['__root__']||[]).forEach(n=>treeEl.appendChild(renderNode(n,0)));
  }
  function renderNode(n,depth){
    const wrap=document.createElement('div'); wrap.className='node'; wrap.dataset.id=n.id;
    const row=document.createElement('div'); row.className='node-row'; row.dataset.id=n.id;
    const kids=childrenOf[n.id]||[];
    const hasKids=kids.length>0;
    if(collapsed[n.id]) row.classList.add('collapsed');
    row.innerHTML =
      '<span class="tw">'+(hasKids?'▾':'')+'</span>'+
      '<span class="ic">'+(n.icon||'•')+'</span>'+
      '<span class="lbl">'+n.title+'</span>'+
      (hasKids?'<span class="badge">'+kids.length+'</span>':'');
    row.addEventListener('click',e=>{
      e.stopPropagation();
      if(hasKids && (e.offsetX<22)){ toggle(n.id); return; }
      go(n.id);
      if(hasKids && collapsed[n.id]) toggle(n.id);
    });
    wrap.appendChild(row);
    if(hasKids){
      const c=document.createElement('div'); c.className='children'+(collapsed[n.id]?' hidden':'');
      kids.forEach(k=>c.appendChild(renderNode(k,depth+1)));
      wrap.appendChild(c);
    }
    return wrap;
  }
  function toggle(id){
    collapsed[id]=!collapsed[id];
    const wrap=treeEl.querySelector('.node[data-id="'+CSS.escape(id)+'"]');
    if(!wrap)return;
    const row=wrap.querySelector(':scope > .node-row');
    const ch=wrap.querySelector(':scope > .children');
    row.classList.toggle('collapsed',collapsed[id]);
    if(ch) ch.classList.toggle('hidden',collapsed[id]);
  }
  function expandAncestors(id){
    let n=byId[id];
    while(n && n.parent){ if(collapsed[n.parent]) toggle(n.parent); n=byId[n.parent]; }
  }

  function pathTo(id){
    const arr=[]; let n=byId[id];
    while(n){ arr.unshift(n); n=n.parent?byId[n.parent]:null; }
    return arr;
  }

  function go(id, push){
    const n=byId[id]; if(!n) return;
    current=id;
    // active state
    treeEl.querySelectorAll('.node-row').forEach(r=>r.classList.remove('active'));
    const row=treeEl.querySelector('.node-row[data-id="'+CSS.escape(id)+'"]');
    if(row) row.classList.add('active');
    expandAncestors(id);
    // breadcrumbs
    const p=pathTo(id);
    crumbsEl.innerHTML = p.map((x,i)=> (i===p.length-1?'<b>'+x.title+'</b>':'<a data-go="'+x.id+'">'+x.title+'</a>')).join(' <span style="color:var(--faint)">/</span> ');
    // content
    renderContent(n);
    if(push!==false){ history.replaceState(null,'',  '#'+id); }
    document.getElementById('main').scrollTop=0;
    // close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');
  }

  function metaChips(n){
    let h='<div class="meta-bar">';
    if(n.importancia) h+='<span class="chip"><span>Importancia</span><b>'+n.importancia+'</b></span>';
    if(n.dificultad) h+='<span class="chip '+(n.difClass||'')+'"><span>Dificultad</span><b>'+n.dificultad+'</b></span>';
    if(n.uso) h+='<span class="chip"><span>Uso</span><b>'+n.uso+'</b></span>';
    if(n.fnsig) h+='<span class="chip s"><span>Firma</span><b>'+n.fnsig+'</b></span>';
    h+='</div>';
    return h;
  }
  function relBlocks(n){
    const mk=(arr,cls)=> (arr||[]).map(id=>{
      const t=byId[id]?byId[id].title:id;
      return '<span class="pill '+(cls||'')+'" data-go="'+id+'">'+t+'</span>';
    }).join('');
    let blocks='';
    const hasDeps=(n.deps&&n.deps.length), hasRel=(n.related&&n.related.length), hasFns=(n.fns&&n.fns.length);
    if(hasDeps||hasRel||hasFns){
      blocks+='<div class="rel-grid">';
      if(hasDeps) blocks+='<div class="rel-card"><div class="h">🔗 Requisitos previos</div>'+mk(n.deps)+'</div>';
      if(hasRel) blocks+='<div class="rel-card"><div class="h">🧭 Conceptos relacionados</div>'+mk(n.related)+'</div>';
      if(hasFns) blocks+='<div class="rel-card"><div class="h">ƒ Funciones relacionadas</div>'+mk(n.fns,'fn')+'</div>';
      blocks+='</div>';
    }
    return blocks;
  }

  function renderContent(n){
    let h='';
    h+='<h2 class="title">'+(n.icon? n.icon+' ':'')+n.title+'</h2>';
    if(n.subtitle) h+='<p class="lead">'+n.subtitle+'</p>';
    h+=metaChips(n);
    h+=relBlocks(n);
    h+=(typeof n.html==='function'? n.html(): (n.html||'<p style="color:var(--muted)">Nodo en construcción.</p>'));
    // children index
    const kids=childrenOf[n.id]||[];
    if(kids.length){
      h+='<h3>Explorar dentro de este módulo</h3><div class="home-grid">';
      kids.forEach(k=>{ h+='<div class="home-card" data-go="'+k.id+'"><div class="ic">'+(k.icon||'•')+'</div><div class="t">'+k.title+'</div><div class="d">'+(k.subtitle||k.uso||'')+'</div></div>'; });
      h+='</div>';
    }
    // prev/next
    const idx=flat.indexOf(n.id);
    h+='<div class="next-prev">';
    if(idx>0){ const p=byId[flat[idx-1]]; h+='<div class="np" data-go="'+p.id+'"><div class="d">Anterior</div><div class="t">'+(p.icon||'')+' '+p.title+'</div></div>'; } else h+='<div style="flex:1"></div>';
    if(idx<flat.length-1){ const nx=byId[flat[idx+1]]; h+='<div class="np n" data-go="'+nx.id+'"><div class="d">Siguiente</div><div class="t">'+nx.title+' '+(nx.icon||'')+'</div></div>'; } else h+='<div style="flex:1"></div>';
    h+='</div>';
    contentEl.innerHTML=h;
    contentEl.classList.toggle('wide', !!n.wide);
    wireContent();
  }

  function wireContent(){
    contentEl.querySelectorAll('[data-go]').forEach(el=>{
      el.style.cursor='pointer';
      el.addEventListener('click',()=>go(el.dataset.go));
    });
    crumbsEl.querySelectorAll('[data-go]').forEach(el=>{
      el.style.cursor='pointer'; el.addEventListener('click',()=>go(el.dataset.go));
    });
    // collapsible levels
    contentEl.querySelectorAll('.lvl-h').forEach(h=>{
      h.addEventListener('click',()=>h.parentElement.classList.toggle('open'));
    });
    // DAX syntax highlight
    contentEl.querySelectorAll('code.dax').forEach(highlightDax);
  }

  const DAX_KW=['VAR','RETURN','EVALUATE','DEFINE','MEASURE','ORDER BY','ASC','DESC','START AT','TRUE','FALSE','BLANK','IN','NOT'];
  const DAX_FN=['CALCULATE','CALCULATETABLE','FILTER','ALL','ALLEXCEPT','ALLSELECTED','REMOVEFILTERS','KEEPFILTERS','VALUES','DISTINCT','DISTINCTCOUNT','SELECTEDVALUE','RELATED','RELATEDTABLE','LOOKUPVALUE','SUM','SUMX','AVERAGE','AVERAGEX','COUNT','COUNTX','COUNTROWS','MIN','MINX','MAX','MAXX','RANKX','TOPN','IF','SWITCH','DIVIDE','COALESCE','ISBLANK','ISINSCOPE','HASONEVALUE','HASONEFILTER','DATEADD','DATESINPERIOD','DATESYTD','DATESMTD','DATESQTD','TOTALYTD','TOTALMTD','SAMEPERIODLASTYEAR','PARALLELPERIOD','PREVIOUSMONTH','PREVIOUSYEAR','NEXTMONTH','ENDOFMONTH','STARTOFMONTH','EOMONTH','DATE','YEAR','MONTH','DAY','EDATE','CONCATENATEX','GENERATESERIES','SELECTCOLUMNS','ADDCOLUMNS','SUMMARIZE','SUMMARIZECOLUMNS','UNION','EXCEPT','INTERSECT','CROSSJOIN','TREATAS','USERELATIONSHIP','CROSSFILTER','VAR','MAXX','ABS','ROUND','FORMAT','CONCATENATE','CALENDAR','CALENDARAUTO','FIRSTDATE','LASTDATE'];
  function highlightDax(codeEl){
    if(codeEl.dataset.hl) return; codeEl.dataset.hl='1';
    let txt=codeEl.textContent;
    // tokenize protecting strings & comments
    const parts=[]; let i=0;
    const re=/("(?:[^"\\]|\\.)*")|(\/\/[^\n]*|--[^\n]*|\/\*[\s\S]*?\*\/)|([A-Za-z_][A-Za-z0-9_]*)|('[^']*'(?:\[[^\]]*\])?|\[[^\]]*\])|(\d+\.?\d*)|([+\-*/=<>&|]+)/g;
    let m,last=0;
    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    let out='';
    while((m=re.exec(txt))){
      out+=esc(txt.slice(last,m.index));
      if(m[1]) out+='<span class="tok-str">'+esc(m[1])+'</span>';
      else if(m[2]) out+='<span class="tok-com">'+esc(m[2])+'</span>';
      else if(m[3]){
        const up=m[3].toUpperCase();
        if(DAX_KW.includes(up)) out+='<span class="tok-kw">'+esc(m[3])+'</span>';
        else if(DAX_FN.includes(up)) out+='<span class="tok-fn">'+esc(m[3])+'</span>';
        else out+=esc(m[3]);
      }
      else if(m[4]) out+='<span class="tok-tbl">'+esc(m[4])+'</span>';
      else if(m[5]) out+='<span class="tok-num">'+esc(m[5])+'</span>';
      else if(m[6]) out+='<span class="tok-op">'+esc(m[6])+'</span>';
      last=re.lastIndex;
    }
    out+=esc(txt.slice(last));
    codeEl.innerHTML=out;
  }

  // ---------- Search ----------
  function strip(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
  function searchText(n){
    let raw = (typeof n.html==='function')? '' : (n.html||'');
    return strip(n.title+' '+(n.subtitle||'')+' '+(n.uso||'')+' '+raw.replace(/<[^>]+>/g,' '));
  }
  function doSearch(q){
    q=strip(q.trim());
    searchClear.style.display=q?'block':'none';
    if(!q){ treeEl.querySelectorAll('.node').forEach(w=>{w.classList.remove('hidden');}); treeEl.querySelectorAll('.node-row').forEach(r=>r.classList.remove('hit','dim')); return; }
    const matches={};
    NODES.forEach(n=>{ if(searchText(n).includes(q)) matches[n.id]=true; });
    // include ancestors of matches
    const show={};
    Object.keys(matches).forEach(id=>{ let n=byId[id]; while(n){ show[n.id]=true; n=n.parent?byId[n.parent]:null; } });
    treeEl.querySelectorAll('.node').forEach(w=>{
      const id=w.dataset.id;
      w.classList.toggle('hidden', !show[id]);
      const row=w.querySelector(':scope > .node-row');
      if(row){ row.classList.toggle('hit', !!matches[id]); row.classList.toggle('dim', !matches[id]); }
      // expand to reveal
      const ch=w.querySelector(':scope > .children'); if(ch) ch.classList.remove('hidden');
      if(row) row.classList.remove('collapsed');
    });
  }
  searchEl.addEventListener('input',()=>doSearch(searchEl.value));
  searchClear.addEventListener('click',()=>{ searchEl.value=''; doSearch(''); searchEl.focus(); });

  // ---------- Nav buttons ----------
  document.getElementById('btnPrev').addEventListener('click',()=>{ const i=flat.indexOf(current); if(i>0)go(flat[i-1]); });
  document.getElementById('btnNext').addEventListener('click',()=>{ const i=flat.indexOf(current); if(i<flat.length-1)go(flat[i+1]); });
  document.getElementById('mobToggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;
    if(e.key==='ArrowRight'){ const i=flat.indexOf(current); if(i<flat.length-1)go(flat[i+1]); }
    if(e.key==='ArrowLeft'){ const i=flat.indexOf(current); if(i>0)go(flat[i-1]); }
    if(e.key==='/'){ e.preventDefault(); searchEl.focus(); }
  });

  // ---------- Boot ----------
  buildTree();
  const initial=(location.hash||'').replace('#','');
  go(byId[initial]?initial:(flat[0]||NODES[0].id), false);
})();
</script>
