/* ---- PQ: Pivot / Unpivot ---- */
N({ id:'pq-pivot', parent:'powerquery', title:'Anular Dinamización (Unpivot) y Dinamización (Pivot)', icon:'🔴⭐',
  importancia:'★★★★★', dificultad:'🔴 Avanzado (clave en finanzas)', uso:'Datos de planning/contables',
  deps:['pq-tipos'], related:['pq-combinar','modelado'], fns:[],
  subtitle:'La transformación que más distingue a un profesional: pasar de "ancho" (meses en columnas) a "largo" (una fila por mes) y viceversa. Imprescindible para datos financieros.',
  html: ()=> `
  ${why('Tus datos vienen "anchos"; el modelo los necesita "largos"', `<p>Los reportes financieros suelen llegar con los <b>meses en columnas</b> (Ene, Feb, Mar…). Pero un buen modelo necesita <b>una fila por mes</b> (formato "largo"), para poder relacionar con el calendario y usar inteligencia de tiempo. <b>Anular dinamización (unpivot)</b> hace exactamente esa conversión. Es el paso que convierte una hoja de Excel inservible en una tabla de hechos perfecta.</p>`)}

  <h3>Anular dinamización (UNPIVOT): de ancho a largo</h3>
  ${diagram(`
   ANTES (ancho)                          DESPUÉS (largo, unpivot)
   Cliente  Ene  Feb  Mar                 Cliente  Mes   Importe
   A        100  110  120        ──►       A        Ene   100
   B        200  220  230                  A        Feb   110
                                           A        Mar   120
                                           B        Ene   200
                                           B        Feb   220
                                           B        Mar   230`)}
  ${best('Paso a paso', `<ol>
    <li>Selecciona las columnas que <b>NO</b> quieres rotar (aquí <code class="inl">Cliente</code>).</li>
    <li>Clic derecho → <b>Anular dinamización de otras columnas</b> ("Unpivot other columns"). Es la opción más robusta.</li>
    <li>Power Query crea dos columnas: <b>Atributo</b> (los meses) y <b>Valor</b> (los importes). Renómbralas a <code class="inl">Mes</code> e <code class="inl">Importe</code>.</li>
  </ol>`)}
  ${mq(`= Table.UnpivotOtherColumns(Paso, {"Cliente"}, "Mes", "Importe")`)}
  ${warn('Usa "anular dinamización de OTRAS columnas" ⚠️', `<p>Hay tres variantes: "anular dinamización", "...de otras columnas" y "...solo de las columnas seleccionadas". Elige <b>"de otras columnas"</b> seleccionando las columnas fijas (Cliente, Producto…). Así, si el mes que viene llega una columna "Abr" nueva, se rota <b>automáticamente</b> sin tocar nada. Es la diferencia entre una consulta frágil y una a prueba de futuro.</p>`)}

  <h3>Dinamización (PIVOT): de largo a ancho</h3>
  <p>La operación inversa: convierte valores de una columna en <b>nuevas columnas</b>. Útil para crear una matriz o preparar una vista concreta.</p>
  ${best('Paso a paso', `<ol>
    <li>Selecciona la columna cuyos valores serán los nuevos títulos (p. ej. <code class="inl">Mes</code>).</li>
    <li>Pestaña <b>Transformar → Columna dinámica</b>.</li>
    <li>Elige la <b>columna de valores</b> (Importe) y la <b>función de agregación</b> (Suma).</li>

  ${mq(`= Table.Pivot(Paso, List.Distinct(Paso[Mes]), "Mes", "Importe", List.Sum)`)}
  ${err('Pivotar lo que deberías dejar largo', `<p>Para el <b>modelo</b>, casi siempre quieres formato <b>largo</b> (unpivot), no ancho. El pivot en Power Query se reserva para casos puntuales; para mostrar meses en columnas en el informe, usa una <b>matriz</b> en Power BI (ahí sí van en columnas), no pivotees el dato. Ver <span class="pill" data-go="sim-6">Escenario 6</span>.</p>`)}
  ${best('', `<p><b>Regla de oro:</b> datos para el modelo → largos (unpivot). Presentación con meses en columnas → matriz de Power BI. Mantén la tabla de hechos normalizada y deja el "ancho" para el visual.</p>`)}
  ${exer('', `<p>Tienes Cliente + 12 columnas de meses. ¿Qué haces para que sirva en el modelo con el calendario?</p>
  <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent)">Ver solución</summary><p>Seleccionas la columna <b>Cliente</b> → "Anular dinamización de otras columnas" → quedan <code class="inl">Cliente · Mes · Importe</code> (una fila por cliente y mes). Conviertes <code class="inl">Mes</code> a una fecha real y lo relacionas con el <span class="pill" data-go="modelado">Calendario</span>. Ahora YTD, YoY, etc. funcionan.</p></details>`)}
  `
});

N({ id:'pq-combinar', parent:'powerquery', title:'Combinar Consultas: Merge (unir) y Append (anexar)', icon:'🔴',

  <h3>Merge (combinar) — traer columnas por una clave (estilo BUSCARV)</h3>
  ${diagram(`
   Ventas                Clientes (lookup)        Resultado del Merge

  ${best('Paso a paso', `<ol>

    <li>Arriba eliges la tabla base (Ventas), abajo la de búsqueda (Clientes).</li>
    <li>Haz clic en la <b>columna clave</b> en ambas (Cli) para emparejarlas.</li>
    <li>Elige el <b>tipo de combinación</b> (ver tabla abajo). Acepta.</li>
    <li>Aparece una columna nueva con tablas anidadas: pulsa el icono <b>⇄ (expandir)</b> y marca las columnas que quieres traer (País).</li>

  ${tbl(['Tipo de combinación (join)','Qué devuelve','Cuándo'],[

    ['Interna','Solo las que hacen match en ambas','Quedarte con coincidencias'],
    ['Externa completa','Todo de ambas','Auditar diferencias'],
    ['Anti izquierda','Las de la base SIN match','Encontrar huérfanos (clientes sin ficha)'],
  ])}
  ${mq(`Combinada = Table.NestedJoin(Ventas, {"Cli"}, Clientes, {"Cli"}, "Clientes", JoinKind.LeftOuter),
Expandida = Table.ExpandTableColumn(Combinada, "Clientes", {"País"}, {"País"})`)}
  ${warn('Merge en Power Query vs relación en el modelo', `<p>No siempre debes hacer Merge: si Ventas y Clientes van a ser tablas separadas en un <span class="pill" data-go="modelado">star schema</span>, mejor <b>relaciónalas en el modelo</b> y usa <code class="inl">RELATED</code> en DAX. Usa Merge cuando necesitas el dato <b>físicamente en la tabla</b> (p. ej. para limpiar o para una clave compuesta), no para todo.</p>`)}

  <h3>Append (anexar) — apilar filas de varias tablas</h3>
  ${diagram(`
   Ventas_Ene        Ventas_Feb            Append (apila)

   B 200             B 220                  B 200 (Ene)

                                            B 220 (Feb)`)}
  ${best('Paso a paso', `<ol>
    <li><b>Inicio → Anexar consultas</b>.</li>

  ${mq(`= Table.Combine({Ventas_Ene, Ventas_Feb, Ventas_Mar})`)}
  ${best('Caso real: carpeta de archivos mensuales', `<p>Para 12 archivos iguales, usa <b>Obtener datos → Carpeta</b>: Power Query los <b>anexa todos automáticamente</b> y, al añadir un archivo nuevo a la carpeta, basta Actualizar. Es el patrón estándar para consolidar reportes mensuales.</p>`)}
  ${err('Confundir Merge con Append', `<p><b>Merge añade COLUMNAS</b> (a lo ancho, por clave). <b>Append añade FILAS</b> (a lo alto, misma estructura). Si querías más detalle de cada venta y apilaste, o querías consolidar meses y combinaste, el resultado no tiene sentido. Pregúntate: ¿me faltan columnas (Merge) o me faltan filas (Append)?</p>`)}
  `
});

/* ---- PQ: Lenguaje M ---- */
N({ id:'pq-m', parent:'powerquery', title:'Editor Avanzado y Lenguaje M', icon:'🔴⭐',
  importancia:'★★★★☆', dificultad:'🔴 Avanzado', uso:'Cuando los menús no alcanzan',
  deps:['pq-pasos'], related:['pq-buenas','pq-intro'], fns:[],

  html: ()=> `
  ${why('Cada clic genera M; leerlo te da superpoderes', `<p>Todo lo que haces con menús, Power Query lo traduce a <b>lenguaje M</b>. No necesitas escribir M para el 90% del trabajo, pero <b>leerlo</b> te permite entender qué pasó, depurar errores y hacer cosas que los menús no ofrecen. Es el equivalente a DAX, pero para <i>transformar</i> datos en vez de <i>medirlos</i>.</p>`)}

  <h3>La estructura: let … in</h3>
  ${mq(`let
    Origen      = Excel.Workbook(File.Contents("C:\\Ventas.xlsx")),
    Hoja        = Origen{[Item="Datos",Kind="Sheet"]}[Data],
    Encabezados = Table.PromoteHeaders(Hoja),
    TipoCambiado= Table.TransformColumnTypes(Encabezados, {{"Importe", type number}}),
    SinVacios   = Table.SelectRows(TipoCambiado, each [Importe] <> null)
in
    SinVacios`)}
  ${engine('Cómo leerlo', `<ul>
    <li><code class="inl">let</code> abre una lista de <b>pasos</b>; cada línea es uno de tus "Pasos aplicados", con su nombre.</li>
    <li>Cada paso <b>usa el anterior</b> (Encabezados usa Hoja, TipoCambiado usa Encabezados…). Es la receta en cascada.</li>
    <li><code class="inl">in</code> indica <b>qué paso es el resultado final</b> (normalmente el último).</li>
    <li><code class="inl">each</code> significa "para cada fila"; <code class="inl">[Columna]</code> es el valor de esa columna en la fila.</li>
  </ul>`)}

  <h3>Cómo abrir el Editor Avanzado</h3>
  ${best('', `<ol>
    <li><b>Inicio → Editor avanzado</b>. Ves todo el M de la consulta.</li>
    <li>También puedes ver el código de <b>un</b> paso con la barra de fórmulas (actívala en Ver → Barra de fórmulas).</li>
  </ol>`)}

  ${warn('M es sensible a mayúsculas y a los nombres ⚠️', `<p><code class="inl">Table.SelectRows</code> ≠ <code class="inl">table.selectrows</code>. Y los pasos se referencian por su nombre exacto: si renombras un paso a mano, debes actualizar dónde se usa. Edita M con cuidado; un paréntesis o una coma de más rompe la consulta.</p>`)}
  ${best('Cuándo tocar M a mano', `<ul>
    <li>Para hacer algo que el menú no ofrece (lógica condicional compleja, funciones personalizadas).</li>
    <li>Para <b>parametrizar</b> (rutas de archivo, fechas) y reutilizar consultas.</li>
    <li>Para limpiar y documentar la receta. Pero recuerda: la mayoría del trabajo diario se hace con menús, y está bien.</li>
  </ul>`)}
  `

  function renderNode(n,depth){
    const wrap=document.createElement('div'); wrap.className='node'; wrap.dataset.id=n.id;
    const row=document.createElement('div'); row.className='node-row'; row.dataset.id=n.id;
    const kids=childrenOf[n.id]||[];
    const hasKids=kids.length>0;
    if(collapsed[n.id]) row.classList.add('collapsed');
    row.innerHTML =
      '<span class="tw">'+(hasKids?'▾':'')+'</span>'+
      '<span class="ic">'+(n.icon||'•')+'</span>'+
      '<span class="lbl">'+n.title+'</span>'+
      (hasKids?'<span class="badge">'+kids.length+'</span>':'');
    row.addEventListener('click',e=>{
      e.stopPropagation();
      if(hasKids && (e.offsetX<22)){ toggle(n.id); return; }
      go(n.id);
      if(hasKids && collapsed[n.id]) toggle(n.id);
    });
    wrap.appendChild(row);
    if(hasKids){
      const c=document.createElement('div'); c.className='children'+(collapsed[n.id]?' hidden':'');
      kids.forEach(k=>c.appendChild(renderNode(k,depth+1)));
      wrap.appendChild(c);
    }
    return wrap;
  }
  function toggle(id){
    collapsed[id]=!collapsed[id];
    const wrap=treeEl.querySelector('.node[data-id="'+cssEsc(id)+'"]');
    if(!wrap)return;
    const row=wrap.querySelector(':scope > .node-row');
    const ch=wrap.querySelector(':scope > .children');
    row.classList.toggle('collapsed',collapsed[id]);
    if(ch) ch.classList.toggle('hidden',collapsed[id]);
  }
  function expandAncestors(id){
    let n=byId[id];
    while(n && n.parent){ if(collapsed[n.parent]) toggle(n.parent); n=byId[n.parent]; }
  }

  function pathTo(id){
    const arr=[]; let n=byId[id];
    while(n){ arr.unshift(n); n=n.parent?byId[n.parent]:null; }
    return arr;
  }

  function go(id, push){
    const n=byId[id]; if(!n) return;
    current=id;
    // active state
    treeEl.querySelectorAll('.node-row').forEach(r=>r.classList.remove('active'));
    const row=treeEl.querySelector('.node-row[data-id="'+cssEsc(id)+'"]');
    if(row) row.classList.add('active');
    expandAncestors(id);
    // breadcrumbs
    const p=pathTo(id);
    crumbsEl.innerHTML = p.map((x,i)=> (i===p.length-1?'<b>'+x.title+'</b>':'<a data-go="'+x.id+'">'+x.title+'</a>')).join(' <span style="color:var(--faint)">/</span> ');
    // content
    renderContent(n);
    if(push!==false){ try{ history.replaceState(null,'',  '#'+id); }catch(e){ try{ location.hash = id; }catch(_){} } }
    document.getElementById('main').scrollTop=0;
    // close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');
  }

  function metaChips(n){
    let h='<div class="meta-bar">';
    if(n.importancia) h+='<span class="chip"><span>Importancia</span><b>'+n.importancia+'</b></span>';
    if(n.dificultad) h+='<span class="chip '+(n.difClass||'')+'"><span>Dificultad</span><b>'+n.dificultad+'</b></span>';
    if(n.uso) h+='<span class="chip"><span>Uso</span><b>'+n.uso+'</b></span>';
    if(n.fnsig) h+='<span class="chip s"><span>Firma</span><b>'+n.fnsig+'</b></span>';
    h+='</div>';
    return h;
  }
  function relBlocks(n){
    const mk=(arr,cls)=> (arr||[]).map(id=>{
      const t=byId[id]?byId[id].title:id;
      return '<span class="pill '+(cls||'')+'" data-go="'+id+'">'+t+'</span>';
    }).join('');
    let blocks='';
    const hasDeps=(n.deps&&n.deps.length), hasRel=(n.related&&n.related.length), hasFns=(n.fns&&n.fns.length);
    if(hasDeps||hasRel||hasFns){
      blocks+='<div class="rel-grid">';
      if(hasDeps) blocks+='<div class="rel-card"><div class="h">🔗 Requisitos previos</div>'+mk(n.deps)+'</div>';
      if(hasRel) blocks+='<div class="rel-card"><div class="h">🧭 Conceptos relacionados</div>'+mk(n.related)+'</div>';
      if(hasFns) blocks+='<div class="rel-card"><div class="h">ƒ Funciones relacionadas</div>'+mk(n.fns,'fn')+'</div>';
      blocks+='</div>';
    }
    return blocks;
  }

  function renderContent(n){
    let h='';
    h+='<h2 class="title">'+(n.icon? n.icon+' ':'')+n.title+'</h2>';
    if(n.subtitle) h+='<p class="lead">'+n.subtitle+'</p>';
    h+=metaChips(n);
    h+=relBlocks(n);
    h+=(typeof n.html==='function'? n.html(): (n.html||'<p style="color:var(--muted)">Nodo en construcción.</p>'));
    // children index
    const kids=childrenOf[n.id]||[];
    if(kids.length){
      h+='<h3>Explorar dentro de este módulo</h3><div class="home-grid">';
      kids.forEach(k=>{ h+='<div class="home-card" data-go="'+k.id+'"><div class="ic">'+(k.icon||'•')+'</div><div class="t">'+k.title+'</div><div class="d">'+(k.subtitle||k.uso||'')+'</div></div>'; });
      h+='</div>';
    }
    // prev/next
    const idx=flat.indexOf(n.id);
    h+='<div class="next-prev">';
    if(idx>0){ const p=byId[flat[idx-1]]; h+='<div class="np" data-go="'+p.id+'"><div class="d">Anterior</div><div class="t">'+(p.icon||'')+' '+p.title+'</div></div>'; } else h+='<div style="flex:1"></div>';
    if(idx<flat.length-1){ const nx=byId[flat[idx+1]]; h+='<div class="np n" data-go="'+nx.id+'"><div class="d">Siguiente</div><div class="t">'+nx.title+' '+(nx.icon||'')+'</div></div>'; } else h+='<div style="flex:1"></div>';
    h+='</div>';
    contentEl.innerHTML=h;
    contentEl.classList.toggle('wide', !!n.wide);
    wireContent();
  }

  function wireContent(){
    contentEl.querySelectorAll('[data-go]').forEach(el=>{
      el.style.cursor='pointer';
      el.addEventListener('click',()=>go(el.dataset.go));
    });
    crumbsEl.querySelectorAll('[data-go]').forEach(el=>{
      el.style.cursor='pointer'; el.addEventListener('click',()=>go(el.dataset.go));
    });
    // collapsible levels
    contentEl.querySelectorAll('.lvl-h').forEach(h=>{
      h.addEventListener('click',()=>h.parentElement.classList.toggle('open'));
    });
    // DAX syntax highlight
    contentEl.querySelectorAll('code.dax').forEach(highlightDax);
  }

  const DAX_KW=['VAR','RETURN','EVALUATE','DEFINE','MEASURE','ORDER BY','ASC','DESC','START AT','TRUE','FALSE','BLANK','IN','NOT'];
  const DAX_FN=['CALCULATE','CALCULATETABLE','FILTER','ALL','ALLEXCEPT','ALLSELECTED','REMOVEFILTERS','KEEPFILTERS','VALUES','DISTINCT','DISTINCTCOUNT','SELECTEDVALUE','RELATED','RELATEDTABLE','LOOKUPVALUE','SUM','SUMX','AVERAGE','AVERAGEX','COUNT','COUNTX','COUNTROWS','MIN','MINX','MAX','MAXX','RANKX','TOPN','IF','SWITCH','DIVIDE','COALESCE','ISBLANK','ISINSCOPE','HASONEVALUE','HASONEFILTER','DATEADD','DATESINPERIOD','DATESYTD','DATESMTD','DATESQTD','TOTALYTD','TOTALMTD','SAMEPERIODLASTYEAR','PARALLELPERIOD','PREVIOUSMONTH','PREVIOUSYEAR','NEXTMONTH','ENDOFMONTH','STARTOFMONTH','EOMONTH','DATE','YEAR','MONTH','DAY','EDATE','CONCATENATEX','GENERATESERIES','SELECTCOLUMNS','ADDCOLUMNS','SUMMARIZE','SUMMARIZECOLUMNS','UNION','EXCEPT','INTERSECT','CROSSJOIN','TREATAS','USERELATIONSHIP','CROSSFILTER','VAR','MAXX','ABS','ROUND','FORMAT','CONCATENATE','CALENDAR','CALENDARAUTO','FIRSTDATE','LASTDATE'];
  function highlightDax(codeEl){
    if(codeEl.dataset.hl) return; codeEl.dataset.hl='1';
    let txt=codeEl.textContent;
    // tokenize protecting strings & comments
    const parts=[]; let i=0;
    const re=/("(?:[^"\\]|\\.)*")|(\/\/[^\n]*|--[^\n]*|\/\*[\s\S]*?\*\/)|([A-Za-z_][A-Za-z0-9_]*)|('[^']*'(?:\[[^\]]*\])?|\[[^\]]*\])|(\d+\.?\d*)|([+\-*/=<>&|]+)/g;
    let m,last=0;
    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    let out='';
    while((m=re.exec(txt))){
      out+=esc(txt.slice(last,m.index));
      if(m[1]) out+='<span class="tok-str">'+esc(m[1])+'</span>';
      else if(m[2]) out+='<span class="tok-com">'+esc(m[2])+'</span>';
      else if(m[3]){
        const up=m[3].toUpperCase();
        if(DAX_KW.includes(up)) out+='<span class="tok-kw">'+esc(m[3])+'</span>';
        else if(DAX_FN.includes(up)) out+='<span class="tok-fn">'+esc(m[3])+'</span>';
        else out+=esc(m[3]);
      }
      else if(m[4]) out+='<span class="tok-tbl">'+esc(m[4])+'</span>';
      else if(m[5]) out+='<span class="tok-num">'+esc(m[5])+'</span>';
      else if(m[6]) out+='<span class="tok-op">'+esc(m[6])+'</span>';
      last=re.lastIndex;
    }
    out+=esc(txt.slice(last));
    codeEl.innerHTML=out;
  }

  // ---------- Search ----------
  function strip(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
  function searchText(n){
    let raw = (typeof n.html==='function')? '' : (n.html||'');
    return strip(n.title+' '+(n.subtitle||'')+' '+(n.uso||'')+' '+raw.replace(/<[^>]+>/g,' '));
  }
  function doSearch(q){
    q=strip(q.trim());
    searchClear.style.display=q?'block':'none';
    if(!q){ treeEl.querySelectorAll('.node').forEach(w=>{w.classList.remove('hidden');}); treeEl.querySelectorAll('.node-row').forEach(r=>r.classList.remove('hit','dim')); return; }
    const matches={};
    NODES.forEach(n=>{ if(searchText(n).includes(q)) matches[n.id]=true; });
    // include ancestors of matches
    const show={};
    Object.keys(matches).forEach(id=>{ let n=byId[id]; while(n){ show[n.id]=true; n=n.parent?byId[n.parent]:null; } });
    treeEl.querySelectorAll('.node').forEach(w=>{
      const id=w.dataset.id;
      w.classList.toggle('hidden', !show[id]);
      const row=w.querySelector(':scope > .node-row');
      if(row){ row.classList.toggle('hit', !!matches[id]); row.classList.toggle('dim', !matches[id]); }
      // expand to reveal
      const ch=w.querySelector(':scope > .children'); if(ch) ch.classList.remove('hidden');
      if(row) row.classList.remove('collapsed');
    });
  }
  searchEl.addEventListener('input',()=>doSearch(searchEl.value));
  searchClear.addEventListener('click',()=>{ searchEl.value=''; doSearch(''); searchEl.focus(); });

  // ---------- Nav buttons ----------
  document.getElementById('btnPrev').addEventListener('click',()=>{ const i=flat.indexOf(current); if(i>0)go(flat[i-1]); });
  document.getElementById('btnNext').addEventListener('click',()=>{ const i=flat.indexOf(current); if(i<flat.length-1)go(flat[i+1]); });
  document.getElementById('mobToggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;
    if(e.key==='ArrowRight'){ const i=flat.indexOf(current); if(i<flat.length-1)go(flat[i+1]); }
    if(e.key==='ArrowLeft'){ const i=flat.indexOf(current); if(i>0)go(flat[i-1]); }
    if(e.key==='/'){ e.preventDefault(); searchEl.focus(); }
  });

  // ---------- Boot ----------
  buildTree();
  const initial=(location.hash||'').replace('#','');
  go(byId[initial]?initial:(flat[0]||NODES[0].id), false);
})();
</script>
</body>
